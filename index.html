// ======================================================================
// === WORKFLOW TRANSFER PACKAGES
// ======================================================================
// Transfer packages are versioned JSON files with a _type field indicating
// the workflow step. They carry resolved names (not just IDs) for portability
// across instances, and use smart merge on import (never wipe-replaces).
//
// Package types:
//   'attorney_submission'  Attorney → Billing Staff
//   'billing_review'       Billing Staff → Partner
//   'partner_approval'     Partner → Billing Staff (approved/rejected)
//
// Smart merge rules (importWorkflowPackage):
//   - Clients/matters/contacts: match by name (case-insensitive), add if new
//   - Entries: match by original ID (pkg._entryOrigIds), update status/fields
//     if changed, add if not present. Never delete existing entries.
// ======================================================================

// Build a resolved-names snapshot of entries (for portability across instances)
function _resolveEntries(entries){
  return entries.map(function(e){
    var cl=_lu.cl[e.clientId]||{};
    var mt=_lu.ma[e.matterId]||{};
    var ct=_lu.ct[e.contactId]||{};
    var ma=mt||{};
    return Object.assign({},e,{
      _clientName:cl.name||'',
      _matterName:ma.name||'',
      _matterNumber:ma.matterNumber||'',
      _contactName:ct.name||''
    });
  });
}

// Export a workflow transfer package
// type: 'attorney_submission' | 'billing_review' | 'partner_approval'
// entries: array of entry objects to include (filtered subset)
function _exportWorkflowPackage(type, entries, opts){
  opts=opts||{};
  buildLookups();
  var resolved=_resolveEntries(entries);
  var now=new Date();
  var stamp=toIsoDate(now)+'_'+pad2(now.getHours())+pad2(now.getMinutes());

  // Include only the clients/matters referenced by these entries
  var usedClientIds={};var usedMatterIds={};
  entries.forEach(function(e){
    if(e.clientId) usedClientIds[e.clientId]=true;
    if(e.matterId) usedMatterIds[e.matterId]=true;
  });
  var pkgClients=ST.clients.filter(function(c){return usedClientIds[c.id];});
  var pkgMatters=ST.matters.filter(function(m){return usedMatterIds[m.id];});
  var pkgContacts=[];
  var usedCtIds={};
  entries.forEach(function(e){if(e.contactId) usedCtIds[e.contactId]=true;});
  pkgContacts=ST.contacts.filter(function(c){return usedCtIds[c.id];});

  var typeLabels={
    attorney_submission:'Attorney Timesheet Submission',
    billing_review:'Billing Review Package',
    partner_approval:'Partner Approval Package'
  };
  var pkg={
    _type:type,
    _version:2,
    _label:typeLabels[type]||type,
    _exportedAt:now.toISOString(),
    _fromUser:ST.user?ST.user.name:'Unknown',
    _fromRole:ST.user?ST.user.role:'',
    _fromInitials:ST.user?ST.user.initials:'?',
    _firmName:(ST.firmProfile&&ST.firmProfile.firmName)||ST.prefs.firmName||'',
    _entryCount:entries.length,
    _dateFrom:opts.dateFrom||'',
    _dateTo:opts.dateTo||'',
    _note:opts.note||'',
    clients:pkgClients,
    matters:pkgMatters,
    contacts:pkgContacts,
    entries:resolved
  };
  var json=JSON.stringify(pkg,null,2);
  // === Context-aware filenames ===
  // Attorney → Billing:  INI_YYYY-MM-DD_HHMM.json
  // Billing → Partner:   TS_YYYY-MM_PartnerLastName.json
  // Partner → Billing:   TS_YYYY-MM_appr-PARTNERINIT.json
  var fname;
  if(type==='attorney_submission'){
    var ini=(ST.user&&ST.user.initials?ST.user.initials:'ATY').replace(/[^A-Za-z0-9]/g,'').toUpperCase();
    fname=ini+'_'+stamp+'.json';
  } else if(type==='billing_review'){
    // Derive month from entries (majority month) or today
    var entryMonth='';
    if(entries.length){
      var months={};
      entries.forEach(function(e){var m=(e.date||'').substring(0,7);if(m)months[m]=(months[m]||0)+1;});
      var best='',bestN=0;
      Object.keys(months).forEach(function(m){if(months[m]>bestN){bestN=months[m];best=m;}});
      entryMonth=best;
    }
    if(!entryMonth) entryMonth=now.getFullYear()+'-'+pad2(now.getMonth()+1);
    // Find first partner contact among entries' clients
    var partnerLastName='';
    var seenCl={};
    for(var pi=0;pi<entries.length;pi++){
      var ecl=entries[pi].clientId;
      if(ecl&&!seenCl[ecl]){
        seenCl[ecl]=true;
        var clObj=_lu.cl[ecl]||null;
        if(clObj&&clObj.contactIds&&clObj.contactIds.length){
          for(var ci=0;ci<clObj.contactIds.length;ci++){
            var pct=_lu.ct[clObj.contactIds[ci]]||null;
            if(pct&&pct.role&&isPartnerRole(pct.role)){
              var np=pct.name.trim().split(/\s+/);
              partnerLastName=np[np.length-1].replace(/[^A-Za-z0-9]/g,'');
              break;
            }
          }
        }
        if(partnerLastName) break;
      }
    }
    var partnerSuffix=partnerLastName||'Partner';
    fname='TS_'+entryMonth+'_'+partnerSuffix+'.json';
  } else if(type==='partner_approval'){
    var apprMonth='';
    if(entries.length){
      var amonths={};
      entries.forEach(function(e){var m=(e.date||'').substring(0,7);if(m)amonths[m]=(amonths[m]||0)+1;});
      var abest='',abestN=0;
      Object.keys(amonths).forEach(function(m){if(amonths[m]>abestN){abestN=amonths[m];abest=m;}});
      apprMonth=abest;
    }
    if(!apprMonth) apprMonth=now.getFullYear()+'-'+pad2(now.getMonth()+1);
    var apprIni=(ST.user&&ST.user.initials?ST.user.initials:'PTR').replace(/[^A-Za-z0-9]/g,'').toUpperCase();
    fname='TS_'+apprMonth+'_appr-'+apprIni+'.json';
  } else {
    var shortType={attorney_submission:'atty',billing_review:'bill',partner_approval:'appr'}[type]||type;
    fname='workflow-'+shortType+'_'+stamp+'.json';
  }
  A._dlData(json, fname, 'application/json');
  return fname;
}

// ── Conflict Detection ──────────────────────────────────────────────────────
// Analyse a workflow package and determine which incoming entities can be
// auto-resolved (exact name match or saved linkage rule) vs. which need the
// user to manually link or confirm.
//
// Returns:
//   resolved  — {clients:{pkgId→localId}, matters:{pkgId→localId}, contacts:{pkgId→localId}}
//               A null value means "add as new" (confirmed via saved rule).
//   conflicts — [{type:'client'|'matter'|'contact', pkgId, incomingName,
//                 suggestions:[{id,name}]}]
//               Only entries where no auto-resolution was found.
//
// The resolved map is passed directly into _importWorkflowPackage as the
// linkageMap so that entry IDs always resolve correctly even when names differ.
function _detectImportConflicts(pkg){
  buildLookups();
  var resolved={clients:{},matters:{},contacts:{}};
  var conflicts=[];

  // Returns up to 6 name-similarity suggestions from localArr for incomingName,
  // sorted by ascending levenshtein distance so closest matches appear first.
  function _suggest(localArr, incomingName){
    var fi=fuzzyNorm(incomingName);
    return localArr.map(function(x){
      var fn=fuzzyNorm(x.name);
      var dist=levenshtein(fi,fn);
      var contains=fn.indexOf(fi)!==-1||fi.indexOf(fn)!==-1;
      return {id:x.id,name:x.name,_dist:dist,_contains:contains};
    }).filter(function(x){return x._contains||x._dist<=4;})
      .sort(function(a,b){return a._dist-b._dist;})
      .slice(0,6)
      .map(function(x){return {id:x.id,name:x.name};});
  }

  function _process(type, localArr, pkgId, incomingName){
    if(!incomingName||!incomingName.trim()) return; // blank — handled as new silently
    var key=type+':'+normStr(incomingName);
    // 1. Saved linkage rule wins — but validate localId still exists (record may have been deleted)
    var rule=ST.linkageRules[key];
    if(rule){
      if(rule.isNew){
        resolved[type+'s'][pkgId]=null;
        return;
      }
      var stillExists=localArr.some(function(x){return x.id===rule.localId;});
      if(stillExists){
        resolved[type+'s'][pkgId]=rule.localId;
        return;
      }
      // Rule is stale (local record deleted) — fall through to name-match / conflict
    }
    // 2. Exact case-insensitive name match
    var match=localArr.find(function(x){return sameStr(x.name,incomingName);});
    if(match){
      resolved[type+'s'][pkgId]=match.id;
      return;
    }
    // 3. Fuzzy match — handles trailing punctuation, spacing differences, single-char typos.
    //    "Smith LLC." → "Smith LLC", "O'Brien" → "OBrien", "Acme, Inc" → "Acme Inc".
    //    Auto-resolved without user intervention; logged to console for transparency.
    var fuzzy=localArr.find(function(x){return fuzzyMatch(x.name,incomingName);});
    if(fuzzy){
      console.info('Import: fuzzy-matched "'+incomingName+'" → "'+fuzzy.name+'" ('+type+')');
      resolved[type+'s'][pkgId]=fuzzy.id;
      return;
    }
    // 4. No match — collect conflict
    conflicts.push({type:type,pkgId:pkgId,incomingName:incomingName.trim(),
      staleRule:rule&&!rule.isNew?rule:null, // flag so modal can warn the user
      suggestions:_suggest(localArr,incomingName)});
  }

  (pkg.clients||[]).forEach(function(c){ _process('client',ST.clients,c.id,c.name||''); });

  // Build a provisional client-ID map from the just-resolved clients so matter
  // matching can be scoped to the correct client (prevents "General" under Client A
  // from matching "General" under Client B).
  var _provClMap={};
  (pkg.clients||[]).forEach(function(pc){
    var resolvedId=resolved.clients[pc.id]; // may be localId or undefined (conflict)
    if(resolvedId!=null){
      // Already resolved (exact match or saved rule)
      _provClMap[pc.id]=resolvedId;
    } else if(resolved.clients.hasOwnProperty(pc.id)&&resolvedId===null){
      // Forced-new — no existing local client to scope against yet
    } else {
      // Still conflicted — best effort: try exact match fallback for scoping only
      var m=ST.clients.find(function(c){return sameStr(c.name,pc.name);});
      if(m) _provClMap[pc.id]=m.id;
    }
  });

  // Matter matching: scope by resolved client where possible
  (pkg.matters||[]).forEach(function(m){
    var resolvedClientId=_provClMap[m.clientId]||'';
    // Use a client-scoped local array when we know the client; otherwise all matters
    var scopedArr=resolvedClientId
      ? ST.matters.filter(function(lm){return lm.clientId===resolvedClientId;})
      : ST.matters;
    _process('matter', scopedArr, m.id, m.name||'');
  });

  (pkg.contacts||[]).forEach(function(c){ _process('contact',ST.contacts,c.id,c.name||''); });

  // Check package sender as a contact (if not already in pkg.contacts).
  // Anonymous senders (name is blank or the generic 'Unknown' fallback) are intentionally
  // excluded from conflict detection and linkage-rule matching: each will receive a unique
  // per-package dummy contact in _importWorkflowPackage, so no linkage rule is ever
  // created for them and there is nothing for the user to resolve here.
  var senderName=(pkg._fromUser||'').trim();
  var senderIsAnonymous=!senderName||normStr(senderName)==='unknown';
  if(senderName&&!senderIsAnonymous){
    var senderInContacts=(pkg.contacts||[]).some(function(c){return sameStr(c.name,senderName);});
    if(!senderInContacts){
      var key='contact:'+normStr(senderName);
      var rule=ST.linkageRules[key];
      if(rule){
        if(rule.isNew){
          resolved.contacts['__sender__']=null;
        } else {
          var stillExists=ST.contacts.some(function(c){return c.id===rule.localId;});
          if(stillExists){
            resolved.contacts['__sender__']=rule.localId;
          } else {
            // Stale — fall through to name match / conflict below
            rule=null;
          }
        }
      }
      if(!rule){
        var match=ST.contacts.find(function(c){return sameStr(c.name,senderName);});
        if(match){
          resolved.contacts['__sender__']=match.id;
        } else {
          var fuzzyS=ST.contacts.find(function(c){return fuzzyMatch(c.name,senderName);});
          if(fuzzyS){
            console.info('Import: fuzzy-matched sender "'+senderName+'" → "'+fuzzyS.name+'"');
            resolved.contacts['__sender__']=fuzzyS.id;
          } else {
            var sugs=_suggest(ST.contacts,senderName);
            conflicts.push({type:'contact',pkgId:'__sender__',incomingName:senderName,isSender:true,suggestions:sugs});
          }
        }
      }
    }
  }

  return {resolved:resolved,conflicts:conflicts};
}

// Smart merge import — merges package data with existing local data.
// linkageMap (optional) is the output of _detectImportConflicts + user overrides:
//   { clients:{pkgId→localId|null}, matters:{pkgId→localId|null}, contacts:{pkgId→localId|null} }
//   null means "add as new regardless of name match".
// Returns a summary string for the toast.
function _importWorkflowPackage(pkg, linkageMap){
  linkageMap=linkageMap||{clients:{},matters:{},contacts:{}};
  var added={clients:0,matters:0,contacts:0,entries:0,updated:0};

  // pkgId→localId lookup tables built as entities are merged/resolved.
  // Used by entry resolution so IDs always bind correctly even when names differ.
  var clMap={}; // pkgClientId  → local ST client id
  var maMap={}; // pkgMatterId  → local ST matter id
  var ctMap={}; // pkgContactId → local ST contact id

  // === Merge Clients ===
  (pkg.clients||[]).forEach(function(pc){
    var forced=(linkageMap.clients||{})[pc.id];
    if(forced===null){
      // User said "Add as New" (null = forced-new)
      var nc=Object.assign({},pc,{id:uid()});
      ST.clients=ST.clients.concat([nc]);
      clMap[pc.id]=nc.id; added.clients++;
    } else if(forced){
      // User linked this pkg client to an existing local client
      clMap[pc.id]=forced;
    } else {
      // Default: case-insensitive name match
      var existing=ST.clients.find(function(c){return sameStr(c.name,pc.name);});
      if(!existing){
        var nc=Object.assign({},pc,{id:uid()});
        ST.clients=ST.clients.concat([nc]);
        clMap[pc.id]=nc.id; added.clients++;
      } else {
        clMap[pc.id]=existing.id;
      }
    }
  });

  // === Merge Matters ===
  (pkg.matters||[]).forEach(function(pm){
    var forced=(linkageMap.matters||{})[pm.id];
    var resolvedClientId=clMap[pm.clientId]||pm.clientId||'';
    if(forced===null){
      var nm=Object.assign({},pm,{id:uid(),clientId:resolvedClientId,matterNumber:pm.matterNumber||pm._matterNumber||''});
      delete nm._clientName;
      ST.matters=ST.matters.concat([nm]);
      maMap[pm.id]=nm.id; added.matters++;
    } else if(forced){
      maMap[pm.id]=forced;
      // Backfill matter number if learned from package
      if(pm.matterNumber){
        ST.matters=ST.matters.map(function(m){
          return m.id===forced&&!m.matterNumber?Object.assign({},m,{matterNumber:pm.matterNumber}):m;
        });
      }
    } else {
      // Name match within the same resolved client
      var existing=ST.matters.find(function(m){
        return sameStr(m.name,pm.name)&&
               (!resolvedClientId||m.clientId===resolvedClientId);
      });
      if(!existing){
        var nm=Object.assign({},pm,{id:uid(),clientId:resolvedClientId,matterNumber:pm.matterNumber||pm._matterNumber||''});
        delete nm._clientName;
        ST.matters=ST.matters.concat([nm]);
        maMap[pm.id]=nm.id; added.matters++;
      } else {
        maMap[pm.id]=existing.id;
        if(pm.matterNumber&&!existing.matterNumber){
          ST.matters=ST.matters.map(function(m){return m.id===existing.id?Object.assign({},m,{matterNumber:pm.matterNumber}):m;});
        }
      }
    }
  });

  // === Merge Contacts ===
  (pkg.contacts||[]).forEach(function(pc){
    var forced=(linkageMap.contacts||{})[pc.id];
    if(forced===null){
      var nc=Object.assign({},pc,{id:uid()});
      ST.contacts=ST.contacts.concat([nc]);
      ctMap[pc.id]=nc.id; added.contacts++;
    } else if(forced){
      ctMap[pc.id]=forced;
    } else {
      var existing=ST.contacts.find(function(c){return sameStr(c.name,pc.name);});
      if(!existing){
        var nc=Object.assign({},pc,{id:uid()});
        ST.contacts=ST.contacts.concat([nc]);
        ctMap[pc.id]=nc.id; added.contacts++;
      } else {
        ctMap[pc.id]=existing.id;
      }
    }
  });

  // === Resolve / create sender contact ===
  var senderName=(pkg._fromUser||'').trim();
  var senderIsNamed=senderName&&normStr(senderName)!=='unknown';
  if(senderIsNamed){
    // Named sender: normal linkage-map / name-match / auto-create flow.
    var forcedSender=(linkageMap.contacts||{})['__sender__'];
    if(forcedSender===null){
      // User chose "Add as New"
      var sc={id:uid(),name:senderName,role:pkg._fromRole||'',
        initials:pkg._fromInitials||getInitials(senderName),
        email:'',phone:'',rate:'',ownPct:100,rateHistory:[]};
      ST.contacts=ST.contacts.concat([sc]);
      ctMap['__sender__']=sc.id; added.contacts++;
    } else if(forcedSender){
      ctMap['__sender__']=forcedSender;
    } else {
      var senderExists=ST.contacts.find(function(c){return sameStr(c.name,senderName);});
      if(!senderExists){
        var sc={id:uid(),name:senderName,role:pkg._fromRole||'',
          initials:pkg._fromInitials||getInitials(senderName),
          email:'',phone:'',rate:'',ownPct:100,rateHistory:[]};
        ST.contacts=ST.contacts.concat([sc]);
        ctMap['__sender__']=sc.id; added.contacts++;
      } else {
        ctMap['__sender__']=senderExists.id;
      }
    }
  } else if(senderName){
    // Anonymous sender — name is the generic 'Unknown' fallback, meaning the attorney
    // exported without setting up a profile.  We must NOT reuse a shared "Unknown"
    // contact: multiple anonymous attorneys would have their entries commingled under
    // a single alias, making authorship unrecoverable.
    //
    // Instead, create a unique per-package dummy contact.  The _pkgKey is built from
    // exportedAt + initials so that re-importing the exact same package a second time
    // finds the existing dummy and does not create a duplicate.
    var dummyKey='__anon__'+(pkg._exportedAt||'')+(pkg._fromInitials||'');
    var existingDummy=ST.contacts.find(function(c){return c._pkgKey===dummyKey;});
    if(existingDummy){
      ctMap['__sender__']=existingDummy.id;
    } else {
      var importDateStr=pkg._exportedAt
        ? new Date(pkg._exportedAt).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'})
        : 'unknown date';
      var dummySc={id:uid(),name:'Unknown \u2014 imported '+importDateStr,
        role:pkg._fromRole||'',initials:pkg._fromInitials||'?',
        email:'',phone:'',rate:'',ownPct:100,rateHistory:[],
        _pkgKey:dummyKey};
      ST.contacts=ST.contacts.concat([dummySc]);
      ctMap['__sender__']=dummySc.id; added.contacts++;
    }
  }

  // Rebuild lookups so resolved IDs are visible to entry resolution
  markLuDirty(); buildLookups();

  // === Merge Entries ===
  // Resolution order for FKs: linkageMap/merge map → name fallback → original pkg ID (last resort)
  var _newEntries=[];  // collect all new entries, then concat once at the end
  (pkg.entries||[]).forEach(function(pe){
    // Resolve client/matter/contact IDs using the maps built above
    var clientId=clMap[pe.clientId]||(function(){
      var cl=ST.clients.find(function(c){return sameStr(c.name,pe._clientName);});
      return cl?cl.id:pe.clientId||'';
    })();
    var matterId=maMap[pe.matterId]||(function(){
      var mt=ST.matters.find(function(m){return sameStr(m.name,pe._matterName)&&(!clientId||m.clientId===clientId);});
      return mt?mt.id:pe.matterId||'';
    })();
    var contactId=ctMap[pe.contactId]||(function(){
      var ct=ST.contacts.find(function(c){return sameStr(c.name,pe._contactName);});
      return ct?ct.id:pe.contactId||'';
    })();

    // Check by original exported ID
    var existIdx=ST.entries.findIndex(function(e){return String(e.id)===String(pe.id);});
    if(existIdx>=0){
      var ex=ST.entries[existIdx];
      var mergedFields={
        status:pe.status||ex.status,
        abaCode:pe.abaCode||ex.abaCode||'',
        approvedBy:pe.approvedBy||ex.approvedBy||'',
        approvedAt:pe.approvedAt||ex.approvedAt||'',
        partnerComment:pe.partnerComment||ex.partnerComment||'',
        partnerEdited:pe.partnerEdited||ex.partnerEdited||false,
        showCommentOnInvoice:pe.showCommentOnInvoice||ex.showCommentOnInvoice||false
      };
      if(pkg._type==='partner_approval'&&pe.partnerEdited){
        mergedFields.hours=pe.hours;
        mergedFields.rate=pe.rate;
        mergedFields.description=pe.description;
        mergedFields.submittedHours=pe.submittedHours;
      }
      var updated=Object.assign({},ex,mergedFields,{
        clientId:clientId||ex.clientId,
        matterId:matterId||ex.matterId,
        contactId:contactId||ex.contactId
      });
      ST.entries[existIdx]=updated;
      _dirtyEntries[String(updated.id)]=updated;   // granular: only this record needs writing
      added.updated++;
    } else {
      var ne=Object.assign({},pe,{
        id:uid(),
        clientId:clientId,
        matterId:matterId,
        contactId:contactId
      });
      delete ne._clientName; delete ne._matterName; delete ne._matterNumber; delete ne._contactName;
      _newEntries.push(ne);
      _dirtyEntries[String(ne.id)]=ne;   // granular: only new record needs writing
      added.entries++;
    }
  });
  // Single concat at the end — avoids O(n²) intermediate array allocations
  if(_newEntries.length) ST.entries=ST.entries.concat(_newEntries);

  markLuDirty();
  _invalidateEntryCaches();
  ST._entriesMode='full'; ST._totalEntryCount=ST.entries.length;

  // Bulk-persist all merged collections in one pass — avoids opening hundreds of
  // IndexedDB transactions (one per saveOne call), which freezes the UI and crashes
  // Safari. _dirtyEntries was populated granularly above (only new/updated records),
  // so _flushSave writes only the delta rather than the entire ST.entries array.
  _markDirty('clients'); _markDirty('matters'); _markDirty('contacts'); _markDirty('entries');
  _flushSave();

  return 'Imported: '+added.clients+' new clients, '+added.matters+' matters, '+added.contacts+' contacts, '+added.entries+' new entries, '+added.updated+' entries updated';
}

// ── Linkage Review Modal ─────────────────────────────────────────────────────
// Shown when _detectImportConflicts finds entities that couldn't be matched.
// For each conflict the user picks: link to an existing record OR add as new.
// Choices can be saved as linkage rules so future imports auto-resolve.
function buildLinkageReviewModal(){
  var d=ST._pendingLinkage;
  if(!d||!d.conflicts||!d.conflicts.length) return '';
  var pkg=d.pkg;

  function _section(type,label,icon){
    var items=d.conflicts.filter(function(c){return c.type===type;});
    if(!items.length) return '';
    var localArr=type==='client'?ST.clients:type==='matter'?ST.matters:ST.contacts;
    var rows=items.map(function(c,i){
      var selId='lnk-sel-'+type+'-'+i;
      var chkId='lnk-rem-'+type+'-'+i;
      // Pre-select the single suggestion when there is exactly one — otherwise default to "Add as new"
      var preselId=c.suggestions&&c.suggestions.length===1?c.suggestions[0].id:'';
      var opts='<option value="__new__"'+(preselId?'':' selected')+'>➕ Add as new record</option>'
        +localArr.map(function(x){return '<option value="'+H(x.id)+'"'+(x.id===preselId?' selected':'')+'>'+H(x.name)+'</option>';}).join('');
      var hint=c.isSender?'Package sender — not in your contacts':'';
      return '<div style="background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:14px 16px;margin-bottom:10px">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px">'
        +'<div class="u-f1">'
        +'<div style="font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:2px">'+label+(c.isSender?' · Sender':'')+'</div>'
        +'<div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+H(c.incomingName)+'">📥 '+H(c.incomingName)+'</div>'
        +(hint?'<div style="font-size:11px;color:var(--ink3);margin-top:2px">'+H(hint)+'</div>':'')
        +(c.staleRule?'<div style="font-size:11px;color:var(--red);margin-top:3px">⚠ Saved rule pointed to a deleted record — please re-link</div>':'')
        +(c.suggestions&&c.suggestions.length?'<div style="font-size:11px;color:var(--amber);margin-top:3px">Similar: '+c.suggestions.map(function(s){return H(s.name);}).join(', ')+'</div>':'')
        +'</div>'
        +'<div style="font-size:22px;color:var(--ink4);line-height:1">🔗</div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
        +'<select id="'+selId+'" aria-label="Map \''+H(c.incomingName)+'\' to existing record" data-lnk-type="'+H(type)+'" data-lnk-pkgid="'+H(c.pkgId)+'" data-lnk-name="'+H(c.incomingName)+'" style="flex:1;padding:8px 12px;border:1px solid var(--brd);border-radius:8px;font-size:13px;background:var(--white);color:var(--ink)">'+opts+'</select>'
        +'</div>'
        +'<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2);cursor:pointer">'
        +'<input type="checkbox" id="'+chkId+'" data-lnk-rem="'+type+'-'+i+'" style="margin:0"> Remember this choice for future imports'
        +'</label>'
        +'</div>';
    }).join('');
    return '<div class="u-mb16"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:8px">'+icon+' '+label+'s ('+items.length+')</div>'+rows+'</div>';
  }

  var typeColors={attorney_submission:'var(--blue)',billing_review:'var(--amber)',partner_approval:'var(--green)'};
  var color=typeColors[pkg._type]||'var(--ink2)';

  var _lnkBody=''
    +'<div style="border-left:3px solid '+color+';padding:10px 14px;background:var(--bg2);border-radius:0 8px 8px 0;margin-bottom:18px">'
    +'<div style="font-size:13px;font-weight:600;margin-bottom:3px">From: '+H(pkg._fromUser||'Unknown')+(pkg._firmName?' \xb7 '+H(pkg._firmName):'')+'</div>'
    +'<div class="u-fs12c2">'+d.conflicts.length+' item'+(d.conflicts.length!==1?'s':'')+' could not be automatically matched to your existing data. '
    +'Link each to an existing record or choose <strong>Add as new record</strong> to create it.</div>'
    +'</div>'
    +_section('client','Client','\ud83c\udfe2')
    +_section('matter','Matter','\ud83d\udcc1')
    +_section('contact','Contact','\ud83d\udc64')
    +'<div style="font-size:11px;color:var(--ink3);background:var(--bg);border-radius:8px;padding:10px 12px;margin-top:4px">'
    +'\ud83d\udca1 <strong>Tip:</strong> Check "Remember this choice" to save the mapping \u2014 future packages from this sender will auto-resolve without prompting.'
    +'</div>';
  return buildModal({size:'md',
    title:'\ud83d\udd17 Resolve Name Conflicts',titleClass:'u-fac8',
    onClose:'A.cancelLinkageReview()',
    modalStyle:'max-height:94vh;display:flex;flex-direction:column',
    bodyClass:'u-scrollf',
    body:_lnkBody,
    footer:'<button class="btn btn-gh" onclick="A.cancelLinkageReview()">Cancel</button>'
      +'<button class="btn btn-dk" onclick="A.confirmLinkageReview()">Apply &amp; Continue \u2192</button>'
  });
}

// Build modal for previewing a workflow package before importing
function buildWorkflowImportPreview(){
  var pkg=ST._pendingWorkflowPkg;
  if(!pkg) return '';
  var typeColors={attorney_submission:'var(--blue)',billing_review:'var(--amber)',partner_approval:'var(--green)'};
  var typeIcons={attorney_submission:'⚖️',billing_review:'🧾',partner_approval:'✅'};
  var color=typeColors[pkg._type]||'var(--ink2)';
  var icon=typeIcons[pkg._type]||'📦';
  var entryList='';
  if(pkg.entries&&pkg.entries.length<=20){
    entryList='<div style="max-height:220px;overflow-y:auto;border:1px solid var(--brd);border-radius:8px;margin-top:10px">'
      +pkg.entries.map(function(e){
        var st=e.status||'pending';
        var stColor={approved:'var(--green)',pending:'var(--amber)',rejected:'var(--red)'}[st]||'var(--ink3)';
        return '<div style="padding:8px 12px;border-bottom:1px solid var(--brd);font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:10px">'
          +'<div class="u-f1"><strong>'+H(e._clientName||'?')+'</strong>'+(e._matterName?' / '+H(e._matterName):'')
          +(e._matterNumber?' <span style="font-family:var(--font-mono);font-size:10px;color:var(--blue)">#'+H(e._matterNumber)+'</span>':'')
          +'<div style="color:var(--ink3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+H(e.description||'—')+(e.abaCode?' <span style="color:var(--blue);font-family:var(--font-mono);font-size:10px">'+H(e.abaCode)+'</span>':'')+'</div></div>'
          +'<div style="text-align:right;white-space:nowrap"><strong>'+$h(e.hours)+'</strong>'
          +'<div style="font-size:11px;color:'+stColor+'">'+H(st)+'</div>'
          +'</div></div>';
      }).join('')
      +'</div>';
  } else if(pkg.entries){
    entryList='<p style="font-size:12px;color:var(--ink3);margin-top:8px">'+pkg.entries.length+' entries (too many to preview individually)</p>';
  }

// === CHANGE DELEGATION ===
// Sync form state BEFORE any dropdown-triggered re-render so typed values survive

// Custom type-ahead for <select> — replaces broken browser cycling.
// Handles: repeated letter press cycles through all matches; single match stays put;
// works correctly across optgroups and any option ordering.
(function(){
  var _k='', _ek='', _i=0, _t=null;
  // Use a stable string key for the element so morph() re-renders don't break cycling.
  // morph patches the DOM in place but may return a new node object; id/name/data-sf are stable.
  function elKey(el){ return el.id||el.name||el.getAttribute('data-sf')||''; }
  document.addEventListener('keydown', function(e){
    var el=e.target;
    if(el.tagName!=='SELECT'||el.disabled) return;
    // Only handle printable single characters; let Tab/Enter/arrows pass through
    if(e.key.length!==1||e.ctrlKey||e.metaKey||e.altKey) return;
    var ch=e.key.toLowerCase();
    e.preventDefault(); // block browser's own (broken) type-ahead
    // Collect navigable options: skip disabled and blank placeholder
    var opts=Array.prototype.slice.call(el.options).filter(function(o){
      return !o.disabled && o.value!=='';
    });
    var matches=opts.filter(function(o){
      return o.text.trim().toLowerCase().charAt(0)===ch;
    });
    if(!matches.length) return;
    var ek=elKey(el);
    // Same key on same element (by stable id/name/data-sf key) within 1.2 s → advance; otherwise restart
    var idx=(_k===ch&&_ek===ek) ? (_i+1)%matches.length : 0;
    el.value=matches[idx].value;
    el.dispatchEvent(new Event('change',{bubbles:true}));
    _k=ch; _ek=ek; _i=idx;
    if(_t) clearTimeout(_t);
    _t=setTimeout(function(){_k='';_ek='';_i=0;},1200);
  });
})();

document.addEventListener('change',function(e){

      var r=autoRate(ST.ef.clientId||'',ST.ef.matterId||'',ST.ef.contactId||'',_efDateD);
      if(r){ ST.ef.rate=String(r); ST.ef._autoRate=String(r); }

    ST.ef.clientId=e.target.value; ST.ef.matterId='';

    var _efDate1=ST.ef.date||today();
    var r1=autoRate(e.target.value,'',ST.ef.contactId||'',_efDate1);

    }
    render();
  }
  else if(id==='ef-ma'){

    ST.ef.matterId=e.target.value;
    var _efDate2=ST.ef.date||today();
    // Only auto-fill rate if rate is blank or was itself auto-filled (not manually typed).
    var r2=autoRate(ST.ef.clientId||'',e.target.value,ST.ef.contactId||'',_efDate2);
    var _rateIsCustom2=ST.ef.rate&&ST.ef.rate!==ST.ef._autoRate;

  else if(id==='ef-ct'){

    render();
  }
  else if(id==='mf-cl'){
    ST.mf.clientId=e.target.value; ST.mf.linkedClientPeopleIds=[]; render();
  }
  else if(id==='cf-ct'){
    var val=e.target.value;
    if(!val) return;
    syncForm();
    var ids=ST.cf.contactIds||[];
    if(!ids.some(function(x){return x==Number(val);}))ST.cf.contactIds=ids.concat([Number(val)]);
    render();
  }
  else if(id==='cf-grp'){
    // Live-update group inheritance hint in client form
    ST.cf.groupId=e.target.value||'';
    render();
  }
  else if(id==='gf-ct'){
    var gval=e.target.value;
    if(!gval) return;
    syncForm();
    var gids=ST.gf.contactIds||[];
    if(!gids.some(function(x){return x==Number(gval);}))ST.gf.contactIds=gids.concat([Number(gval)]);
    render();
  }
  // Invoice form: update matter dropdown when client changes
  else if(id==='inv-cl'){
    if(ST.invf) ST.invf.clientId=e.target.value;
    render();
  }
  else if(id==='inv-mt'){
    if(ST.invf) ST.invf.matterId=e.target.value;
    render();
  }

  else if(id==='pref-inv'){

  }
});

// === TAB LOCK
// Prevents in-memory ST object from silently overwriting IndexedDB changes made
// by a concurrent tab. Strategy: one tab holds a heartbeat lock in localStorage.
// Any second tab that detects a live lock shows a blocking overlay instead of
// running normally. BroadcastChannel provides zero-latency release signalling;
// localStorage polling is the fallback for browsers without BroadcastChannel.
(function(){
  var TAB_ID   = String(Date.now())+'-'+Math.random().toString(36).slice(2,8);
  var LOCK_KEY = 'bl-tab-lock';    // {id,ts} — heartbeat written every HB_MS
  var CLAIM_KEY= 'bl-tab-claim';   // sessionStorage flag: this tab is taking over
  var HB_MS    = 2000;             // heartbeat interval (ms)
  var STALE_MS = 5500;             // lock expires after this silence

  var _hbTimer=null;
  var _watchTimer=null;
  var _bc=null;
  try{ _bc=new BroadcastChannel('sml-tab-lock'); }catch(e){}

  function _now(){ return Date.now(); }

  function _getLock(){
    try{ var raw=localStorage.getItem(LOCK_KEY); return raw?JSON.parse(raw):null; }catch(e){ return null; }
  }
  function _writeLock(){
    try{ localStorage.setItem(LOCK_KEY,JSON.stringify({id:TAB_ID,ts:_now()})); }catch(e){}
  }
  function _releaseLock(){
    clearInterval(_hbTimer); _hbTimer=null;
    try{ var l=_getLock(); if(l&&l.id===TAB_ID) localStorage.removeItem(LOCK_KEY); }catch(e){}
    if(_bc) try{ _bc.postMessage({type:'released',id:TAB_ID}); }catch(e){}
  }
  function _isStale(l){ return !l||(_now()-l.ts>STALE_MS); }

  function _claimLock(){
    _writeLock();
    clearInterval(_hbTimer);
    _hbTimer=setInterval(_writeLock, HB_MS);
  }

  function _showOverlay(){
    var el=document.getElementById('z-tablock');
    if(el) el.style.display='flex';
    var ld=document.getElementById('loading');
    if(ld) ld.style.display='none';
  }
  function _hideOverlay(){
    var el=document.getElementById('z-tablock');
    if(el) el.style.display='none';
    clearTimeout(_watchTimer); _watchTimer=null;
  }

  // Poll while locked: auto-proceed when the primary tab goes quiet
  function _startWatch(){
    clearTimeout(_watchTimer);
    _watchTimer=setTimeout(function(){
      if(_isStale(_getLock())){
        // Primary tab gone — claim and reload fresh from IDB
        try{ sessionStorage.setItem(CLAIM_KEY,'1'); }catch(e){}
        _claimLock();
        location.reload();
      } else {
        _startWatch();
      }
    }, STALE_MS+500);
  }

  // ── Button handlers (attached before lock-check so they always exist) ────────
  window._tabRecheck=function(){
    if(_isStale(_getLock())){
      try{ sessionStorage.setItem(CLAIM_KEY,'1'); }catch(e){}
      _claimLock();
      location.reload();
    } else {
      // Visual nudge — nothing changed
      var el=document.getElementById('z-tablock');
      if(el){ el.style.opacity='.6'; setTimeout(function(){if(el)el.style.opacity='';},250); }
    }
  };
  window._tabTakeOver=function(){
    // Signal to BroadcastChannel peers that they should yield
    if(_bc) try{ _bc.postMessage({type:'takeover'}); }catch(e){}
    // Forcibly remove the current lock so our reload sees no live lock
    try{ localStorage.removeItem(LOCK_KEY); }catch(e){}
    // sessionStorage survives location.reload() — tells this tab to skip the
    // lock check on the next load and claim immediately
    try{ sessionStorage.setItem(CLAIM_KEY,'1'); }catch(e){}
    location.reload();
  };

  // ── Main lock check ───────────────────────────────────────────────────────────
  // If sessionStorage flag is set, this is a post-takeover or post-watch reload:
  // skip the lock check entirely and claim the lock as the new primary tab.
  var isClaiming=false;
  try{ isClaiming=!!sessionStorage.getItem(CLAIM_KEY); }catch(e){}
  if(isClaiming){
    try{ sessionStorage.removeItem(CLAIM_KEY); }catch(e){}
    _claimLock();
    // Must register the takeover listener here — same as the normal primary path.
    // Without this, a tab that became primary via takeover is deaf to the next one.
    if(_bc){
      _bc.onmessage=function(ev){
        if(ev&&ev.data&&ev.data.type==='takeover'){
          clearInterval(_hbTimer); _hbTimer=null;
          _showOverlay();
        }
      };
    }
    window.addEventListener('pagehide', _releaseLock);
    window.addEventListener('beforeunload', _releaseLock);
    return; // fall through to INIT normally
  }

  var existing=_getLock();
  if(!_isStale(existing)&&existing.id!==TAB_ID){
    // Another live tab holds the lock — show blocking overlay
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded',_showOverlay);
    } else {
      _showOverlay();
    }
    // BroadcastChannel: zero-latency signals from the primary tab
    if(_bc){
      _bc.onmessage=function(ev){
        if(!ev||!ev.data) return;
        if(ev.data.type==='released'||ev.data.type==='takeover'){
          // Primary tab released or is being superseded — this tab can proceed
          clearTimeout(_watchTimer);
          try{ sessionStorage.setItem(CLAIM_KEY,'1'); }catch(e){}
          _claimLock();
          location.reload();
        }
      };
    }
    _startWatch();
    return; // do NOT run INIT
  }

  // This tab is already the rightful primary (first open, or lock was stale)
  _claimLock();
  if(_bc){
    _bc.onmessage=function(ev){
      // Another tab sent 'takeover' — stop our heartbeat AND self-lock this tab
      if(ev&&ev.data&&ev.data.type==='takeover'){
        clearInterval(_hbTimer); _hbTimer=null;
        // Show the lock overlay on this (now-demoted) tab so it can't write to IDB
        _showOverlay();
      }
    };
  }
  window.addEventListener('pagehide', _releaseLock);
  window.addEventListener('beforeunload', _releaseLock);
})();

// === FATAL ERROR BOUNDARY
// Called when INIT Promise.all rejects or a critical load step throws.
// Works with raw DOM only — no ST, render(), or app state required.
// Shows a blocking overlay with an IDB salvage-export and a reset option.
function showFatalError(err, hint) {
  var loading = document.getElementById('loading');
  var app     = document.getElementById('app');
  if (loading) loading.style.display = 'none';
  if (app)     app.style.display     = 'none';

  var msg = err ? (err.message || String(err)) : 'Unknown startup error';
  // Sanitise for raw innerHTML (no html`` helper available at this call site)
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  var panel = document.createElement('div');
  panel.id = 'fatal-error-boundary';
  panel.style.cssText = [
    'position:fixed','inset:0','background:#0f172a','color:#f1f5f9',
    'display:flex','align-items:center','justify-content:center',
    'z-index:99999','font-family:system-ui,sans-serif','padding:24px'
  ].join(';');

  panel.innerHTML =
    '<div style="max-width:580px;width:100%;">' +
      '<div style="font-size:2.2rem;margin-bottom:10px;line-height:1;">&#9888;</div>' +
      '<h1 style="font-size:1.35rem;font-weight:700;margin:0 0 10px;color:#fbbf24;">' +
        'Database Error &mdash; Action Required</h1>' +
      '<p style="margin:0 0 16px;color:#94a3b8;line-height:1.65;">' +
        'SixMinuteLog failed to load your data from IndexedDB. ' +
        '<strong style="color:#f1f5f9;">Do not reset or refresh</strong> until you ' +
        'have exported &mdash; your records may still be recoverable.</p>' +
      '<div style="background:#1e293b;border:1px solid #334155;border-radius:8px;' +
           'padding:10px 14px;margin-bottom:20px;font-family:monospace;font-size:0.78rem;' +
           'color:#f87171;word-break:break-all;">' +
        esc(msg) +
        (hint ? '<br><span style="color:#64748b;">' + esc(hint) + '</span>' : '') +
      '</div>' +
      '<div style="margin-bottom:20px;color:#cbd5e1;font-size:0.88rem;line-height:1.7;">' +
        '<strong style="color:#f1f5f9;">Step 1.</strong> Click ' +
        '<em>Export Salvaged Data</em> &mdash; reads every collection directly ' +
        'from IndexedDB and downloads a JSON backup of whatever is intact.<br>' +
        '<strong style="color:#f1f5f9;">Step 2.</strong> Once you have the file, ' +
        'click <em>Reset &amp; Start Fresh</em> to clear the corrupted database.<br>' +
        '<strong style="color:#f1f5f9;">Step 3.</strong> On the fresh install, use ' +
        'Settings &rarr; Restore Backup to re-import your data.' +
      '</div>' +
      '<div style="display:flex;gap:10px;flex-wrap:wrap;">' +
        '<button id="fe-export" style="background:#2563eb;color:#fff;border:none;border-radius:6px;' +
          'padding:10px 22px;font-size:0.92rem;font-weight:600;cursor:pointer;">' +
          '&#8595; Export Salvaged Data</button>' +
        '<button id="fe-reset" style="background:#7f1d1d;color:#fca5a5;' +
          'border:1px solid #991b1b;border-radius:6px;padding:10px 22px;' +
          'font-size:0.92rem;font-weight:600;cursor:pointer;">' +
          '&#10005; Reset &amp; Start Fresh</button>' +
        '<button id="fe-reload" style="background:transparent;color:#64748b;' +
          'border:1px solid #334155;border-radius:6px;padding:10px 22px;' +
          'font-size:0.92rem;cursor:pointer;">&#8635; Try Reload</button>' +
      '</div>' +
      '<p id="fe-status" style="margin:14px 0 0;font-size:0.8rem;color:#64748b;min-height:1.2em;"></p>' +
    '</div>';

  document.body.appendChild(panel);

  var status = document.getElementById('fe-status');

  // --- Export: attempt to read each collection/meta directly from IDB ---
  document.getElementById('fe-export').addEventListener('click', function() {
    var btn = this;
    btn.disabled = true;
    status.style.color = '#94a3b8';
    status.textContent = 'Reading IndexedDB\u2026';

    var collections = ['clients','matters','entries','contacts','invoices','groups'];
    var metaKeys    = ['user','prefs','descpresets','mailpresets','itmode',
                       'mailplaceholders','linkageRules'];
    var salvage = {
      _exportedAt:   new Date().toISOString(),
      _errorMessage: msg,
      _appVersion:   'SixMinuteLog',
      collections:   {},
      meta:          {}
    };

    var colPs = collections.map(function(c) {
      return Store.getAll(c)
        .then(function(d){ salvage.collections[c] = d || []; })
        .catch(function(e2){
          console.warn('showFatalError: salvage getAll('+c+') failed', e2);
          salvage.collections[c] = null; // null signals "unreadable"
        });
    });
    var metaPs = metaKeys.map(function(k) {
      return Store.getMeta(k)
        .then(function(d){ salvage.meta[k] = d; })
        .catch(function(){  salvage.meta[k] = null; });
    });

    Promise.all(colPs.concat(metaPs)).then(function() {
      try {
        var json = JSON.stringify(salvage, null, 2);
        var blob = new Blob([json], {type: 'application/json'});
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href     = url;
        a.download = 'sml-salvage-' + new Date().toISOString().slice(0,10) + '.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
        status.style.color = '#4ade80';
        status.textContent = '\u2713 Export downloaded. Safe to reset when ready.';
      } catch(e3) {
        status.style.color = '#f87171';
        status.textContent = 'Serialisation failed: ' + esc(e3.message || String(e3));
      }
      btn.disabled = false;
    }).catch(function(e4) {
      status.style.color = '#f87171';
      status.textContent = 'Export failed: ' + esc(e4.message || String(e4));
      btn.disabled = false;
    });
  });

  // --- Reset: wipe IDB then hard reload ---
  document.getElementById('fe-reset').addEventListener('click', function() {
    if (!confirm(
      'This permanently deletes ALL local data.\n' +
      'Only proceed after exporting your salvage file.\n\n' +
      'Continue?'
    )) return;
    Store.clearData()
      .then(function(){ location.reload(); })
      .catch(function(){ location.reload(); });
  });

  document.getElementById('fe-reload').addEventListener('click', function() {
    location.reload();
  });
}

// === GLOBAL ERROR BOUNDARY
// Catches runtime crashes and unhandled promise rejections (e.g. IDB save failures)
// that would otherwise fail silently after startup. Works with raw DOM only —
// no ST, render(), or app state required. Uses the same salvage path as showFatalError().
//
// Strategy:
//   • Before app ready  → show full fatal-error boundary (same as INIT failure)
//   • After app ready   → show a non-blocking corner panel (preserves the live UI)
//     - IDB/quota errors get an "Export Data" salvage button
//     - Other runtime errors auto-dismiss after 15 s
//   • Error storms are suppressed (max 3 panels; exact-message dedupe)

var _appReady          = false;  // set true after INIT Promise.all resolves
var _runtimeErrCount   = 0;      // suppress error storms
var _lastRuntimeErrKey = '';     // deduplicate identical consecutive errors

// Lightweight HTML-escaper safe to call with no app helpers available
function _escGEB(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Classify a rejection reason as IDB-related so we can offer the salvage button
function _isIDBError(reason) {
  return /idb|indexeddb|transaction|quota|abort|domexception/i.test(String(reason));
}

// Non-blocking corner panel — does NOT hide the app UI.
// For IDB errors it shows a salvage button that delegates to showFatalError().
function _showRuntimeWarning(err, isIDB) {
  try {
    // Replace any existing panel (avoids stacking)
    var old = document.getElementById('runtime-err-panel');
    if (old && old.parentNode) old.parentNode.removeChild(old);

    var msg = err ? (err.message || String(err)) : 'Unknown error';

    var panel = document.createElement('div');
    panel.id = 'runtime-err-panel';
    panel.style.cssText = [
      'position:fixed','bottom:80px','right:20px','z-index:98000',
      'background:#1e293b','border:1px solid ' + (isIDB ? '#991b1b' : '#475569'),
      'border-radius:10px','padding:14px 16px','max-width:380px',
      'font-family:system-ui,sans-serif','color:#f1f5f9',
      'box-shadow:0 8px 32px rgba(0,0,0,.6)'
    ].join(';');

    panel.innerHTML =
      '<div style="display:flex;align-items:flex-start;gap:10px;">' +
        '<span style="font-size:1.25rem;line-height:1.1;flex-shrink:0;">' +
          (isIDB ? '&#9888;' : '&#9432;') +
        '</span>' +
        '<div style="flex:1;min-width:0;">' +
          '<p style="margin:0 0 4px;font-weight:700;font-size:0.88rem;color:' +
            (isIDB ? '#fbbf24' : '#93c5fd') + ';">' +
            _escGEB(isIDB ? 'Database Save Warning' : 'Runtime Error') +

// window.onerror — synchronous JS runtime errors
window.onerror = function(msg, source, lineno, colno, err) {
  try {
    // Ignore cross-origin script errors we cannot inspect
    if (msg === 'Script error.' && !err) return;

    var errObj = err || new Error(String(msg || 'Unknown runtime error'));
    var key    = String(msg).slice(0, 140);

    if (key === _lastRuntimeErrKey) return; // deduplicate same-message storms
    _lastRuntimeErrKey = key;
    _runtimeErrCount++;

    console.error('Global onerror (count=' + _runtimeErrCount + '):', errObj);

    if (!_appReady) {
      // App never finished initialising — full fatal boundary is appropriate
      showFatalError(errObj, 'Uncaught error occurred before the app finished loading.');
      return;
    }

    if (_runtimeErrCount <= 3) {
      _showRuntimeWarning(errObj, false);
    }
  } catch(e2) { /* never throw inside an error handler */ }
};

// window.unhandledrejection — async/Promise errors (IDB saves, workers, fetch, etc.)
window.addEventListener('unhandledrejection', function(event) {
  try {
    var reason = (event && event.reason) !== undefined ? event.reason : 'Unhandled rejection';
    var errObj = (reason instanceof Error) ? reason : new Error(String(reason));
    var key    = String(reason).slice(0, 140);

    if (key === _lastRuntimeErrKey) return;
    _lastRuntimeErrKey = key;
    _runtimeErrCount++;

    var isIDB = _isIDBError(reason);

    console.error('Global unhandledrejection (count=' + _runtimeErrCount + ', idb=' + isIDB + '):', errObj);

    if (!_appReady) {
      showFatalError(errObj,
        'Unhandled promise rejection before the app finished loading. ' +
        'Your data has NOT been modified.');
      return;
    }

    if (_runtimeErrCount <= 3) {
      _showRuntimeWarning(errObj, isIDB);
    }
  } catch(e2) { /* never throw inside an error handler */ }
});
