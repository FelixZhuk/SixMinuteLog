<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%227%22%20fill%3D%22%232560D0%22%2F%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%2211%22%20fill%3D%22none%22%20stroke%3D%22%23fff%22%20stroke-width%3D%222%22%2F%3E%3Cline%20x1%3D%2216%22%20y1%3D%228%22%20x2%3D%2216%22%20y2%3D%2216%22%20stroke%3D%22%23fff%22%20stroke-width%3D%222.4%22%20stroke-linecap%3D%22round%22%2F%3E%3Cline%20x1%3D%2216%22%20y1%3D%2216%22%20x2%3D%2222%22%20y2%3D%2212.5%22%20stroke%3D%22%23fff%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%2F%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%222%22%20fill%3D%22%23fff%22%2F%3E%3C%2Fsvg%3E">
<title>SixMinuteLog.com</title>
<style>
:root{
  --bg:#F0F0EC;--white:#FAFAF7;--border:#D4D2C8;--border-l:#E4E2DA;
  --ink:#1C1C18;--ink2:#5C5C52;--ink3:#6C6C62;
  --green:#1A7A50;--blue:#2850A8;--red:#B83030;--amber:#8A6010;--purple:#5030A0;
  --gold:#1C1C18;
  --r:5px;--sh:0 1px 3px rgba(20,20,16,.06),0 0 0 1px rgba(20,20,16,.04);--sh-lg:0 8px 32px rgba(20,20,16,.11),0 0 0 1px rgba(20,20,16,.05);
  /* Layout sizing */
  --space-sm:14px;--space-md:20px;--space-lg:24px;
  --card-pad:20px;--fbox-pad:24px;--field-pad:9px 13px;
  /* Shorthand aliases */
  --brd:#D4D2C8;--bg2:#E8E6DC;--blue-pale:#EBF0FA;
  /* Accent (logo mark, primary CTA) */
  --accent:#2560D0;
  /* Semantic tint palette — bg/border/text for colored badges, pills, notices, stats */
  --green-bg:#E8F4EE;--green-border:#A0CEB8;
  --amber-bg:#F4F0E4;--amber-border:#C8B870;
  --note-bg:#F4F0DC;--note-border:#D8C880;--note-text:#7A5200;
  --blue-bg:#EAF0FC;--blue-border:#A8C4E8;
  --blue-info-bg:#EAF0F8;--blue-info-border:#A8C0E0;--blue-info-text:#1A3880;
  --purple-bg:#F0EAF8;--purple-border:#C0A8E0;
  --red-bg:#F8EAEA;--red-border:#D8B0B0;--red-text-muted:#882020;
  --red-input-bg:#FDF0EE;
  /* Active timer row tint */
  --row-warn-bg:#fdf5f0;--row-warn-border:#e8c8c0;
  /* Elevated surface (header/fbox in dark; same as white in light) */
  --surface-deep:var(--white);
  /* NDS serif font stack - no external deps */
  --font-serif:Georgia,'Times New Roman',ui-serif,serif;
  --font-sans:ui-sans-serif,system-ui,-apple-system,'Helvetica Neue',sans-serif;
  --font-mono:'Courier New',ui-monospace,monospace;
}

/* == Dark Mode == */
body.dark{
  --bg:#131312;--white:#1E1E1C;--border:#303030;--border-l:#282826;
  --ink:#EDECEA;--ink2:#A0A096;--ink3:#8E8E84;
  --green:#30C878;--blue:#5888E8;--red:#E05050;--amber:#E0A830;--purple:#8858E8;
  --gold:#EDECEA;
  --sh:0 1px 4px rgba(0,0,0,.45);--sh-lg:0 8px 32px rgba(0,0,0,.6);
  --brd:#303030;--bg2:#242422;--blue-pale:#181C30;
  --accent:#5888E8;
  --green-bg:#081808;--green-border:#0E3018;
  --amber-bg:#181600;--amber-border:#302800;
  --note-bg:#181600;--note-border:#302800;--note-text:#C8B840;
  --blue-bg:#101828;--blue-border:rgba(88,136,232,.25);
  --blue-info-bg:#0C1424;--blue-info-border:rgba(88,136,232,.25);--blue-info-text:#88B0F0;
  --purple-bg:#140C24;--purple-border:rgba(136,88,232,.25);
  --red-bg:#200808;--red-border:#481010;--red-text-muted:#E07070;
  --red-input-bg:#200A0A;
  /* Active timer row tint */
  --row-warn-bg:#1C0808;--row-warn-border:#2A1010;
  --surface-deep:#181816;
}
body.dark .header{background:var(--surface-deep);border-color:#2A2A28}
body.dark .fbox{background:var(--surface-deep)}
body.dark .fl input,body.dark .fl select,body.dark .fl textarea{background:var(--bg);color:var(--ink)}
body.dark .fl input.err,body.dark .fl select.err{background:var(--red-input-bg)}
body.dark .btn-gh{background:var(--white);color:var(--ink)}
body.dark .btn-gh:hover{background:var(--bg2)}
body.dark .btn-ic{background:var(--white);color:var(--ink);border-color:var(--border)}
body.dark .btn-ic:hover{background:var(--bg2)}
body.dark .btn-dk{background:var(--ink);color:var(--bg);border-color:var(--ink)}
body.dark .btn-dk:hover{background:#D8D8D4;border-color:#D8D8D4}
body.dark .btn-gr{background:#1A7A50;color:#fff;border-color:#1A7A50}
body.dark .btn-rd{background:#B83030;color:#fff;border-color:#B83030}
body.dark #fab{background:var(--gold);color:var(--bg)}
body.dark .sc{background:var(--white)}
body.dark .twrap{background:var(--white)}
body.dark thead tr{background:var(--bg)}
body.dark tr:hover td{background:var(--white)}
body.dark .card{background:var(--white)}
body.dark .preset-btn{background:var(--white)}
body.dark .crow{background:var(--white)}
body.dark .up-box{background:var(--white)}
body.dark .active-tmr-banner{background:var(--red-bg);border-color:var(--red)}
body.dark .appr-panel{background:var(--white)}
body.dark .help-body{color:var(--ink)}
body.dark .help-nav button{color:var(--ink2)}
body.dark .help-nav button.on{background:var(--surface-deep);color:var(--ink)}
body.dark #loading{background:var(--bg);color:var(--ink2)}
body.dark .desc-chip{background:var(--surface-deep);border-color:var(--border);color:var(--ink2)}
body.dark .desc-chip:hover{background:var(--white);color:var(--ink)}
body.dark .mail-preset-card{background:var(--white);border-color:var(--border)}
body.dark select{background:var(--white);color:var(--ink);border-color:var(--border)}
body.dark .fab-tog{background:var(--border)}

/* == Scrollbars == */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg);border-radius:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--ink3)}
::-webkit-scrollbar-corner{background:var(--bg)}
.nav::-webkit-scrollbar{display:none}

/* == Layout Sizes == */
body.layout-compact{--space-sm:10px;--space-md:14px;--space-lg:16px;--card-pad:12px;--fbox-pad:16px;--field-pad:7px 11px;font-size:13px}
body.layout-compact .main{padding:16px 14px}
body.layout-compact .card{padding:var(--card-pad)}
body.layout-compact .fbox{padding:var(--fbox-pad)}
body.layout-compact .fl input,.layout-compact .fl select,.layout-compact .fl textarea{padding:var(--field-pad);font-size:12px}
body.layout-compact th,body.layout-compact td{padding:7px 10px;font-size:12px}
body.layout-compact .btn{padding:7px 12px;font-size:12px}
body.layout-compact .sc{padding:10px 14px}
body.layout-compact .sc-val{font-size:1.2rem}
body.layout-compact .srow{gap:8px;margin-bottom:14px}
body.layout-compact .modal-bd{padding:16px 18px}

body.layout-spacious{--space-sm:18px;--space-md:28px;--space-lg:32px;--card-pad:26px;--fbox-pad:30px;--field-pad:12px 16px;font-size:15px}
body.layout-spacious .main{padding:32px 28px}
body.layout-spacious .card{padding:var(--card-pad)}
body.layout-spacious .fbox{padding:var(--fbox-pad)}
body.layout-spacious .fl input,.layout-spacious .fl select,.layout-spacious .fl textarea{padding:var(--field-pad);font-size:14px}
body.layout-spacious th,body.layout-spacious td{padding:13px 18px;font-size:14px}
body.layout-spacious .btn{padding:11px 20px;font-size:14px}
body.layout-spacious .sc{padding:18px 24px}
body.layout-spacious .sc-val{font-size:1.6rem}
body.layout-spacious .srow{gap:16px;margin-bottom:26px}

/* == Rate History Tables == */
.rate-hist-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.rate-hist-table th{text-align:left;padding:5px 8px;background:var(--bg2);color:var(--ink3);font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--font-mono)}
.rate-hist-table td{padding:6px 8px;border-bottom:1px solid var(--border-l);vertical-align:middle}
.rate-hist-table tr:last-child td{border-bottom:none}
.rate-hist-table input[type=date],.rate-hist-table input[type=number],.rate-hist-table input[type=text]{padding:4px 7px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--white);color:var(--ink);width:100%}
.rate-hist-add{display:grid;grid-template-columns:1fr 1fr 2fr auto;gap:6px;align-items:end;margin-top:8px}
.rate-hist-add select{padding:4px 7px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--white);color:var(--ink)}
.rate-section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rate-section-hd h4{font-size:10px;font-weight:700;color:var(--ink2);margin:0;text-transform:uppercase;letter-spacing:.08em;font-family:var(--font-mono)}
.rate-section-hd small{font-size:10px;color:var(--ink3);font-family:var(--font-mono)}
.rate-cur-badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:10px;font-weight:700;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);font-family:var(--font-mono);letter-spacing:.04em;text-transform:uppercase}
body.dark .rate-hist-table th{background:var(--bg2)}
body.dark .rate-hist-table input[type=date],body.dark .rate-hist-table input[type=number],body.dark .rate-hist-table input[type=text]{background:#131312;color:var(--ink)}

.desc-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;margin-bottom:2px}
.desc-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:2px;font-size:10.5px;color:var(--ink2);cursor:pointer;transition:all .15s;font-family:var(--font-mono);letter-spacing:.02em}
.desc-chip:hover{background:var(--border);color:var(--ink);border-color:var(--ink3)}
.desc-chip svg{opacity:.6}

/* == Mail Preset Cards == */
.mail-preset-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;position:relative}
.mail-preset-card h4{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--ink);font-family:var(--font-serif)}
.mail-preset-card p{font-size:10.5px;color:var(--ink3);margin-bottom:2px;font-family:var(--font-mono);letter-spacing:.02em}
.mail-preset-card .mp-acts{position:absolute;top:10px;right:10px;display:flex;gap:4px}

/* == Preset List Items == */
.preset-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;font-size:13px}
.preset-item span{flex:1;color:var(--ink)}
.preset-item button{padding:4px 6px;border:none;background:transparent;color:var(--ink3);border-radius:3px;cursor:pointer}
.preset-item button:hover{color:var(--red);background:var(--red-bg)}

/* == Settings Tab Nav == */
.set-tabs{display:flex;gap:2px;margin-bottom:22px;background:var(--bg2);padding:3px;border-radius:var(--r);flex-wrap:wrap}
.set-tab{padding:7px 13px;border:none;background:transparent;border-radius:3px;font-size:10.5px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all .12s;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-mono)}
.set-tab:hover{color:var(--ink2)}
.set-tab.on{background:var(--white);color:var(--ink);box-shadow:var(--sh)}
body.dark .set-tabs{background:var(--bg)}
body.dark .set-tab.on{background:var(--white)}
body.dark .avatar-dark{background:var(--ink);color:var(--bg);font-size:1rem}
body.dark .nav-btn{color:var(--ink3)}
body.dark .nav-btn:hover{color:var(--ink2)}
body.dark .nav-btn.on{color:var(--ink);border-bottom-color:var(--gold)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
input,select,textarea,button{font-family:inherit;font-size:14px}
button{cursor:pointer;touch-action:manipulation}
/* iOS: prevent auto-zoom on input focus (font-size must be >=16px on touch devices) */
@media (pointer:coarse){
  .fl input,.fl select,.fl textarea,
  body.layout-compact .fl input,body.layout-compact .fl select,body.layout-compact .fl textarea,
  body.layout-spacious .fl input,body.layout-spacious .fl select,body.layout-spacious .fl textarea{font-size:16px}
}
/* iOS: smooth momentum scrolling for overflow areas */
.modal-bd,.modal,.up-box,.help-body,.help-nav{-webkit-overflow-scrolling:touch}
/* iOS: remove tap highlight flash on buttons/links */
a,button,input,select,textarea{-webkit-tap-highlight-color:transparent}
/* iOS safe area — FAB and toasts clear the home indicator */
#fab{bottom:max(24px,calc(16px + env(safe-area-inset-bottom)))}
#toasts{top:max(16px,calc(8px + env(safe-area-inset-top)));right:max(16px,env(safe-area-inset-right))}

/* Layout */
.header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{color:#fff}
.logo-text{}
.logo h1{font-size:1rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;font-family:var(--font-serif);line-height:1}
.logo-sub{font-size:9.5px;color:var(--ink3);margin-top:2px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-mono)}
.header-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav{max-width:1200px;margin:0 auto;padding:0 24px;overflow-x:auto;display:flex;gap:0}
.nav::-webkit-scrollbar{display:none}
.nav-btn{display:flex;align-items:center;gap:5px;padding:10px 14px;border:none;background:transparent;color:var(--ink3);border-bottom:1.5px solid transparent;cursor:pointer;white-space:nowrap;font-size:12px;font-weight:500;transition:color .12s;letter-spacing:.04em;text-transform:uppercase;font-family:var(--font-mono)}
.nav-btn:hover{color:var(--ink2)}.nav-btn.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:600}
body.dark .nav-btn.on{border-bottom-color:var(--gold)}
.main{max-width:1200px;margin:0 auto;padding:28px 24px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);border:1px solid transparent;font-size:12px;font-weight:600;transition:all .12s;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase;font-family:var(--font-mono)}
.btn:active{transform:scale(.98)}
.btn-dk{background:var(--ink);color:var(--white);border-color:var(--ink)}.btn-dk:hover{opacity:.85}
.btn-gr{background:var(--green);color:#fff;border-color:var(--green)}.btn-gr:hover{opacity:.88}
.btn-bl{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-bl:hover{opacity:.88}
.btn-rd{background:var(--red);color:#fff;border-color:var(--red)}.btn-rd:hover{opacity:.88}
.btn-gh{background:transparent;color:var(--ink2);border-color:var(--border)}.btn-gh:hover{background:var(--bg2);color:var(--ink)}
.btn-ic{padding:7px;border-radius:var(--r);background:transparent;border:1px solid var(--border);color:var(--ink2)}.btn-ic:hover{background:var(--bg2);color:var(--ink)}
.btn:disabled{opacity:.35;cursor:not-allowed}
/* === WCAG 2.2 AA Focus Visibility (2.4.7, 2.4.11) ===
   All interactive elements must have a 3:1-contrast focus indicator. */
:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.btn:focus-visible,.btn-ic:focus-visible,.btn-gh:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.nav-btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.set-tab:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
body.dark :focus-visible{outline-color:var(--gold)}
body.dark .fl input:focus,body.dark .fl select:focus,body.dark .fl textarea:focus{outline-color:var(--gold)}

/* Forms */
.fbox{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:18px}
.fbox h3{font-weight:700;font-size:.85rem;margin-bottom:18px;color:var(--ink);letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-mono)}
.frow{display:grid;gap:14px;margin-bottom:14px}
.frow.c2{grid-template-columns:1fr 1fr}
.frow.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:580px){.frow.c2,.frow.c3{grid-template-columns:1fr}}
.fl label{display:block;font-size:10.5px;color:var(--ink3);margin-bottom:5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:var(--font-mono)}
.fl label .req{color:var(--red);margin-left:2px}
.fl input,.fl select,.fl textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--white);color:var(--ink);outline:none;transition:border .12s;font-family:var(--font-sans)}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--ink);outline:2px solid var(--ink);outline-offset:1px}
.fl input.err,.fl select.err{border-color:var(--red);background:var(--red-input-bg)}
.fl .hint{font-size:10.5px;color:var(--ink3);margin-top:4px;font-family:var(--font-mono);letter-spacing:.03em}
.fl .emsg{font-size:10.5px;color:var(--red);margin-top:4px;font-family:var(--font-mono)}
.fl .pw{position:relative}
.fl .pw .pfx{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
.fl .pw .sfx{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none;font-size:12px}
.fl .pw input{padding-left:26px}
.fl .pw input.has-sfx{padding-right:32px}
.fa{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}

/* Cards */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.avatar{width:38px;height:38px;border-radius:3px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;border:1px solid var(--border);font-family:var(--font-mono);letter-spacing:.02em}
.card-act button{padding:5px;border:none;background:transparent;color:var(--ink3);border-radius:3px;touch-action:manipulation}
.card-act button:hover{color:var(--ink);background:var(--bg2)}
.card h3{font-weight:700;font-size:.9rem;margin-bottom:3px;letter-spacing:-.01em;font-family:var(--font-serif)}
.card p{font-size:12px;color:var(--ink2);margin-bottom:2px;line-height:1.55}
.card-rate{margin-top:12px;padding-top:12px;border-top:1px solid var(--border-l);font-size:11.5px;color:var(--ink3);font-family:var(--font-mono);letter-spacing:.02em}
.card-rate strong{color:var(--ink)}
.chip{display:inline-block;font-size:10.5px;background:var(--bg2);color:var(--ink2);padding:2px 8px;border-radius:2px;border:1px solid var(--border);margin-bottom:8px;font-family:var(--font-mono);letter-spacing:.03em;text-transform:uppercase}
.split-pill{display:inline-flex;gap:5px;font-size:10.5px;margin-top:6px;font-family:var(--font-mono)}
.split-pill .own{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);padding:2px 8px;border-radius:2px}
.split-pill .firm{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);padding:2px 8px;border-radius:2px}

/* Roles & Approval Status */
.status-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:2px;font-size:10.5px;font-weight:700;white-space:nowrap;letter-spacing:.06em;font-family:var(--font-mono);text-transform:uppercase}
.s-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.s-approved{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.s-review{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.s-neutral{background:var(--bg2);color:var(--ink3);border:1px solid var(--border)}
.s-rejected{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.role-lbl{display:inline-flex;align-items:center;font-size:10.5px;padding:2px 8px;border-radius:2px;font-weight:700;border:1px solid;letter-spacing:.06em;font-family:var(--font-mono);text-transform:uppercase}
.rl-partner{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}
.rl-attorney{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.rl-billing{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.appr-panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:18px;box-shadow:var(--sh)}
.appr-panel h3{font-weight:700;font-size:.8rem;margin-bottom:14px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono)}
.role-notice{background:var(--blue-info-bg);border:1px solid var(--blue-info-border);border-radius:var(--r);padding:11px 15px;margin-bottom:16px;font-size:12.5px;color:var(--blue-info-text);display:flex;align-items:center;gap:10px}

/* Stats — NDS: large serif numbers, monospace uppercase labels */
.srow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;box-shadow:var(--sh)}
.sc-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:700;font-family:var(--font-mono)}
.sc-val{font-size:1.8rem;font-weight:400;color:var(--ink);letter-spacing:-.03em;font-family:var(--font-serif);line-height:1}
.sc.highlight{border-color:var(--green-border);background:var(--green-bg)}.sc.highlight .sc-val{color:var(--green)}
.sc.highlight2{border-color:var(--amber-border);background:var(--amber-bg)}.sc.highlight2 .sc-val{color:var(--amber)}

/* Table */
.twrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
th{padding:9px 14px;text-align:left;font-weight:700;color:var(--ink3);font-size:9.5px;white-space:nowrap;text-transform:uppercase;letter-spacing:.1em;font-family:var(--font-mono)}
td{padding:10px 14px;border-bottom:1px solid var(--border-l);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.tda{display:flex;gap:4px}
.tda button{padding:5px;border:none;background:transparent;color:var(--ink3);border-radius:3px;touch-action:manipulation;display:inline-flex;align-items:center;justify-content:center}
.tda button:hover{color:var(--ink);background:var(--bg2)}
.badge{width:26px;height:26px;border-radius:2px;background:var(--bg2);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink2);font-family:var(--font-mono)}

/* Modals */
.ov{position:fixed;inset:0;background:rgba(20,17,10,.6);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;backdrop-filter:blur(3px)}
.modal{background:var(--white);border-radius:var(--r);width:100%;box-shadow:var(--sh-lg);display:flex;flex-direction:column;max-height:90vh;border:1px solid var(--border)}
.modal-sm{max-width:480px}.modal-md{max-width:580px}.modal-lg{max-width:760px}.modal-xl{max-width:1040px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-hd h2{font-size:.82rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-family:var(--font-mono)}
.modal-bd{overflow-y:auto;padding:22px 24px;flex:1;min-height:0}
.modal-ft{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;flex-wrap:wrap}

/* Toast */
#toasts{position:fixed;top:16px;right:16px;z-index:9000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:10px 16px;border-radius:var(--r);color:#fff;font-size:11px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:tin .22s ease;pointer-events:auto;letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-mono)}
.t-ok{background:var(--green)}.t-warn{background:var(--amber)}.t-err{background:var(--red)}
@keyframes tin{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Quick Log */
.ql-timer{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.timer-num{font-size:2.2rem;font-weight:400;font-family:var(--font-serif);letter-spacing:.04em;min-width:115px}
.timer-on{color:var(--ink)}.timer-off{color:var(--ink3)}
.total-pill{background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--r);padding:7px 14px;font-size:12px;color:var(--green);margin-bottom:14px;font-family:var(--font-mono);font-weight:700;letter-spacing:.04em}
/* Row timer */
.row-tmr-live{font-family:var(--font-serif);font-size:11px;color:var(--red);font-weight:700;letter-spacing:.02em;vertical-align:middle;margin-right:2px}
.row-tmr-stop{color:var(--red)!important;animation:tmr-pulse 1.2s ease-in-out infinite}
@keyframes tmr-pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Active timer banner */
.active-tmr-banner{background:var(--white);border:1.5px solid var(--red);border-radius:var(--r);padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.active-tmr-banner .atb-info{flex:1;min-width:0}
.active-tmr-banner .atb-tracking{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:5px;margin-bottom:6px;font-family:var(--font-mono)}
.active-tmr-banner .atb-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:tmr-pulse 1.2s ease-in-out infinite;flex-shrink:0}
.active-tmr-banner .atb-who{font-size:1rem;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-serif)}
.active-tmr-banner .atb-desc{font-size:12px;color:var(--ink2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.active-tmr-banner .atb-clock{font-family:var(--font-serif);font-size:2.4rem;font-weight:400;color:var(--red);letter-spacing:.02em;flex-shrink:0;min-width:130px;text-align:right}
.active-tmr-banner .atb-stop{flex-shrink:0;padding:9px 18px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-mono)}
.active-tmr-banner .atb-stop:hover{opacity:.85}
/* Table row states when timer running */
tr.tr-active-tmr td{background:var(--row-warn-bg)!important;border-top:1px solid var(--row-warn-border);border-bottom:1px solid var(--row-warn-border)}
tr.tr-active-tmr:first-child td{border-top-color:var(--row-warn-border)}
tr.tr-dimmed td{opacity:.45}
/* QL inline new client/matter */
.ql-new-row{display:flex;gap:6px;align-items:center;margin-top:0}
.ql-new-row input{flex:1;padding:7px 10px;border:1.5px solid var(--ink);border-radius:var(--r);font-size:13px;background:var(--white);color:var(--ink);outline:none}
.ql-new-row .btn-confirm{padding:6px 11px;border-radius:var(--r);background:var(--ink);color:var(--white);border:none;cursor:pointer;font-size:11px;font-weight:700;line-height:1;font-family:var(--font-mono);letter-spacing:.04em;text-transform:uppercase}
.ql-new-row .btn-cancel{padding:6px 10px;border-radius:var(--r);background:transparent;color:var(--ink3);border:1px solid var(--border);cursor:pointer;font-size:11px;line-height:1;font-family:var(--font-mono)}
.ql-new-row .btn-confirm:hover{opacity:.85}.ql-new-row .btn-cancel:hover{color:var(--ink)}

/* Help */
.help-lay{display:flex;flex:1;overflow:hidden;min-height:0}
.help-nav{width:162px;flex-shrink:0;border-right:1px solid var(--border-l);padding:10px;overflow-y:auto}
.help-nav button{display:block;width:100%;text-align:left;padding:8px 11px;border:none;background:transparent;border-radius:3px;font-size:11.5px;color:var(--ink2);cursor:pointer;margin-bottom:2px;font-family:var(--font-mono);letter-spacing:.02em}
.help-nav button:hover{background:var(--bg2);color:var(--ink)}
.help-nav button.on{background:var(--bg2);color:var(--ink);font-weight:700}
.help-body{flex:1;overflow-y:auto;padding:24px}
.help-body h3{font-weight:700;margin-bottom:12px;font-family:var(--font-serif);font-size:1.1rem}
.help-body h4{font-weight:700;color:var(--ink2);margin:18px 0 7px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--font-mono)}
.help-body p,.help-body li{color:var(--ink2);line-height:1.7;font-size:13px}
.help-body ol,.help-body ul{padding-left:18px}
.help-body li{margin-bottom:4px}
.note{background:var(--note-bg);border:1px solid var(--note-border);border-radius:var(--r);padding:10px 14px;margin-top:14px;font-size:12px;color:var(--note-text)}
.good{background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--r);padding:10px 14px;margin-top:14px;font-size:12px;color:var(--green)}
.faq-item{border-bottom:1px solid var(--border-l);padding-bottom:14px;margin-bottom:14px}
.faq-item:last-child{border-bottom:none;margin-bottom:0}
.faq-item strong{display:block;color:var(--ink);margin-bottom:4px;font-size:13px;font-family:var(--font-serif)}

/* Settings */
.set-section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border-l)}
.set-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.set-section h3{font-weight:700;margin-bottom:12px;font-size:.82rem;text-transform:uppercase;letter-spacing:.07em;font-family:var(--font-mono);color:var(--ink2)}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.preset-btn{padding:12px 14px;border:1px solid var(--border);border-radius:var(--r);background:var(--white);cursor:pointer;text-align:left;font-size:12px;transition:border .15s}
.preset-btn:hover{border-color:var(--ink)}
.preset-btn strong{display:block;color:var(--ink);font-size:13px;margin-bottom:1px;font-family:var(--font-serif)}
.crow{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:7px}
.crow input[type=checkbox]{width:14px;height:14px;cursor:pointer;flex-shrink:0;margin-top:1px}
.crow strong{display:block;font-size:13px;color:var(--ink);font-family:var(--font-serif)}
.crow span{font-size:11px;color:var(--ink3)}
.sub-checks{padding-left:20px;margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.sub-check{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink2);cursor:pointer}
.sub-check input{width:13px;height:13px;cursor:pointer}
.danger{background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--r);padding:14px 16px}
.danger h3{color:var(--red);margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:.75rem;font-family:var(--font-mono)}
.danger p{color:var(--red-text-muted);font-size:12px;line-height:1.5;margin-bottom:12px}
.exp-name-preview{font-size:11px;color:var(--blue);background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:var(--r);padding:5px 10px;margin-bottom:14px;font-family:var(--font-mono);letter-spacing:.03em}
.filter-select{padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--white);color:var(--ink)}
.u-desc-text{font-size:12px;color:var(--ink3);margin-bottom:14px;line-height:1.5}

/* Analytics split table */
.split-table{width:100%;font-size:13px;margin-top:8px}
.split-table th{text-align:left;font-size:9.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;padding:6px 10px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-weight:700}
.split-table td{padding:8px 10px;border-bottom:1px solid var(--border-l)}
.split-table tr:last-child td{border-bottom:none;font-weight:600}
.own-amt{color:var(--green)}.firm-amt{color:var(--amber)}
.btn-link{background:none;border:none;padding:0;cursor:pointer;color:var(--blue);text-decoration:underline;font-size:inherit;font-family:inherit;}

/* Analytics */
.bar-row{margin-bottom:14px}
.bar-lbl{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px}
.bar-track{background:var(--bg2);border-radius:2px;height:4px}
.bar-fill{background:var(--ink);border-radius:2px;height:4px;transition:width .5s cubic-bezier(.16,1,.3,1)}

/* ========== SPLASH SCREEN — NDS Aesthetic ========== */
.splash-ov{position:fixed;inset:0;z-index:900;display:flex;align-items:stretch;background:#131312;animation:splashIn .2s ease}
@keyframes splashIn{from{opacity:0}to{opacity:1}}

/* Left hero panel */
.splash-hero{width:380px;flex-shrink:0;background:#131312;display:flex;flex-direction:column;justify-content:space-between;padding:48px 44px;position:relative;overflow:hidden;border-right:1px solid #2A2A28}
.splash-hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(175deg,#1C1C1A 0%,#131312 100%);pointer-events:none}
.splash-logo{display:flex;align-items:center;gap:12px;position:relative}
.splash-logo-mark{width:34px;height:34px;background:var(--accent);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.splash-logo-mark svg{color:#fff}
.splash-logo-name{font-size:.95rem;font-weight:700;color:#EDECEA;letter-spacing:-.02em;font-family:var(--font-serif)}
.splash-tagline{margin-top:auto;padding-top:60px;position:relative}
.splash-tagline h1{font-size:2.2rem;font-weight:400;color:#EDECEA;line-height:1.2;margin-bottom:16px;letter-spacing:-.03em;font-family:var(--font-serif)}
.splash-tagline h1 strong{font-weight:700}
.splash-tagline p{font-size:12px;color:#484840;line-height:1.7;font-family:var(--font-sans)}
.splash-steps{margin-top:40px;display:flex;flex-direction:column;gap:8px;position:relative}
.splash-step{display:flex;align-items:center;gap:10px;font-size:11px;color:#303030;transition:color .2s;font-family:var(--font-mono);letter-spacing:.04em;text-transform:uppercase}
.splash-step.active{color:#A8B8D8}
.splash-step.done{color:#30C878}
.splash-step-dot{width:5px;height:5px;border-radius:50%;background:#303030;flex-shrink:0;transition:background .2s}
.splash-step.active .splash-step-dot{background:#EDECEA}
.splash-step.done .splash-step-dot{background:#30C878}

/* Right form panel */
.splash-form{flex:1;background:var(--bg);display:flex;flex-direction:column;overflow-y:auto}
.splash-form-inner{flex:1;padding:56px 56px 36px;max-width:520px}
.splash-form-inner h2{font-size:1.7rem;font-weight:400;color:var(--ink);margin-bottom:6px;letter-spacing:-.03em;font-family:var(--font-serif)}
.splash-form-inner h2 strong{font-weight:700}
.splash-form-inner .sub{font-size:12.5px;color:var(--ink2);line-height:1.65;margin-bottom:30px;font-family:var(--font-sans)}
.splash-footer{padding:20px 56px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg)}
.splash-footer-note{font-size:10px;color:var(--ink3);font-family:var(--font-mono);letter-spacing:.04em;text-transform:uppercase}

/* Profile option cards */
.splash-opt{display:flex;align-items:center;gap:16px;padding:16px 18px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .12s,background .12s;margin-bottom:10px;background:var(--white)}
.splash-opt:hover{border-color:var(--ink);background:var(--bg2)}
.splash-opt-icon{width:40px;height:40px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.splash-opt-icon.blue{background:var(--blue-pale);color:var(--blue)}
.splash-opt-icon.slate{background:var(--bg2);color:var(--ink2)}
.splash-opt-body{flex:1}
.splash-opt-body strong{display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:3px;font-family:var(--font-serif)}
.splash-opt-body span{font-size:11.5px;color:var(--ink2);line-height:1.5}
.splash-opt-arrow{color:var(--ink3);flex-shrink:0}

/* Feature list */
.splash-features{background:var(--white);border-radius:var(--r);padding:14px 16px;margin-bottom:24px;border:1px solid var(--border)}
.splash-features-title{font-size:9.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-family:var(--font-mono)}
.splash-feature{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink2);padding:5px 0;border-bottom:1px solid var(--border-l)}
.splash-feature:last-child{border-bottom:none}
.splash-feature-dot{width:4px;height:4px;border-radius:50%;background:var(--ink);flex-shrink:0}

/* User select cards */
.splash-user-card{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .12s,background .12s;margin-bottom:9px;background:var(--white)}
.splash-user-card:hover{border-color:var(--ink);background:var(--bg2)}
.splash-avatar{width:38px;height:38px;border-radius:2px;background:var(--ink);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:.04em;font-family:var(--font-mono)}
.splash-user-info strong{display:block;font-size:13px;font-weight:700;color:var(--ink);font-family:var(--font-serif)}
.splash-user-info span{font-size:11px;color:var(--ink3);font-family:var(--font-mono);letter-spacing:.03em}

/* Role selector */
.splash-roles{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.splash-role{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .12s;background:var(--white)}
.splash-role:hover{border-color:var(--ink)}
.splash-role.sel{border-color:var(--ink);background:var(--bg2)}
.splash-role-radio{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;margin-top:2px;transition:all .12s;display:flex;align-items:center;justify-content:center}
.splash-role.sel .splash-role-radio{border-color:var(--ink);background:var(--ink)}
.splash-role.sel .splash-role-radio::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff;display:block}
.splash-role-body strong{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px;font-family:var(--font-serif)}
.splash-role-body span{font-size:11px;color:var(--ink2);line-height:1.5}

/* Dark mode splash form overrides */
body.dark .splash-form,body.dark .splash-footer{background:var(--surface-deep)}
body.dark .splash-opt,body.dark .splash-user-card,body.dark .splash-role{background:var(--white);border-color:var(--border)}
body.dark .splash-opt:hover,body.dark .splash-user-card:hover,body.dark .splash-role:hover{background:var(--bg2);border-color:var(--ink)}
body.dark .splash-role.sel{background:var(--bg2);border-color:var(--ink)}
body.dark .splash-opt-icon.slate{background:var(--white)}
body.dark .splash-features{background:var(--surface-deep);border-color:var(--border)}

/* Legacy up-wrap kept for chgUser (non-first-run profile edit) */
.up-wrap{position:fixed;inset:0;background:rgba(20,17,10,.65);display:flex;align-items:center;justify-content:center;z-index:900;padding:16px}
.up-box{background:var(--white);border-radius:var(--r);padding:40px;max-width:460px;width:100%;box-shadow:var(--sh-lg);max-height:90vh;overflow-y:auto;border:1px solid var(--border)}
.up-icon{width:48px;height:48px;background:var(--bg2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:22px}
.up-box h2{font-size:1.6rem;font-weight:400;margin-bottom:8px;font-family:var(--font-serif)}

/* === Timesheet card layout — no horizontal scroll on any mobile/touch device ===
   Triggered by: portrait phones, landscape phones, large phones, tablets in portrait,
   AND any coarse-pointer (touch) device up to 1024px wide.
   Deliberately separate from the 640px tweaks block so landscape phones (up to ~932px)
   and high-DPI devices reporting a wider CSS width are all covered.
*/
@media (max-width:768px),(pointer:coarse) and (max-width:1024px){
  .twrap,.tscroll{overflow:visible!important}
  .tscroll table{display:block;border:none;width:100%}
  .tscroll thead{display:none}
  .tscroll tbody{display:flex;flex-direction:column;gap:10px;padding:2px 0}
  .tscroll tbody tr{
    display:grid;
    grid-template-columns:1fr 1fr;
    border:1px solid var(--border);
    border-radius:var(--r);
    padding:12px;
    background:var(--white);
    box-shadow:0 1px 3px rgba(0,0,0,.06);
    gap:0;
  }
  .tscroll tbody tr.tr-active-tmr{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,.18)}
  .tscroll tbody tr.tr-dimmed{opacity:.5}
  .tscroll tbody td{
    display:block;
    padding:3px 4px;
    border:none;
    background:transparent;
    font-size:13px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .tscroll tbody td[data-label]::before{
    content:attr(data-label);
    display:block;
    font-size:10px;
    font-weight:600;
    color:var(--ink3);
    text-transform:uppercase;
    letter-spacing:.04em;
    margin-bottom:1px;
  }
  /* Row 1: Date (left) | Amount (right)
     Row 2: Client full-width
     Row 3: Matter full-width
     Row 4: Description full-width (wraps)
     Row 5: Hours (left) | Rate (right)
     Row 6: By badge (billing_staff only)
     Row 99: Actions pinned to bottom */
  .tscroll tbody td:nth-child(1){grid-column:1;grid-row:1;font-size:12px;color:var(--ink2)}
  .tscroll tbody td:nth-child(7){grid-column:2;grid-row:1;text-align:right;font-weight:600;font-size:15px;color:var(--green)}
  .tscroll tbody td:nth-child(2){grid-column:1/span 2;grid-row:2;font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tscroll tbody td:nth-child(3){grid-column:1/span 2;grid-row:3;color:var(--ink2)}
  .tscroll tbody td:nth-child(4){grid-column:1/span 2;grid-row:4;white-space:normal!important;color:var(--ink2)}
  .tscroll tbody td:nth-child(5){grid-column:1;grid-row:5}
  .tscroll tbody td:nth-child(6){grid-column:2;grid-row:5;text-align:right;color:var(--ink3)}
  .tscroll tbody td:nth-child(8){grid-column:1/span 2;grid-row:6}
  .tscroll tbody td:last-child{grid-column:1/span 2;grid-row:99;padding-top:8px;border-top:1px solid var(--border);margin-top:6px;overflow:visible}
  .tscroll tbody td:last-child .tda{justify-content:flex-end;gap:6px}
  .tscroll tbody td:last-child .tda button{min-width:44px;min-height:44px;padding:10px;font-size:16px}
}

<script>
// +============================================================+
// |  SixMinuteLog.com -- CLAUDE MANIFEST                         |
// |  AI: read CLAUDE.md first, then view line ranges.          |
// +------------------------------------------------------------+
// |  SECTION MAP (Ctrl+F these strings):                       |
// |  "// === STORAGE"       Store.get/set/del                  |
// |  "// === STATE"         ST object                          |
// |  "// === HELPERS"       uid,today,$m,$h,H,autoRate,syncForm|
// |  "// === SAVE"          save() persist                     |
// |  "// === TOAST"         toast(msg,type)                    |
// |  "// === ICONS"         IC object SVG strings              |
// |  "// === FIELD BUILDER" field(), stats()                   |
// |  "// === VIEWS"         tab view functions                 |
// |  "// === MODALS"        modal builder functions            |
// |  "// === MAIN RENDER"   TABS[], views{}, render()          |
// |  "// === ACTIONS"       A object user actions              |
// |  "// === CHANGE DELEGATION" onchange handler               |
// |  "// === INIT"          startup loading                    |
// +------------------------------------------------------------+
// |  ADD TAB:   IC + TABS[] + view fn + views{} in render()   |
// |  ADD MODAL: build fn + else-if render() + open action     |
// |  ADD DATA:  ST + save() + INIT Promise.all load           |
// |  ALWAYS: syncForm() before render() / H() on user data    |
// +============================================================+

// === STORAGE  (IndexedDB — proper per-collection object stores)
//
// Schema (v3):
//   clients, matters, entries, contacts, invoices  →  keyPath:'id'  (one record per item)
//   meta                                           →  keyPath:'k'   (singletons: user,prefs,…)
//
// Public API:
//   Store.getAll(name)              → Promise<array>   read all records in a collection
//   Store.putRecord(name, rec)      → Promise          upsert one record (SAFE — no clear)
//   Store.deleteRecord(name, id)    → Promise          delete one record by id
//   Store.putBatch(name, arr)       → Promise          upsert many records (NO clear — safe)
//   Store.syncCollection(name,arr)  → Promise          upsert batch + delete IDs not in arr
//   Store.putBulkAll(colsMap,       → Promise          ATOMIC multi-store upsert+delete+meta
//     delsMap, metaMap)                                 all stores in ONE transaction
//   Store.getMeta(key)              → Promise<any|null>
//   Store.setMeta(key, val)         → Promise
//   Store.clearData()               → Promise          wipe all stores (reset only)
//
// NOTE: saveAll (clear+putAll) has been REMOVED. All writes are additive upserts.
//       Deletions must be explicit via deleteRecord or syncCollection.
//
// bl-prefs is ALSO mirrored to localStorage so the synchronous anti-FOUC block (above)
// can read it before IndexedDB resolves.  No other data touches localStorage.
const Store=(function(){
  var _db=null;
  var DB_NAME='SixMinuteLog';
  var DB_VER=7;
  var COLLECTIONS=['clients','matters','entries','contacts','invoices','groups'];
  var COLL_SET={clients:1,matters:1,entries:1,contacts:1,invoices:1,groups:1};
  var META_KEYS=['user','prefs','descpresets','mailpresets','mailplaceholders','itmode'];

  function _open(){
    if(_db) return Promise.resolve(_db);
    return new Promise(function(resolve,reject){
      var req=indexedDB.open(DB_NAME,DB_VER);

      req.onupgradeneeded=function(e){
        var db=e.target.result;
        var tx=e.target.transaction;
        var oldV=e.oldVersion;

        // ── Create object stores (idempotent) ──
        COLLECTIONS.forEach(function(name){
          if(!db.objectStoreNames.contains(name))
            db.createObjectStore(name,{keyPath:'id'});
        });
        if(!db.objectStoreNames.contains('meta'))
          db.createObjectStore('meta',{keyPath:'k'});

        // ── v4+: Add indexes on entries for efficient filtered queries ──
        var entriesOS = tx.objectStore('entries');
        if(!entriesOS.indexNames.contains('dateIdx'))
          entriesOS.createIndex('dateIdx','date',{unique:false});
        // v6: status index — lets Approvals fetch only pending entries (no full scan)
        if(!entriesOS.indexNames.contains('statusIdx'))
          entriesOS.createIndex('statusIdx','status',{unique:false});
        // v6: createdBy index — lets Attorney view fetch only their own entries
        if(!entriesOS.indexNames.contains('createdByIdx'))
          entriesOS.createIndex('createdByIdx','createdBy',{unique:false});
        // v7: client/matter indexes — avoids full-scan .filter() when loading per-client or per-matter history
        if(!entriesOS.indexNames.contains('clientIdIdx'))
          entriesOS.createIndex('clientIdIdx','clientId',{unique:false});
        if(!entriesOS.indexNames.contains('matterIdIdx'))
          entriesOS.createIndex('matterIdIdx','matterId',{unique:false});

        // ── Migrate from v1 kv-blob store ──
        if(oldV===1 && db.objectStoreNames.contains('kv')){
          var kvReq=tx.objectStore('kv').getAll();
          kvReq.onsuccess=function(){
            var metaOS=tx.objectStore('meta');
            (kvReq.result||[]).forEach(function(item){
              var rawKey=item.k.replace(/^bl-/,'');
              var parsed;
              try{parsed=JSON.parse(item.v);}catch(e2){return;}
              if(COLL_SET[rawKey]&&Array.isArray(parsed)){
                var os2=tx.objectStore(rawKey);
                parsed.forEach(function(rec){if(rec&&rec.id!=null)os2.put(rec);});
              } else {
                metaOS.put({k:rawKey,v:parsed});
              }
            });
            tx.objectStore('kv').clear();
          };
        } else if(oldV===0){
          // Fresh install: migrate from localStorage
          var metaOS2=tx.objectStore('meta');
          META_KEYS.forEach(function(k){
            var v=localStorage.getItem('bl-'+k);
            if(v){try{metaOS2.put({k:k,v:JSON.parse(v)});}catch(e2){}}
          });
          COLLECTIONS.forEach(function(name){
            var v=localStorage.getItem('bl-'+name);
            if(v){
              try{
                var arr=JSON.parse(v);
                var os3=tx.objectStore(name);
                if(Array.isArray(arr))arr.forEach(function(r){if(r&&r.id!=null)os3.put(r);});
              }catch(e2){}
            }
          });
          try{localStorage.setItem('bl-idb-migrated','1');}catch(e2){}
          ['bl-user','bl-clients','bl-matters','bl-entries','bl-contacts',
           'bl-descpresets','bl-mailpresets','bl-itmode','bl-invoices']
            .forEach(function(k){try{localStorage.removeItem(k);}catch(e2){}});
        }
      };

      req.onsuccess=function(e){_db=e.target.result;resolve(_db);};
      req.onerror=function(e){reject(e.target.error);};
      req.onblocked=function(){console.warn('IDB open blocked — close other tabs');};
    });
  }

  // Internal: run a readwrite transaction and resolve when complete
  function _tx(stores, fn){
    return _open().then(function(db){
      return new Promise(function(resolve,reject){
        var storeList=Array.isArray(stores)?stores:[stores];
        var tx=db.transaction(storeList,'readwrite');
        tx.oncomplete=function(){resolve();};
        tx.onerror=function(e){reject(e.target&&e.target.error?e.target.error:e);};
        tx.onabort=function(e){reject(tx.error||e.target&&e.target.error||e);};
        try{ fn(tx); }catch(err){reject(err);}
      });
    });
  }

  // ── Bounded Max-Heap — retains only the top K items during cursor scan ───
  // cmpFn(a,b) mirrors Array.prototype.sort: negative → a before b.
  // Root = "worst" item in the current top-K set (largest by cmpFn).
  // Insertion: O(log K). Peak memory: K = (page+1)*pageSize records max.
  function BoundedHeap(limit,cmpFn){
    this._d=[];
    this._limit=limit;
    this._cmp=cmpFn;
  }
  BoundedHeap.prototype._sw=function(i,j){var t=this._d[i];this._d[i]=this._d[j];this._d[j]=t;};
  BoundedHeap.prototype._up=function(i){
    var d=this._d,c=this._cmp;
    while(i>0){var p=(i-1)>>1;if(c(d[i],d[p])>0){this._sw(i,p);i=p;}else break;}
  };
  BoundedHeap.prototype._dn=function(i){
    var d=this._d,n=d.length,c=this._cmp,b;
    for(;;){var l=2*i+1,r=l+1;b=i;if(l<n&&c(d[l],d[b])>0)b=l;if(r<n&&c(d[r],d[b])>0)b=r;if(b===i)break;this._sw(i,b);i=b;}
  };
  BoundedHeap.prototype.push=function(v){
    var d=this._d;
    if(d.length<this._limit){d.push(v);this._up(d.length-1);}
    else if(d.length>0&&this._cmp(v,d[0])<0){d[0]=v;this._dn(0);}
    // else v ranks below all current top-K items — discard immediately
  };
  BoundedHeap.prototype.toArray=function(){return this._d.slice();};

  return{
    // ── Read ──
    getAll:function(name){
      return _open().then(function(db){
        return new Promise(function(resolve,reject){
          var req=db.transaction(name,'readonly').objectStore(name).getAll();
          req.onsuccess=function(){resolve(req.result||[]);};
          req.onerror=function(e){reject(e.target&&e.target.error?e.target.error:new Error('Store.getAll failed: '+name));};
        });
      });
    },

    // ── Single-record upsert (safe: no clear, atomic) ──
    putRecord:function(name,rec){
      if(!rec||rec.id==null){console.warn('Store.putRecord: invalid record',name,rec);return Promise.resolve();}
      return _tx(name,function(tx){tx.objectStore(name).put(rec);});
    },

    // ── Single-record delete (safe, atomic) ──
    deleteRecord:function(name,id){
      if(id==null){return Promise.resolve();}
      return _tx(name,function(tx){tx.objectStore(name).delete(id);});
    },

    // ── Batch upsert WITHOUT clearing — safe even if interrupted ──
    putBatch:function(name,arr){
      if(!arr||!arr.length)return Promise.resolve();
      return _tx(name,function(tx){
        var os=tx.objectStore(name);
        arr.forEach(function(rec){if(rec&&rec.id!=null)os.put(rec);});
      });
    },

    // ── Chunked sequential writer — splits arr into discrete transactions of chunkSize ──
    // Used by the chunked-entries recovery path in _flushSave to avoid re-triggering
    // quota or lock failures that killed the previous oversized putBulkAll transaction.
    // Each chunk is its own IDB transaction; if a chunk fails, earlier chunks are already
    // committed (progress is preserved) and the error propagates so dirty flags are restored.
    putBatchChunked:function(name,arr,chunkSize){
      if(!arr||!arr.length)return Promise.resolve();
      var sz=chunkSize||50;
      var chunks=[];
      for(var i=0;i<arr.length;i+=sz) chunks.push(arr.slice(i,i+sz));
      return chunks.reduce(function(p,chunk){
        return p.then(function(){ return Store.putBatch(name,chunk); });
      },Promise.resolve());
    },

    // ── ATOMIC multi-store bulk write — single IDB transaction spanning all stores ──
    // colsMap:  { clients:[{...},...], matters:[{...},...], ... }  (only dirty collections)
    // delsMap:  { clients:{ id1:true, id2:true }, groups:{ id3:true } }  (pending deletes)
    // metaMap:  { prefs:{...}, descpresets:[...], ... }  (all meta keys to write)
    // All stores are enlisted up front so IDB either commits EVERYTHING or rolls back
    // EVERYTHING — no partial state is ever written to disk.
    putBulkAll:function(colsMap, delsMap, metaMap){
      var storeNames=[];
      function _push(n){if(storeNames.indexOf(n)<0)storeNames.push(n);}
      Object.keys(colsMap||{}).forEach(_push);
      Object.keys(delsMap||{}).forEach(_push);
      if(metaMap&&Object.keys(metaMap).length)_push('meta');
      if(!storeNames.length)return Promise.resolve();
      return _open().then(function(db){
        return new Promise(function(resolve,reject){
          var tx=db.transaction(storeNames,'readwrite');
          tx.oncomplete=function(){resolve();};
          tx.onerror=function(e){reject(e.target&&e.target.error?e.target.error:e);};
          tx.onabort=function(e){reject(tx.error||e.target&&e.target.error||e);};
          try{
            // Upsert all dirty collection records
            Object.keys(colsMap||{}).forEach(function(name){
              var arr=colsMap[name]; if(!arr||!arr.length)return;
              var os=tx.objectStore(name);
              arr.forEach(function(rec){if(rec&&rec.id!=null)os.put(rec);});
            });
            // Drain pending deletes
            Object.keys(delsMap||{}).forEach(function(name){
              var ids=delsMap[name]; if(!ids)return;
              var os=tx.objectStore(name);
              Object.keys(ids).forEach(function(id){os.delete(id);});
            });
            // Write all meta keys
            if(metaMap&&Object.keys(metaMap).length){
              var metaOS=tx.objectStore('meta');
              Object.keys(metaMap).forEach(function(k){metaOS.put({k:k,v:metaMap[k]});});
            }
          }catch(err){reject(err);}
        });
      });
    },

    // ── Full sync: upsert all records, delete IDs no longer in arr ──
    // Use this for imports or bulk replace — never in normal edit flows.
    syncCollection:function(name,arr){
      // Two-phase strategy — upsert-first, prune-second — to eliminate the
      // data-loss window present in the previous delete-first approach.
      //
      // ATOMICITY RATIONALE:
      //   Old order (delete → write): crash between phases left the store empty.
      //   New order (write → delete): crash between phases leaves the store with
      //   all correct records PLUS stale orphans — always recoverable, never empty.
      //
      //   Phase 1 — N transactions: upsert arr in SYNC_CHUNK_SIZE slices.
      //             Short-lived transactions avoid Safari's per-tx time limit on
      //             large (50k+) restores.
      //   Phase 2 — two steps: getAllKeys() (readonly) → batch delete orphans (readwrite).
      //             getAllKeys() returns all keys in one request; JS set-difference
      //             identifies orphans in O(n); only orphan keys are deleted — no
      //             per-record cursor iteration.  Runs after all writes committed.
      //             A crash here leaves orphan records — harmless, no data loss.
      //
      // Each transaction is short-lived and sequential to prevent lock contention.
      var SYNC_CHUNK_SIZE=5000;
      var records=arr||[];
      return _open().then(function(db){
        // ── Phase 1: upsert in chunks (safe baseline established first) ───
        var i=0;
        function nextChunk(){
          if(i>=records.length)return Promise.resolve(db);
          var chunk=records.slice(i,i+SYNC_CHUNK_SIZE);
          i+=SYNC_CHUNK_SIZE;
          return new Promise(function(resolve,reject){
            var tx=db.transaction(name,'readwrite');
            var os=tx.objectStore(name);
            chunk.forEach(function(r){if(r&&r.id!=null)os.put(r);});
            tx.oncomplete=function(){resolve(db);};
            tx.onerror=function(e){reject(e.target&&e.target.error?e.target.error:e);};
          }).then(nextChunk);
        }
        return nextChunk();
      }).then(function(db){
        // ── Phase 2: prune orphaned keys (all writes committed before this) ─
        // Optimized: getAllKeys() fetches the full key list in one IDB request,
        // then JS set-difference identifies orphans — no cursor iteration needed.
        // For 10 years of entries the cursor would visit every record one-by-one;
        // getAllKeys() + batch delete visits only the (typically tiny) orphan set.
        return new Promise(function(resolve,reject){
          // Build ID-existence set from incoming array (key strings only).
          var incoming={};
          records.forEach(function(r){if(r&&r.id!=null)incoming[r.id]=true;});
          // Step 1: read all stored keys in one shot (readonly tx — no lock contention).
          var rtx=db.transaction(name,'readonly');
          var ros=rtx.objectStore(name);
          var keysReq=ros.getAllKeys();
          keysReq.onsuccess=function(e){
            var allKeys=e.target.result;
            // Step 2: compute orphans purely in JS — O(n) hash-set lookup.
            var orphans=allKeys.filter(function(k){return !incoming[k];});
            if(!orphans.length){resolve();return;}
            // Step 3: delete orphan keys in sequential chunked transactions.
            // A single transaction holding thousands of delete requests can exceed
            // Safari's per-transaction time limit and abort. Chunking mirrors the
            // Phase 1 upsert strategy — each short-lived tx commits before the next
            // begins, keeping the transaction queue shallow on all browsers.
            var DEL_CHUNK=2000;
            var di=0;
            function nextDelChunk(){
              if(di>=orphans.length){resolve();return;}
              var slice=orphans.slice(di,di+DEL_CHUNK);
              di+=DEL_CHUNK;
              var wtx=db.transaction(name,'readwrite');
              var wos=wtx.objectStore(name);
              slice.forEach(function(k){wos.delete(k);});
              wtx.oncomplete=function(){nextDelChunk();};
              wtx.onerror=function(e){reject(e.target&&e.target.error?e.target.error:e);};
            }
            nextDelChunk();
          };
          keysReq.onerror=function(e){reject(e.target&&e.target.error?e.target.error:e);};
          rtx.onerror=function(e){reject(e.target&&e.target.error?e.target.error:e);};
        });
      }).catch(function(err){throw err;});
    },

    // ── Legacy alias (now uses syncCollection — safe upsert+prune) ──
    // Kept so any external code referencing saveAll still works.
    saveAll:function(name,arr){return this.syncCollection(name,arr);},

    // ── Efficient date-range query on entries (uses IDB dateIdx index) ──
    // from / to are 'YYYY-MM-DD' strings (inclusive). Pass '' / '' for all.
    getEntriesInRange:function(from, to){
      return _open().then(function(db){
        return new Promise(function(resolve,reject){
          var tx=db.transaction('entries','readonly');
          var idx=tx.objectStore('entries').index('dateIdx');
          var range;
          if(from && to)      range=IDBKeyRange.bound(from, to);
          else if(from)        range=IDBKeyRange.lowerBound(from);
          else if(to)          range=IDBKeyRange.upperBound(to);
          var req=range ? idx.getAll(range) : idx.getAll();
          req.onsuccess=function(){resolve(req.result||[]);};
          req.onerror=function(e){reject(e.target&&e.target.error?e.target.error:new Error('Store.getEntriesInRange failed'));};
        });
      });
    },

    // ── Total entries count (no data transfer) ──
    countEntries:function(){
      return _open().then(function(db){
        return new Promise(function(resolve,reject){
          var req=db.transaction('entries','readonly').objectStore('entries').count();
          req.onsuccess=function(){resolve(req.result||0);};
          req.onerror=function(e){reject(e.target&&e.target.error?e.target.error:new Error('Store.countEntries failed'));};
        });
      });
    },

    // ── Explicit full entries load (analytics, export, invoice) ──
    getAllEntries:function(){return this.getAll('entries');},

    // ── Cursor-based page fetch for "All Time" view ──────────────────────────
    // Returns Promise<{entries:Array, total:Number, hrs:Number, bill:Number}>.
    // For date sorts: true IDB cursor pagination — O(pageSize) peak memory.
    // For non-date sorts: BoundedHeap caps memory at O((page+1)*pageSize) peak.
    //   Aggregates (total/hrs/bill) are computed from ALL matching records in one
    //   pass — no second scan needed.
    // opts: {sort, page, pageSize, createdBy, clientId, matterId, cmpFn}
    getEntriesPage:function(opts){
      var sort=opts.sort||'date-desc';
      var page=opts.page||0;
      var pageSize=opts.pageSize||50;
      var createdBy=opts.createdBy||'';
      var clientId=String(opts.clientId||'');
      var matterId=String(opts.matterId||'');
      // skipAgg:true — caller has valid cached aggregates (total/hrs/bill); skip re-computing them.
      // Enables cursor.advance() fast-path for unfiltered date-sort page turns.
      var skipAgg=!!opts.skipAgg;
      var hasFilter=!!(createdBy||clientId||matterId);
      function passes(rec){
        if(createdBy&&rec.createdBy!==createdBy)return false;
        if(clientId&&String(rec.clientId)!==clientId)return false;
        if(matterId&&String(rec.matterId)!==matterId)return false;
        return true;
      }
      var isDateSort=(sort==='date-desc'||sort==='date-asc');
      return _open().then(function(db){
        if(isDateSort){
          return new Promise(function(resolve,reject){
            var tx=db.transaction('entries','readonly');
            var store=tx.objectStore('entries');
            var dir=sort==='date-asc'?'next':'prev';
            var offset=page*pageSize;

            // ── Fast path: unfiltered + skipAgg — cursor.advance() skips to page start ──
            // cursor.advance(n) is a single B-tree seek inside the IDB engine; it never
            // loads skipped records into the JS heap, making this O(1) for the JS thread.
            if(skipAgg&&!hasFilter){
              var entries=[],advanceDone=(offset===0);
              var req=store.index('dateIdx').openCursor(null,dir);
              req.onsuccess=function(e){
                var cursor=e.target.result;
                if(!cursor){resolve({entries:entries,total:0,hrs:0,bill:0});return;}
                if(!advanceDone){
                  advanceDone=true;
                  cursor.advance(offset); // jump directly to page start — O(1) JS work
                  return;
                }
                // We are now at the page start; collect exactly pageSize records and stop.
                if(entries.length<pageSize) entries.push(cursor.value);
                if(entries.length>=pageSize){resolve({entries:entries,total:0,hrs:0,bill:0});return;}
                cursor.continue();
              };
              req.onerror=function(e){reject(e.target&&e.target.error||new Error('getEntriesPage(fast) cursor failed'));};
              return;
            }

            // ── Unfiltered date-sort, cold agg cache: three parallel IDB requests in one tx ──
            // count()        → total   O(log N) B-tree lookup; zero record data transferred
            // agg openCursor → hrs/bill O(N) unindexed scan; no sort overhead, parallel to page cursor
            // page cursor    → entries  O(log N + pageSize) indexed advance() to page start
            // All three share one readonly transaction; IDB can execute them concurrently.
            if(!hasFilter){
              var pEntries=[],pHrsC=0,pBillC=0,pTotal=0;
              var pAdvanceDone=(offset===0),pAggDone=false,pPageDone=false;
              var pErr=false;
              function pReject(e){ if(!pErr){pErr=true;reject(e);} }
              function pTryResolve(){
                if(pAggDone&&pPageDone)
                  resolve({entries:pEntries,total:pTotal,hrs:pHrsC/10000,bill:pBillC/100});
              }

              // 1. Native count() — O(log N); bypasses all record data transfer
              var cntReq=store.count();
              cntReq.onsuccess=function(){ pTotal=cntReq.result||0; };
              cntReq.onerror=function(e){ pReject(e.target&&e.target.error||new Error('getEntriesPage count failed')); };

              // 2. Unindexed full scan for aggregates — every record visited exactly once;
              //    hrs/bill cannot be derived from count() alone so this scan is unavoidable.
              var aggReq=store.openCursor();
              aggReq.onsuccess=function(e){
                var cursor=e.target.result;
                if(!cursor){ pAggDone=true; pTryResolve(); return; }
                var rec=cursor.value;
                // Integer accumulation: hours in 1/10000ths, bill in cents — avoids FP drift.
                pHrsC+=Math.round((Number(rec.hours)||0)*10000);
                pBillC+=Math.round((Number(rec.hours)||0)*(Number(rec.rate)||0)*100);
                cursor.continue();
              };
              aggReq.onerror=function(e){ pReject(e.target&&e.target.error||new Error('getEntriesPage agg cursor failed')); };

              // 3. Indexed cursor with advance() — jumps to page start, collects pageSize records
              var pageReq=store.index('dateIdx').openCursor(null,dir);
              pageReq.onsuccess=function(e){
                var cursor=e.target.result;
                if(!cursor){ pPageDone=true; pTryResolve(); return; }
                if(!pAdvanceDone){
                  pAdvanceDone=true;
                  if(offset>0){ cursor.advance(offset); return; }
                }
                if(pEntries.length<pageSize) pEntries.push(cursor.value);
                if(pEntries.length>=pageSize){ pPageDone=true; pTryResolve(); return; }
                cursor.continue();
              };
              pageReq.onerror=function(e){ pReject(e.target&&e.target.error||new Error('getEntriesPage page cursor failed')); };
              return;
            }

            // ── Standard path: filtered — agg + page in one cursor pass ──
            var total=0,skipped=0,entries=[],hrsC=0,billC=0;
            var req=store.index('dateIdx').openCursor(null,dir);
            req.onsuccess=function(e){
              var cursor=e.target.result;
              if(!cursor){resolve({entries:entries,total:total,hrs:hrsC/10000,bill:billC/100});return;}
              var rec=cursor.value;
              if(passes(rec)){
                if(!skipAgg){
                  // Integer accumulation: hours in 1/10000ths, bill in cents — avoids FP drift.
                  hrsC+=Math.round((Number(rec.hours)||0)*10000);
                  billC+=Math.round((Number(rec.hours)||0)*(Number(rec.rate)||0)*100);
                  total++;
                }
                if(skipped<offset){skipped++;}
                else if(entries.length<pageSize){entries.push(rec);}
              }
              cursor.continue();
            };
            req.onerror=function(e){reject(e.target&&e.target.error||new Error('getEntriesPage cursor failed'));};
          });
        } else {
          // Non-date sort: BoundedHeap — O(N log K) time, O(K) peak memory
          // K = (page+1)*pageSize — never accumulates more than K records in RAM
          // regardless of dataset size. When skipAgg is true, skip agg accumulation
          // (caller provides totals from _tsAggCache).
          var cmpFn=opts.cmpFn||function(a,b){
            var dd=(+new Date(b.date))-(+new Date(a.date));
            return dd!==0?dd:(b.createdAt||0)-(a.createdAt||0);
          };
          var limit=(page+1)*pageSize;
          return new Promise(function(resolve,reject){
            var tx=db.transaction('entries','readonly');
            var req=tx.objectStore('entries').openCursor();
            var heap=new BoundedHeap(limit,cmpFn);
            var total=0,hrsC=0,billC=0;
            req.onsuccess=function(e){
              var cursor=e.target.result;
              if(!cursor){
                // Extract top-K from heap, sort into correct order, then slice the page
                var top=heap.toArray();
                top.sort(cmpFn);
                var start=page*pageSize;
                resolve({entries:top.slice(start,start+pageSize),total:total,hrs:hrsC/10000,bill:billC/100});
                return;
              }
              var rec=cursor.value;
              if(passes(rec)){
                if(!skipAgg){
                  // Integer accumulation: hours in 1/10000ths, bill in cents — avoids FP drift.
                  hrsC+=Math.round((Number(rec.hours)||0)*10000);
                  billC+=Math.round((Number(rec.hours)||0)*(Number(rec.rate)||0)*100);
                  total++;
                }
                heap.push(rec);
              }
              cursor.continue();
            };
            req.onerror=function(e){reject(e.target&&e.target.error||new Error('getEntriesPage(ns) failed'));};
          });
        }
      });
    },

    // ── Status-indexed query (v6) — uses statusIdx; only matches explicit status values ──
    getEntriesByStatus:function(status){
      return _open().then(function(db){
        return new Promise(function(resolve,reject){
          var req=db.transaction('entries','readonly').objectStore('entries')
            .index('statusIdx').getAll(IDBKeyRange.only(status));
          req.onsuccess=function(){resolve(req.result||[]);};
          req.onerror=function(e){reject(e.target&&e.target.error||new Error('getEntriesByStatus failed'));};
        });
      });
    },

    // ── Creator-indexed query (v6) — uses createdByIdx ──
    getEntriesByCreator:function(name){
      return _open().then(function(db){
        return new Promise(function(resolve,reject){
          var req=db.transaction('entries','readonly').objectStore('entries')
            .index('createdByIdx').getAll(IDBKeyRange.only(name));
          req.onsuccess=function(){resolve(req.result||[]);};
          req.onerror=function(e){reject(e.target&&e.target.error||new Error('getEntriesByCreator failed'));};
        });
      });
    },

    // ── Singleton metadata ──
    getMeta:function(key){
      return _open().then(function(db){
        return new Promise(function(resolve){
          var req=db.transaction('meta','readonly').objectStore('meta').get(key);
          req.onsuccess=function(){resolve(req.result?req.result.v:null);};
          req.onerror=function(){resolve(null);};
        });
      }).catch(function(){return null;});
    },
    setMeta:function(key,val){
      if(key==='prefs'){try{localStorage.setItem('bl-prefs',JSON.stringify(val));}catch(e){}}
      return _tx('meta',function(tx){tx.objectStore('meta').put({k:key,v:val});});
    },

    // ── Wipe everything (reset only) ──
    clearData:function(){
      return _open().then(function(db){
        return new Promise(function(resolve,reject){
          var all=COLLECTIONS.concat(['meta']);
          var tx=db.transaction(all,'readwrite');
          all.forEach(function(name){tx.objectStore(name).clear();});
          tx.oncomplete=function(){resolve();};
          tx.onerror=function(e){reject(new Error('IndexedDB clear failed: '+(e.target&&e.target.error?e.target.error.message:'unknown error')));};
          tx.onabort=function(e){reject(new Error('IndexedDB clear aborted: '+(e.target&&e.target.error?e.target.error.message:'unknown error')));};
        });
      });
    }
  };
})();

// Tiny zero-dep template engine. No external libs. Fully offline.
//
// USAGE
//   html`<td class="name">${row.name}</td>`              ← user data: auto-escaped via H()
//   html`<div>${safe(field('Rate','r',{val:r}))}</div>`  ← trusted HTML: safe() skips escaping

//   html`<span style="${cls}">…</span>`                  ← attribute value: auto-escaped
//   String(html`…`) or html`…`.toString()               ← extract plain string when needed

// RULES
//   • All interpolated values are H()-escaped by default → XSS-safe
//   • Wrap pre-built HTML (field(), IC.*, sub-templates) with safe() to prevent double-escaping
//   • html`…` returns a SafeStr; morph()/innerHTML coerce it to string automatically

    else if(Array.isArray(v)) r += v.map(x => x instanceof SafeStr ? x.v : H(x)).join('');

// Return the most recent rate from a rateHistory array that is effective on or before `forDate`.
// Each entry in history must have { effectiveDate:'YYYY-MM-DD', rate:Number }.
function _rateOnDate(history, forDate){
  if(!history||!history.length) return null;
  var valid=history.filter(function(r){return r.effectiveDate&&r.effectiveDate<=forDate&&r.rate!==''&&r.rate!==null&&r.rate!==undefined&&!isNaN(Number(r.rate))&&Number(r.rate)>=0;});
  if(!valid.length) return null;
  // Sort descending by date → first entry is the latest applicable
  valid=valid.slice().sort(function(a,b){return a.effectiveDate<b.effectiveDate?1:-1;});
  return Number(valid[0].rate);
}

// Rate precedence (most-specific wins):
//   1. Matter  + attorney rate history (entry date)
//   2. Client  + attorney rate history (entry date)
//   2.5 Group  + attorney rate history (entry date)
//   3. Attorney's own rate history (entry date), then attorney's current .rate
//   4. If no attorney selected: user's own .rate
//   5. Group default rate (lowest priority fallback)
function autoRate(cid,mid,ctid,date){
  var d=date||today();
  buildLookups(); // ensure _lu maps are current (no-op if already clean)
  if(ctid){
    // 1. Matter-specific attorney rate — O(1) map lookup
    var m=_lu.ma[mid];
    if(m&&m.attorneyRates){
      var mar=m.attorneyRates.filter(function(r){return r.contactId==ctid;});
      var mRate=_rateOnDate(mar,d);
      if(mRate!=null) return mRate;
    }
    // 2. Client-specific attorney rate — O(1) map lookup
    var cl=_lu.cl[cid];
    if(cl&&cl.attorneyRates){
      var car=cl.attorneyRates.filter(function(r){return r.contactId==ctid;});
      var cRate=_rateOnDate(car,d);
      if(cRate!=null) return cRate;
    }
    // 2.5. Group-specific attorney rate — O(1) map lookup
    var gr=cl&&cl.groupId?_lu.gr[cl.groupId]:null;
    if(gr&&gr.attorneyRates){
      var gar=gr.attorneyRates.filter(function(r){return r.contactId==ctid;});
      var gAtRate=_rateOnDate(gar,d);
      if(gAtRate!=null) return gAtRate;
    }
    // 3. Attorney's own rate history, then current rate — O(1) map lookup
    var ct=_lu.ct[ctid];
    if(ct){
      var ctRate=_rateOnDate(ct.rateHistory,d);
      // Only use static .rate as fallback if it is a positive number (0 = uninitialized default, not a real rate)
      if(ctRate===null) ctRate=(ct.rate!==''&&ct.rate!=null&&Number(ct.rate)>0)?Number(ct.rate):null;
      if(ctRate!=null) return ctRate;
    }
    // 5. Group default rate (fallback when attorney has no rate)
    if(gr&&gr.rate!==''&&gr.rate!=null) return Number(gr.rate);
  } else {
    // 4. No attorney selected — look up the logged-in user's own contact for period-aware rate history.
    // This ensures the rate reflects the correct schedule for the entry date, not a stale static value.
    var userCt=null;
    for(var _uki=0;_uki<ST.contacts.length;_uki++){
      var _uc=ST.contacts[_uki];
      if(_uc.isUser||(ST.user&&_uc.name&&ST.user.name&&_uc.name===ST.user.name)){userCt=_uc;break;}
    }
    if(userCt){
      var uRate=_rateOnDate(userCt.rateHistory,d);
      if(uRate===null) uRate=(userCt.rate!==''&&userCt.rate!=null&&Number(userCt.rate)>0)?Number(userCt.rate):null;
      if(uRate!=null) return uRate;
    } else if(ST.user&&ST.user.rate!==''&&ST.user.rate!=null&&Number(ST.user.rate)>0){
      return Number(ST.user.rate);
    }
    // 5. Group default rate fallback — O(1) map lookup
    var clNoAt=_lu.cl[cid];
    if(clNoAt&&clNoAt.groupId){
      var grNoAt=_lu.gr[clNoAt.groupId];
      if(grNoAt&&grNoAt.rate!==''&&grNoAt.rate!=null) return Number(grNoAt.rate);
    }
  }
  return '';
}
