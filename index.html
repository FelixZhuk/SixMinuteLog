// ── Placeholder Routing Section ──────────────────────────────────────────────
// Renders a routing assignment UI for all routed placeholders.
// formState: ST.cf or ST.mf | prefix: 'cf' or 'mf' | isForMatter: bool
function _buildRoutingSection(formState,prefix,isForMatter){
  var routedPHs=ST.mailPlaceholders||[];
  var phRoutes=formState.phRoutes||{};
  // Client-side contacts: for client form use formState directly (unsaved edits); for matter use saved client
  var cppl=[];
  if(isForMatter&&formState.clientId){
    var maCl=_lu.cl[formState.clientId]||null;
    cppl=(maCl&&maCl.clientPeople)||[];
  } else {
    cppl=formState.clientPeople||[];
  }
  var selectStyle='padding:4px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--white);color:var(--ink)';
  var rows=routedPHs.map(function(ph){
    var route=phRoutes[ph.id]||{};
    var srcType=route.type||'';
    var srcRef=route.ref!=null?route.ref:'';
    var fld=route.field||'email';
    var srcVal=srcType==='static'?'static':(srcType?srcType+':'+srcRef:'');
    // Source dropdown
    var srcOpts='<option value="">— not assigned —</option>';
    if(cppl.length){
      srcOpts+='<optgroup label="Client-Side Contacts">';
      cppl.forEach(function(p,i){
        var v='clientPerson:'+i;
        srcOpts+=String(html`<option value="${v}"${safe(srcVal===v?' selected':'')}>${p.name||''}${p.role?' \u2013 '+p.role:''}</option>`);
      });
      srcOpts+='</optgroup>';
    }
    if(ST.contacts.length){
      srcOpts+='<optgroup label="Firm Team">';
      ST.contacts.forEach(function(c){
        var v='firmContact:'+c.id;
        srcOpts+=String(html`<option value="${v}"${safe(srcVal===v?' selected':'')}>${c.name}${c.role?' \u2013 '+c.role:''}</option>`);
      });
      srcOpts+='</optgroup>';
    }
    srcOpts+='<option value="static"'+(srcVal==='static'?' selected':'')+'>Custom text\u2026</option>';
    // Field selector (name/email/phone) — only when a person/contact is selected
    var fieldSel=(srcVal&&srcVal!=='static')
      ?'<select name="ph-field-'+ph.id+'" aria-label="Contact field for '+ph.key+'" onchange="A.'+prefix+'RouteField(\''+ph.id+'\',this.value)" style="'+selectStyle+'">'
        +'<option value="email"'+(fld==='email'?' selected':'')+'>Email</option>'
        +'<option value="name"'+(fld==='name'?' selected':'')+'>Name</option>'
        +'<option value="phone"'+(fld==='phone'?' selected':'')+'>Phone</option>'
        +'</select>'
      :'';
    var textInp=srcVal==='static'
      ?String(html`<input type="text" name="ph-text-${ph.id}" aria-label="Custom value for ${ph.key}" value="${route.value||''}" onchange="A.${safe(prefix)}RouteValue('${ph.id}',this.value)" placeholder="Custom value\u2026" style="flex:1;min-width:100px;padding:4px 10px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--white);color:var(--ink)">`)
      :'';
    var previewVal=_resolveRouteVal(route,cppl);
    var preview=previewVal
      ?String(html`<span style="font-size:11px;color:var(--green);white-space:nowrap">\u2713 ${previewVal}</span>`)
      :(srcVal?'<span style="font-size:11px;color:var(--amber)">not found</span>':'');
    return String(html`<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-l)"><div style="flex:0 0 auto;min-width:0"><code style="font-size:12px;color:var(--blue);background:var(--bg);border:1px solid var(--border-l);border-radius:4px;padding:1px 6px">{${ph.key}}</code><div style="font-size:11px;color:var(--ink3);margin-top:1px">${ph.label}</div></div>${safe('<select name="ph-src-'+ph.id+'" aria-label="Source for '+ph.key+'" onchange="A.'+prefix+'RouteSource(\''+ph.id+'\',this.value)" style="flex:1;min-width:160px;'+selectStyle+'">'+srcOpts+'</select>')}${safe(fieldSel)}${safe(textInp)}${safe(preview)}</div>`);
  }).join('');
  var overrideNote=isForMatter
    ?'<p style="font-size:11px;color:var(--ink3);margin:0 0 8px">Matter-level assignments override the client-level ones when resolving <code>{tokens}</code>.</p>'
    :'<p style="font-size:11px;color:var(--ink3);margin:0 0 8px">Set which contact fills each routed <code>{token}</code> for this client. Matters can override these.</p>';
  var inner=routedPHs.length
    ? rows
    : '<div style="background:var(--bg);border:1px dashed var(--border);border-radius:8px;padding:14px 16px;text-align:center">'
      +'<div style="font-size:12px;color:var(--ink2);margin-bottom:4px">No custom placeholders defined yet</div>'
      +'<div class="u-fs11c3">Create a placeholder in '
      +'<a href="#" onclick="A.openSettings(\'email\');return false;" style="color:var(--blue);text-decoration:none">Settings \u2192 Email</a>'
      +' to assign it here.</div>'
      +'</div>';
  return '<div class="frow"><div class="u-bt14w">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
    +'<div style="font-size:12px;font-weight:600;color:var(--ink2)">Placeholder Routing '
    +'<span style="font-size:10px;font-weight:400;color:var(--ink3);background:var(--bg);border:1px solid var(--border-l);border-radius:10px;padding:1px 7px;margin-left:4px">'+routedPHs.length+' placeholder'+(routedPHs.length!==1?'s':'')+'</span>'
    +'</div>'
    +'<a href="#" onclick="A.openSettings(\'email\');return false;" style="font-size:11px;color:var(--blue);text-decoration:none">Manage tokens \u2192</a>'
    +'</div>'
    +overrideNote
    +inner
    +'</div></div>';
}

function vMatters(){
  var formH=ST.modal==='mf'?matterForm():'';

  if(_maResult===null){
    cardsH=buildEmptyState('&#128193;','No matters yet',(ST.clients.length===0?'Add a client first, then create matters':'Add your first matter'));
  } else {
    var maTotalFiltered=_maResult.totalFiltered;
    var maTotalPages=_maResult.totalPages;
    var MA_PS=_maResult.pageSize;
    var list=_maResult.list;
    if(maTotalFiltered===0){
      cardsH=buildEmptyState('','No matters match your filters','');
    } else {
      var maPagH=buildPagination(ST.maPage,maTotalPages,maTotalFiltered,MA_PS,'ma');
      if(ST.maGroup){
        // Grouped by client
        var groups={};var gOrder=[];
        list.forEach(function(m){
          var key=m.clientId||'__none__';
          if(!groups[key]){groups[key]=[];gOrder.push(key);}

        });
        cardsH=gOrder.map(function(key){
          var cl=_lu.cl[key];
          var gName=cl?cl.name:'No Client';
          var cards=groups[key].map(function(m){return matterCard(m);}).join('');
          return String(html`<div style="margin-bottom:18px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:8px;display:flex;align-items:center;gap:8px"><span style="flex:1;height:1px;background:var(--border-l)"></span><span>${gName}</span><span style="flex:1;height:1px;background:var(--border-l)"></span></div><div class="cgrid">${safe(cards)}</div></div>`);
        }).join('')+maPagH;
      } else {
        cardsH='<div class="cgrid">'+list.map(function(m){return matterCard(m);}).join('')+'</div>'+maPagH;
      }
    }
  }
  var addBtn=ST.clients.length>0

// == Analytics ==
function vAnalytics(){
  // Analytics data is fetched on-demand via IDB range query into ST._anEntries.
  // While the fetch is in flight (null), show a lightweight loading skeleton.
  if(ST._anEntries===null){
    // Trigger the async fetch only if one isn't already in-flight.
    // Without this guard every re-render during the async window fires a
    // duplicate IDB query, each of which calls render() on completion,
    // creating a feedback loop that keeps the tab stuck on the loading screen.
    if(!_anLoading) _loadAnalyticsEntries(ST.anFilter);
    return '<div style="padding:48px 0;text-align:center;color:var(--ink3)">'
      +'<div style="font-size:13px;margin-bottom:6px">Loading analytics\u2026</div>'
      +'<div class="u-fs11">Querying '+(ST.anFilter==='all'?'all entries':'date range')+'</div>'
      +'</div>';
  }

  // Cache key: fetch version + filter + prefs + user ownPct.
  // _anFetchVer increments each time a new IDB result arrives, so stale cache entries
  // are never served after a data mutation or filter change.
  var anCacheKey=_anFetchVer+'|'+ST.anFilter+'|'+(ST.prefs.revenueSplit?'1':'0')+'|'+(ST.user&&ST.user.ownPct!=null?ST.user.ownPct:'');

  // HTML cache hit — worker already ran and HTML is built for this key
  if(_anCache.key===anCacheKey) return _anCache.html;

  // ST._anEntries is already scoped to the filter date range by the IDB query —
  // no filterEnt() pass needed. Only 'all' uses an open range.
  var fe=ST._anEntries;

  // ── Off-thread data preparation ───────────────────────────────────────────
  // All O(E) accumulations (totals, byClient, byGroup, contactSplit) run on a
  // Web Worker so the main thread is never blocked by large datasets.
  if(!_anCalcResult || _anCalcResult.key!==anCacheKey){
    // Dispatch to worker (no-op if already in-flight for this exact key)
    _computeAnalyticsAsync(fe, anCacheKey);
    // Show a non-blocking "computing" indicator while the worker runs.
    // The worker calls render() on completion, which will hit the HTML cache branch above.
    return '<div style="padding:48px 0;text-align:center;color:var(--ink3)">'
      +'<div style="font-size:13px;margin-bottom:6px">Computing analytics\u2026</div>'
      +'<div class="u-fs11">'+fe.length+' entries \u00b7 processing off-thread</div>'
      +'</div>';
  }

  // Worker result is ready for this cache key — extract computed aggregates
  var _totals=_anCalcResult.totals;
  var hrs=_totals.hrs, bill=_totals.bill;
  var byClient=_anCalcResult.byClient;
  var byGroup=_anCalcResult.byGroup;
  var _split=_anCalcResult.split;
  var contactSplit=_split.contactSplit;
  var totalOwn=_split.totalOwn, totalFirm=_split.totalFirm;
  var uHrs=_split.uHrs, uBill=_split.uBill, userPct=_split.userPct;
  var userAnnualSalary=ST.user&&ST.user.salary!=null&&ST.user.salary!==''?Number(ST.user.salary):null;

  // Salary label is a pure lookup — fast on main thread, no worker needed
  var salPeriodFn=function(annual){ return salaryForPeriod(annual,ST.anFilter); };
  var salLbl=salaryPeriodLabel(ST.anFilter); // e.g. "monthly (÷12)"

  var maxB=byClient.length?byClient[0].bill:1;

  // Filter options — rolling + calendar periods
  var filterGroups=[
    {label:'Rolling',opts:[
      {v:'week',l:'Past Week'},{v:'month',l:'Past Month'},
      {v:'quarter',l:'Past Quarter'},{v:'year',l:'Past Year'},{v:'all',l:'All Time'}
    ]},
    {label:'Calendar',opts:[
      {v:'this_month',l:'This Month'},{v:'this_quarter',l:'This Quarter'},{v:'this_year',l:'This Year'}
    ]}
  ];
  var fopts=filterGroups.map(function(g){
    return '<optgroup label="'+g.label+'">'+g.opts.map(function(o){
      return String(html`<option value="${o.v}"${safe(ST.anFilter===o.v?' selected':'')}>${o.l}</option>`);
    }).join('')+'</optgroup>';
  }).join('');

  var periodLblMap={week:'Past Week',month:'Past Month',quarter:'Past Quarter',year:'Past Year',
    all:'All Time',this_month:'This Month',this_quarter:'This Quarter',this_year:'This Year'};
  var periodLbl=periodLblMap[ST.anFilter]||'All Time';

  var barsH=byClient.length?'<div class="card u-mt20">'
    +'<h3 style="font-weight:500;margin-bottom:16px;font-size:.93rem">Revenue by Client</h3>'
    +byClient.map(function(c){

// Invoice total calculator (applies cuts)
// invTotal: returns invoice total including tax.
// Primary path: use persisted snapshot (inv.total) stored at save time — guarantees
// correct display even when prior-year entries are not loaded in memory.
// Fallback: live calculation for legacy invoices saved before snapshot fields existed.
function invTotal(inv){
  if(!inv) return 0;
  if(inv.total!=null) return Number(inv.total)||0;
  // Legacy fallback: derive from live entry lookup (may return 0 for cross-year entries)
  return invTotalLive(inv);
}

// invTotalLive: raw live calculation from _lu.en (used at save time and as legacy fallback).
function invTotalLive(inv){
  if(!inv||!inv.entryIds) return 0;
  buildEntryLookup(); // ensure _lu.en is populated
  var cuts=inv.cuts||{};
  var merged=inv.mergedEntries||[];
  var mergedEntryIds={};
  merged.forEach(function(mg){(mg.entryIds||[]).forEach(function(eid){mergedEntryIds[eid]=true;});});
  var t=0;
  inv.entryIds.forEach(function(eid){
    if(mergedEntryIds[eid]) return;
    var e=_lu.en[eid];
    if(!e) return;
    var h=cuts[eid]!=null?Number(cuts[eid]):Number(e.hours);
    t+=calcAmount(h,e.rate||0);
  });
  merged.forEach(function(mg){t+=calcAmount(mg.hours||0,mg.rate||0);});
  return t;
}

  var clOpts=[{v:'',l:'— Select Client —'}].concat(ST.clients.slice().sort(function(a,b){return (a.name||'').localeCompare(b.name||'');}).map(function(c){return {v:c.id,l:c.name};}));
  var mtOpts=[{v:'',l:'All Matters'}].concat(
    (f.clientId?ST.matters.filter(function(m){return m.clientId==f.clientId;}):ST.matters).slice().sort(function(a,b){return (a.name||'').localeCompare(b.name||'');})
    .map(function(m){return {v:m.id,l:m.name};})
  );
  // Invoice statuses: Draft → Sent. Approval is for time entries only.
  var statusOpts=[{v:'draft',l:'Draft'},{v:'sent',l:'Sent'}];

  // Entry picker: approved entries for selected client/matter not already invoiced
  var invoicedIds={};
  (ST.invoices||[]).forEach(function(inv){
    if(isEdit&&inv.id==ST.editId) return; // exclude self when editing
    (inv.entryIds||[]).forEach(function(eid){invoicedIds[eid]=inv.number||inv.id;});
  });
  var candidateEnts=ST.entries.filter(function(e){
    if(e.status!==undefined&&e.status!=='approved') return false; // only approved
    if(f.clientId&&e.clientId!=f.clientId) return false;
    if(f.matterId&&e.matterId!=f.matterId) return false;
    return true;
  }).sort(function(a,b){return localDate(a.date)-localDate(b.date);});
  var selIds=f.entryIds||[];
  var selSet={};
  selIds.forEach(function(id){selSet[id]=true;});

  var entryRows=candidateEnts.map(function(e){
    var cl2=_lu.cl[e.clientId];
    var mt2=_lu.ma[e.matterId];
    var alreadyInv=invoicedIds[e.id];
    var dis=!!alreadyInv;
    var chk=selSet[e.id]?'checked':'';
    return String(html`<label style="display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:6px;cursor:${dis?'default':'pointer'};background:${safe(selSet[e.id]?'var(--blue-pale)':'transparent')};border:1px solid ${safe(selSet[e.id]?'var(--blue)':'transparent')};margin-bottom:3px;opacity:${dis?0.45:1}"><input type="checkbox" id="inv-ent-${e.id}" name="inv-ent-${e.id}" ${safe(dis?'disabled':'')} ${safe(chk)} onchange="A.invTogEnt(${e.id})" style="margin-top:2px;flex-shrink:0"><div class="u-f1"><div style="display:flex;justify-content:space-between;gap:8px"><span style="font-size:13px;font-weight:500">${safe($d(e.date))}</span><span style="font-size:12px;color:var(--green)">${safe($m(calcAmount(e.hours,e.rate)))}</span></div><div class="u-fs12c2">${cl2?cl2.name:''} · ${mt2?mt2.name:'General'} · ${safe($h(e.hours))} @ ${safe($m(e.rate))}/hr</div>${e.description?html`<div style="font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.description}</div>`:''
      }${alreadyInv?html`<div style="font-size:11px;color:var(--amber)">Already on invoice #${alreadyInv}</div>`:''}</div></label>`);
  }).join('');

  var selAmt=selIds.reduce(function(s,eid){
    var e=_lu.en[eid]; return e?s+calcAmount(e.hours,e.rate):s;
  },0);

  var firmName=f.firmName!=null?f.firmName:(ST.firmProfile&&ST.firmProfile.firmName||ST.prefs.appName||'');

  var _invBody=''
    +'<div class="u-g216">'
    +field('Invoice #','inv-num',{val:f.number||'',ph:'Auto-assigned if blank',sf:'invf.number'})
    +field('Invoice Date','inv-date',{type:'date',val:f.invoiceDate||today(),sf:'invf.invoiceDate'})
    +field('Due Date','inv-due',{type:'date',val:f.dueDate||'',sf:'invf.dueDate'})
    +field('Status','inv-status',{type:'select',val:f.status||'draft',opts:statusOpts,sf:'invf.status'})
    +'</div>'
    +'<div style="background:var(--bg2);border-radius:8px;padding:14px;margin:8px 0">'
    +'<h4 style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:10px">Firm / From</h4>'
    +'<div class="u-g216">'
    +field('Firm Name','inv-firm',{val:firmName,ph:'Your firm name',sf:'invf.firmName'})
    +field('Phone','inv-fphone',{val:f.firmPhone||'',ph:'Firm phone',sf:'invf.firmPhone'})
    +field('Address','inv-faddr',{val:f.firmAddress||'',ph:'Firm address',type:'textarea',rows:2,sf:'invf.firmAddress'})
    +field('Email','inv-femail',{type:'email',val:f.firmEmail||'',ph:'billing@yourfirm.com',sf:'invf.firmEmail'})
    +'</div></div>'
    +'<div class="u-g216">'
    +field('Client','inv-cl',{type:'select',val:f.clientId||'',opts:clOpts,req:true,err:f.errs&&f.errs.clientId,sf:'invf.clientId'})
    +field('Matter (optional)','inv-mt',{type:'select',val:f.matterId||'',opts:mtOpts,sf:'invf.matterId'})
    +'</div>'
    +'<div class="u-g216">'
    +field('Payment Terms','inv-terms',{val:f.paymentTerms||'Net 30',ph:'Net 30',sf:'invf.paymentTerms'})
    +field('Tax Rate %','inv-tax',{val:f.taxPct||'',ph:'0',type:'number',sfx:'%',sf:'invf.taxPct'})
    +'</div>'
    +field('Notes / Work Description','inv-notes',{val:f.notes||'',type:'textarea',rows:3,ph:'Summary of services rendered...',sf:'invf.notes'})
    +field('Footer Note','inv-footer',{val:f.footerNote||'',ph:'e.g. Thank you for your business',sf:'invf.footerNote'})
    +'<div style="margin-top:14px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<h4 style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3)">Time Entries</h4>'
    +'<div class="u-fs12c2"><strong>'+selIds.length+' selected</strong> \xb7 '+$m(selAmt)+'</div></div>'
    +(f.clientId
      ?'<div style="max-height:240px;overflow-y:auto;border:1px solid var(--brd);border-radius:8px;padding:8px">'
        +(candidateEnts.length?entryRows:'<div style="text-align:center;padding:20px;color:var(--ink3);font-size:13px">No approved entries for this selection</div>')
        +'</div>'
      :'<div style="text-align:center;padding:20px;background:var(--bg2);border-radius:8px;color:var(--ink3);font-size:13px">Select a client to load time entries</div>')
    +'</div>';
  return buildModal({size:'lg',
    title:(isEdit?IC.edit+' Edit Invoice':''+IC.invoice+' New Invoice'),
    onClose:'A.closeF()',
    modalStyle:'max-height:90vh;display:flex;flex-direction:column',
    bodyClass:'u-scrollf',
    body:_invBody,
    footer:'<button class="btn btn-gh" onclick="A.closeF()">Cancel</button>'
      +'<button class="btn btn-dk" onclick="A.invSave()">'+IC.save+' '+(isEdit?'Update Invoice':'Create Invoice')+'</button>'
  });
}

// Invoice print preview
function buildInvoicePrint(){
  buildEntryLookup(); // ensure _lu.en is populated before line-item access
  var inv=ST.invoices.find(function(i){return i.id==ST.invPrintId;});
  if(!inv) return buildModal({size:'sm',title:'Print',onClose:'A.closeM()',
    body:'<p>Invoice not found</p>',footer:null});
  var cl=_lu.cl[inv.clientId]||{name:'?',email:'',phone:''};
  var mt=inv.matterId?_lu.ma[inv.matterId]:null;
  var fontSerif=(getComputedStyle(document.documentElement).getPropertyValue('--font-serif')||'Georgia,serif').trim();

  var cuts=inv.cuts||{};
  var merged=inv.mergedEntries||[];
  var mergedEntryIds={};
  merged.forEach(function(mg){(mg.entryIds||[]).forEach(function(eid){mergedEntryIds[eid]=true;});});

  // Build line items
  var lineItems=[];
  (inv.entryIds||[]).forEach(function(eid){
    if(mergedEntryIds[eid]) return;
    var e=_lu.en[eid];
    if(!e) return;
    var origH=Number(e.hours);
    var h=cuts[eid]!=null?Number(cuts[eid]):origH;
    if(h<=0) return;
    // Show strikethrough if: hours were cut via invoice review, OR partner edited them directly
    var displayOrigH=null;
    if(cuts[eid]!=null&&Number(cuts[eid])<(e.submittedHours!=null?Number(e.submittedHours):origH)){
      displayOrigH=e.submittedHours!=null?Number(e.submittedHours):origH;
    } else if(e.submittedHours!=null&&Number(e.submittedHours)!==h){
      displayOrigH=Number(e.submittedHours);
    }
    var wasCut=displayOrigH!=null;
    var mt2=_lu.ma[e.matterId];
    var ct2=_lu.ct[e.contactId];
    var cmt=(inv.comments||[]).filter(function(c){return c.entryId==eid;}).map(function(c){return c.text;}).join('; ');
    lineItems.push({date:e.date,desc:e.description||'Legal services',matter:mt2?mt2.name:'',by:ct2?ct2.name:(e.createdBy||''),hours:h,origHours:wasCut?displayOrigH:null,rate:Number(e.rate||0),amount:calcAmount(h,e.rate||0),partnerComment:(e.showCommentOnInvoice&&e.partnerComment)?e.partnerComment:''});
  });
  merged.forEach(function(mg){
    if(Number(mg.hours||0)<=0) return;
    lineItems.push({date:'',desc:mg.description||'Legal services',matter:'',by:'',hours:Number(mg.hours||0),rate:Number(mg.rate||0),amount:calcAmount(mg.hours||0,mg.rate||0)});
  });
  lineItems.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});

  var subtotal=lineItems.reduce(function(s,l){return s+l.amount;},0);
  var taxPct=Number(inv.taxPct||0);
  var taxAmt=subtotal*taxPct/100;
  var total=subtotal+taxAmt;

  var lineRows=lineItems.map(function(l){
    return String(html`<tr><td style="padding:8px 10px;font-size:13px;border-bottom:1px solid #eee;color:#555">${l.date?safe($d(l.date)):''}</td><td style="padding:8px 10px;font-size:13px;border-bottom:1px solid #eee">${l.desc}${l.matter?html`<br><span style="font-size:11px;color:#888">${l.matter}</span>`:''}${l.by?html`<br><span style="font-size:11px;color:#aaa">${l.by}</span>`:''}${l.partnerComment?html`<br><span style="font-size:11px;color:#555;font-style:italic">Note: ${l.partnerComment}</span>`:''}</td><td style="padding:8px 10px;font-size:13px;border-bottom:1px solid #eee;text-align:right">${l.origHours!=null?safe('<span style="text-decoration:line-through;color:#bbb;font-size:11px;margin-right:5px">'+(Math.round((l.origHours+Number.EPSILON)*10)/10).toFixed(1)+'</span>'):safe('')}${safe((Math.round((l.hours+Number.EPSILON)*10)/10).toFixed(1))}</td><td style="padding:8px 10px;font-size:13px;border-bottom:1px solid #eee;text-align:right">${safe($m(l.rate))}</td><td style="padding:8px 10px;font-size:13px;border-bottom:1px solid #eee;text-align:right;font-weight:600">${safe($m(l.amount))}</td></tr>`);
  }).join('');

  var firmName=H(inv.firmName||ST.firmProfile&&ST.firmProfile.firmName||ST.prefs.appName||'');
  var firmAddr=H(inv.firmAddress||'');
  var firmPhone=inv.firmPhone?telLink(inv.firmPhone):'';
  var firmEmail=inv.firmEmail?mailLink(inv.firmEmail):'';
  var invNum=H(inv.number||String(inv.id));

  var printWrap='<div id="inv-print-wrap" style="background:#fff;color:#222;font-family:'+fontSerif+';padding:0">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:32px 40px 24px;border-bottom:3px solid #111">'
    +'<div><div style="font-size:22px;font-weight:700;color:#111;letter-spacing:-.02em">'+firmName+'</div>'
    +(firmAddr?'<div style="font-size:12px;color:#666;margin-top:4px">'+firmAddr.replace(/\n/g,'<br>')+'</div>':'')
    +(firmPhone?'<div class="u-fs12-66">'+firmPhone+'</div>':'')
    +(firmEmail?'<div class="u-fs12-66">'+firmEmail+'</div>':'')
    +'</div>'
    +'<div class="u-tr"><div style="font-size:30px;font-weight:300;color:#111;letter-spacing:-.02em">INVOICE</div>'
    +'<div style="font-size:14px;color:#555;margin-top:4px"># '+invNum+'</div>'
    +'<div style="font-size:12px;color:#888">Date: '+$d(inv.invoiceDate||today())+'</div>'
    +(inv.dueDate?'<div style="font-size:12px;color:#888">Due: '+$d(inv.dueDate)+'</div>':'')
    +'</div></div>'
    +'<div style="display:flex;justify-content:space-between;padding:20px 40px;background:#f8f8f8;border-bottom:1px solid #ddd">'
    +'<div><div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#999;margin-bottom:4px">Bill To</div>'
    +String(html`<div style="font-weight:700;font-size:15px">${cl.name}</div>`)
    +(cl.email?'<div class="u-fs12-66">'+mailLink(cl.email)+'</div>':'')
    +(cl.phone?'<div class="u-fs12-66">'+telLink(cl.phone)+'</div>':'')
    +'</div>'
    +'<div class="u-tr">'
    +(mt?String(html`<div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#999;margin-bottom:2px">Matter</div><div style="font-weight:600">${mt.name}</div>`):'')
    +(inv.paymentTerms?String(html`<div style="font-size:12px;color:#666;margin-top:4px">Terms: ${inv.paymentTerms}</div>`):'')
    +'</div></div>'
    +(inv.notes?String(html`<div style="padding:16px 40px;border-bottom:1px solid #eee;font-size:13px;color:#444">${inv.notes}</div>`):'')
    +'<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="background:#f0f0f0"><th style="padding:10px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #ddd">Date</th>'
    +'<th style="padding:10px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #ddd">Description</th>'
    +'<th style="padding:10px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:right;font-weight:600;color:#555;border-bottom:2px solid #ddd">Hours</th>'
    +'<th style="padding:10px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:right;font-weight:600;color:#555;border-bottom:2px solid #ddd">Rate</th>'
    +'<th style="padding:10px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:right;font-weight:600;color:#555;border-bottom:2px solid #ddd">Amount</th>'
    +'</tr></thead>'
    +'<tbody>'+lineRows+'</tbody>'
    +'</table>'
    +'<div style="display:flex;justify-content:flex-end;padding:16px 40px">'
    +'<div style="min-width:220px">'
    +'<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#555"><span>Subtotal</span><span>'+$m(subtotal)+'</span></div>'
    +(taxPct>0?'<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#555"><span>Tax ('+taxPct+'%)</span><span>'+$m(taxAmt)+'</span></div>':'')
    +'<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:16px;font-weight:700;border-top:2px solid #111;margin-top:4px"><span>Total</span><span>'+$m(total)+'</span></div>'
    +'</div></div>'
    +(inv.footerNote?String(html`<div style="padding:16px 40px;border-top:1px solid #eee;font-size:12px;color:#888;font-style:italic">${inv.footerNote}</div>`):'')
    +'</div>';

  return buildModal({size:'lg',
    title:IC.print+' Invoice Preview #'+invNum,
    modalStyle:'max-height:95vh;display:flex;flex-direction:column',
    headerActions:'<div style="display:flex;gap:8px">'
      +'<button class="btn btn-dk" onclick="A.invDoPrint()" style="gap:6px">'+IC.print+' Print</button>'
      +'<button class="btn-ic" onclick="A.closeM()">'+IC.x+'</button>'
      +'</div>',
    bodyStyle:'overflow-y:auto;flex:1;padding:0;background:#e8e8e8',
    body:'<div style="max-width:820px;margin:20px auto;box-shadow:0 4px 24px rgba(0,0,0,.15)">'+printWrap+'</div>',
    footer:(inv.status!=='sent'&&inv.status!=='approved'?'<button class="btn btn-gr" style="gap:5px" data-id="'+inv.id+'" onclick="A.invMarkSent(this.dataset.id); A.closeM()">'+IC.send+' Mark Sent</button>':'')
      +'<button class="btn btn-gh" onclick="A.closeM()">Close</button>'
      +'<button class="btn btn-gh" data-id="'+inv.id+'" onclick="A.emailInvoice(this.dataset.id)" style="gap:5px">'+IC.mail+' Email to Client</button>'
      +'<button class="btn btn-gr" onclick="A.invDoPrint()">'+IC.print+' Print / Save PDF</button>'
  });
}

function buildQL(){
  var f=ST.ql;
  var ms=ST.tmrOn?(Date.now()-ST.tmrStart+ST.tmrMs):ST.tmrMs;
  var _sw=formatStopwatch(ms),hh=_sw.slice(0,2),mm=_sw.slice(3,5),ss=_sw.slice(6,8);
  var rnd=ms/3600000;
  var avMat=ST.matters.filter(function(m){return m.clientId==f.clientId;});
  var total=(f.hours&&f.rate!==''&&f.rate!=null)?$m(Number(f.hours)*Number(f.rate)):null;
  var todayStr=today();
  var todayEntries=ST.entries.filter(function(e){return e.date===todayStr;}).slice().reverse();
  var continueH='';
  if(todayEntries.length>0){
    var addToId=f.addToId||'';
    var entOpts='<option value="">&#43; New entry</option>'
      +todayEntries.map(function(e){
        var cl=_lu.cl[e.clientId];var mt=_lu.ma[e.matterId];
        var label=(cl?cl.name:'?')+(mt?' \u2022 '+mt.name:'')+' ('+$h(e.hours)+')'+(e.description?' \u2013 '+e.description.substring(0,28)+(e.description.length>28?'\u2026':''):'');
        return '<option value="'+e.id+'"'+(String(e.id)===String(addToId)?' selected':'')+'>'+H(label)+'</option>';
      }).join('');
    continueH='<div style="background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px">'
      +'<label style="font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:6px">Continue existing entry today</label>'
      +'<select name="ql-pick-entry" aria-label="Continue existing entry today" style="width:100%;font-size:13px" onchange="A.qlPickEntry(this.value)">'+entOpts+'</select>'
      +(addToId?'<div style="margin-top:6px;font-size:12px;color:var(--green)">&#10010; Hours you log will be added to this entry</div>':'')
      +'</div>';
  }
  var headingLabel=f.addToId?IC.flash+' Add Hours to Entry':IC.flash+' Quick Log';

  // Client field: dropdown or inline-create
  var clientField;
  if(f.newCl){
    clientField=field('Client','ql-ncn',{req:true,type:'inline-action',val:f.newClName||'',ph:'New client name',
      oninput:"A.qlSet('newClName',this.value)",
      onkeydown:"if(event.key==='Enter')A.qlCreateClient();if(event.key==='Escape')A.qlCancelNew('cl')",
      onConfirm:"A.qlCreateClient()",onCancel:"A.qlCancelNew('cl')",autofocus:true,sf:'ql.newClName'});
  } else {
    clientField=field('Client','ql-cl',{req:true,type:'select',
      opts:[{v:'',l:'Select client...'},{v:'__new__',l:'+ Add new client\u2026'}]
        .concat(mruOpts(ST.clients,ST.entries,'clientId',function(c){return c.name;})),
      val:String(f.clientId||''),onchange:"A.qlCl(this.value)",sf:'ql.clientId'});
  }

  // Matter field: dropdown or inline-create
  var matterField;
  if(f.newMa){
    matterField=field('Matter','ql-nmn',{type:'inline-action',val:f.newMaName||'',ph:'New matter name',
      oninput:"A.qlSet('newMaName',this.value)",
      onkeydown:"if(event.key==='Enter')A.qlCreateMatter();if(event.key==='Escape')A.qlCancelNew('ma')",
      onConfirm:"A.qlCreateMatter()",onCancel:"A.qlCancelNew('ma')",autofocus:true,sf:'ql.newMaName'});
  } else {
    matterField=field('Matter','ql-ma',{type:'select',
      opts:[{v:'',l:'General'}]
        .concat(f.clientId?[{v:'__new__',l:'+ Add new matter\u2026'}]:[])
        .concat(f.clientId?mruOpts(avMat,ST.entries,'matterId',function(m){return m.name;}): []),
      val:String(f.matterId||''),dis:!f.clientId,onchange:"A.qlMa(this.value)",sf:'ql.matterId'});
  }

  // Continue mode read-only display
  var clientMatterH;
  if(f.addToId){
    var cl2=_lu.cl[f.clientId]||null;
    var mt2=_lu.ma[f.matterId]||null;
    clientMatterH='<div class="frow c2 u-mb12">'
      +'<div class="fl"><label>Client</label><div class="read-field">'+H(cl2?cl2.name:'\u2014')+'</div></div>'
      +'<div class="fl"><label>Matter</label><div class="read-field" style="color:var(--ink2)">'+H(mt2?mt2.name:'General')+'</div></div>'
      +'</div>';
  } else {
    clientMatterH='<div class="frow c2 u-mb12">'+clientField+matterField+'</div>';
  }

  var _qlPre=continueH
    +'<div class="ql-timer">'
    +'<div class="timer-num '+(ST.tmrOn?'timer-on':'timer-off')+'" id="ql-t">'+hh+':'+mm+':'+ss+'</div>'
    +'<div style="display:flex;gap:8px;align-items:center">'
    +'<button class="btn '+(ST.tmrOn?'btn-rd':'btn-dk')+'" onclick="A.togTmr()" style="padding:8px 14px;font-size:13px">'+(ST.tmrOn?'Stop':(ST.tmrMs>0?'Resume':'Start'))+'</button>'
    +(ST.tmrMs>0?'<button class="btn btn-gh" onclick="A.rstTmr()" style="padding:8px 12px;font-size:13px">Reset</button>':'')
    +'</div>'
    +(ST.tmrMs>0&&!ST.tmrOn?'<span class="u-fs12c3" title="Exact measured time">'+msToHMS(ST.tmrMs)+' ('+(Math.round((rnd+Number.EPSILON)*10)/10).toFixed(1)+'h)</span>':'')
    +'</div>';
  var _qlBody=clientMatterH
    +'<div class="frow c2 u-mb12">'
    +(function(){var _qp=parseHHMM(f.hours);var _qhh=f.hours?String(_qp.hh):'';var _qmm=f.hours?String(_qp.mm):'';var timerTip=f.rawMs!=null?' title="Timer-measured: '+msToHMS(f.rawMs)+' exact"':'';return '<div class="fl"><label>'+(f.addToId?'Hours to Add':'Hours')+' <span class="req">*</span></label><div style="display:flex;gap:6px;align-items:center"><input type="number" inputmode="numeric" id="ql-hh" aria-label="Hours" min="0" step="1" value="'+H(_qhh)+'" placeholder="0" style="width:68px;flex:none" oninput="A.qlHrsInput()"'+timerTip+'><span style="font-size:13px;color:var(--ink3);white-space:nowrap">hr</span><input type="number" inputmode="numeric" id="ql-mm" aria-label="Minutes" min="0" max="59" step="1" value="'+H(_qmm)+'" placeholder="0" style="width:68px;flex:none" oninput="A.qlHrsInput()"><span style="font-size:13px;color:var(--ink3);white-space:nowrap">min</span></div></div>';})()
    +field('Rate ($/hr)','ql-r',{pfx:'$',val:f.rate||'',ph:'Auto',oninput:"A.qlSet('rate',fmtCur(this.value))",sf:'ql.rate'})
    +'</div>'
    +field('Description','ql-d',{val:f.description||'',ph:'What did you work on?',oninput:"A.qlSet('description',this.value)",onkeydown:"if(event.key==='Enter')A.saveQL()",sf:'ql.description'})
    +(total?'<div class="total-pill">Total: <strong>'+total+'</strong></div>':'')
    +(ST.descPresets.length>0?'<div class="desc-chips"><span style="font-size:11px;color:var(--ink3);margin-right:4px">Suggestions:</span>'+ST.descPresets.map(function(p,i){return '<button type="button" class="desc-chip" onclick="A.pickDesc(\'ql-d\','+i+')">'+ H(p)+'</button>';}).join('')+'</div>':'');
  return buildModal({size:'sm',
    title:headingLabel,titleClass:'u-fac8',
    onClose:'A.closeQL()',
    preBody:_qlPre,
    bodyStyle:'padding:18px 20px',
    body:_qlBody,
    footer:'<button class="btn btn-gh" onclick="A.closeQL()">Cancel</button>'
      +(!f.addToId?'<button class="btn btn-bl" onclick="A.qlSaveAndTimer()" title="Save entry and start timer"'+(!f.clientId?' disabled':'')+'>&#9201; Save &amp; Start Timer</button>':'')
      +'<button class="btn btn-dk" onclick="A.saveQL()"'+((!f.clientId||!f.hours)?' disabled':'')+'>'
      +IC.save+' '+(f.addToId?'Add Hours':'Save Entry')+'</button>'
  });
}

      +'</ol>'
      +'<h4>How Rates Are Selected</h4>'
      +'<p>When you log an entry, the rate auto-fills using the most specific rate available. The priority order is: <strong>matter-level rate for this attorney \u2192 client-level rate for this attorney \u2192 contact rate history \u2192 contact default rate \u2192 client default rate</strong>. You can always override the rate manually before saving.</p>'
      +(ST.prefs.revenueSplit?'<h4>Fee Allocation</h4><p>When Fee Allocation mode is enabled, each contact has an Attorney Share % field. The Analytics tab shows a full breakdown of attorney earnings versus firm retention across all approved time.</p>':'')
      +'<h4>Quick Log \u26a1</h4>'
      +'<p>The floating \u26a1 button opens a quick-log panel with a built-in stopwatch. Press Start, work, press Stop \u2014 the exact elapsed time is pre-filled in the hours field. Adjust the billed hours if needed before saving. Six-minute increments (0.1\u202fh) are standard in legal billing, but any value is accepted.</p>',

    time:'<h3>Time Entries</h3>'
      +'<h4>Creating an Entry</h4>'
      +'<p>Click <strong>+ New Entry</strong>. Date, Client, Hours, and Rate are required. Matter, Description, Team Member, and ABA/UTBMS code are optional but recommended for billing compliance and reporting.</p>'
      +'<h4>Quick Log \u26a1</h4>'
      +'<p>Open the Quick Log panel with the \u26a1 button. Press Start to begin timing, then Stop when done. The measured duration is pre-filled \u2014 no rounding is applied. Hover over a timer-sourced hours value in the timesheet to see the exact raw time in hours, minutes, and seconds.</p>'
      +'<h4>Per-Row Timer</h4>'
      +'<p>Each row in the timesheet has its own stopwatch button. Use it to accumulate additional time against an existing entry \u2014 useful for returning to the same task multiple times.</p>'
      +'<h4>Dropdown Changes Preserve Your Work</h4>'
      +'<p>Changing the Client, Matter, or Team Member dropdown never clears other fields. Your typed hours, rate, and description are always preserved when you update a selection.</p>'
      +'<h4>ABA / UTBMS Codes</h4>'
      +'<p>Each entry can carry an ABA Uniform Task-Based Management System code. Assign codes individually in the entry form, or use the 🧾 button on a row (available to Billing Staff) to set codes in bulk across multiple entries.</p>'
      +'<h4>Hours Storage and Display</h4>'
      +'<p>Hours are stored at full precision (up to 4 decimal places). Entries logged via a timer also store the exact raw milliseconds. Billing and invoice views display values to one decimal place.</p>'
      +'<h4>Filtering the Timesheet</h4>'
      +'<p>Use the date filter above the table to view entries for Today, This Week, This Month, This Year, or All Time. Additional filters by client, matter, and team member are available in the filter bar.</p>'
      +'<h4>Entry Status</h4>'
      +'<p>Each entry moves through a defined status lifecycle: <strong>Pending \u2192 Submitted \u2192 Approved</strong>. Attorneys submit entries to a partner for review. Partners approve or adjust entries in the Approvals tab. Only approved entries are available for invoicing.</p>',

    clients:'<h3>Clients &amp; Matters</h3>'
      +'<h4>Client Records</h4>'
      +'<p>Each client has a name, contact details, a default billing rate, and optional attorney-specific negotiated rates. You can also link internal team contacts and external client-side contacts directly to the client record.</p>'
      +'<h4>Attorney-Specific Rates on Clients</h4>'
      +'<p>Inside a client record, you can set per-attorney negotiated rates. When an entry is logged against this client for that attorney, the attorney-specific rate takes precedence over the client\'s default rate.</p>'
      +'<h4>Matters</h4>'
      +'<p>Matters represent individual cases or projects under a client. Each matter can have its own default rate, description, linked contacts, and per-attorney rates. A matter-level attorney rate is the highest-priority rate in the system and overrides all client-level and contact-level defaults.</p>'
      +'<h4>Rate Auto-Fill in Entries</h4>'
      +'<ol>'
      +'<li>Select a <strong>Client</strong> \u2014 the rate field fills with the most specific rate available for the logged-in attorney.</li>'
      +'<li>Select a <strong>Matter</strong> \u2014 the rate updates to the matter\'s attorney-specific rate if one exists.</li>'
      +'<li>The rate field is always editable and can be overridden at any time.</li>'
      +'</ol>'
      +'<h4>Invoices on Client Cards</h4>'
      +'<p>Approved and sent invoices appear summarised on each client card. Use the 📧 icon on the card to open your email client with the latest invoice details pre-filled.</p>',

    contacts:'<h3>Contacts &amp; Rate History</h3>'
      +'<h4>What Contacts Represent</h4>'
      +'<p>Contacts are the members of your firm \u2014 attorneys, partners, and billing staff. Each contact has a name, role, email, phone, and a default hourly rate'+(ST.prefs.revenueSplit?', an attorney share percentage, and an optional annual salary used in compensation analytics':'')+'.</p>'
      +'<h4>Rate History</h4>'
      +'<p>Each contact supports a full rate history with effective dates. When an entry is created, the system automatically selects the most recent rate effective on or before the entry\'s date. This means historical entries always reflect the rate that was in effect at the time \u2014 even after a rate change.</p>'
      +'<p>To schedule a future rate change, add a new rate history row with a future effective date. The <strong>Default Rate</strong> on the contact record serves as the fallback if no history row matches the entry date.</p>'
      +'<h4>The Current User Contact</h4>'
      +'<p>One contact is designated as the current user (marked during setup). Their rate history is used when billing your own time and no client- or matter-specific rate overrides it. This designation can be changed at any time in the contact form.</p>',

    invoices:'<h3>Invoices</h3>'
      +'<p>Invoices are built from approved time entries. They can be previewed, printed, and sent to clients directly from the Invoices tab.</p>'
      +'<h4>Invoice Workflow</h4>'
      +'<ol>'
      +'<li>Approve time entries in the <strong>Approvals</strong> tab (Partners only).</li>'
      +'<li>In the <strong>Invoices</strong> tab, click <strong>+ New Invoice</strong>, select a client, and choose which approved entries to include.</li>'
      +'<li>Preview the invoice with the 🖨 icon, then use the 📧 icon to send it via your email client.</li>'
      +'<li>Click <strong>Mark Sent</strong> to record that the invoice has been delivered to the client.</li>'
      +'</ol>'
      +'<h4>Print Preview</h4>'
      +'<p>The print view opens a formatted invoice suitable for printing or saving as a PDF from your browser. The firm name, matter details, and line-item hours appear in a standard legal invoice layout.</p>'
      +'<h4>Email Presets</h4>'
      +'<p>Configure reusable email templates in <strong>\u2699\ufe0f Settings \u2192 Email</strong>. Presets support placeholders such as <code>{client_name}</code>, <code>{invoice_number}</code>, <code>{amount_due}</code>, and any custom tokens you define. Presets are selectable in the Send Email modal.</p>',

    roles:'<h3>Roles &amp; Workflow</h3>'
      +'<p>Three roles control access and available actions within the app. Set your role in <strong>\u2699\ufe0f Settings \u2192 Advanced</strong>.</p>'
      +'<h4>Attorney</h4>'
      +'<p>Logs and manages their own time entries. Can edit pending entries and submit them for partner review using <strong>📤 Submit to Partner</strong>, which generates a transfer package (.json file). Does not have access to the Approvals or Invoices tabs.</p>'
      +'<h4>Partner</h4>'
      +'<p>Full access across all tabs. Reviews, approves, cuts, or edits entries in the <strong>Approvals</strong> tab. Creates and manages invoices. Imports attorney submission packages to add their entries to the firm database.</p>'
      +'<h4>Billing Staff</h4>'
      +'<p>Can create and edit entries on behalf of any attorney. Assigns ABA/UTBMS codes and links matter numbers. Can export review packages scoped to a specific partner\'s client list. Has full visibility into the timesheet but does not access Approvals or Invoices.</p>'
      +'<h4>Submission Workflow</h4>'
      +'<ol>'
      +'<li>The <strong>Attorney</strong> logs time entries and marks them ready for review.</li>'
      +'<li>The Attorney uses <em>Submit to Partner</em> to download a submission package (.json).</li>'
      +'<li>The <strong>Partner</strong> imports the package, which adds those entries to the Approvals queue.</li>'
      +'<li>The Partner reviews each entry \u2014 approving, adjusting the hours, or requesting changes.</li>'
      +'<li>Approved entries become available in the Invoices tab for billing.</li>'
      +'</ol>'
      +'<h4>Firm Profile</h4>'
      +'<p>A Firm Profile is a configuration export containing clients, matters, contacts, description presets, and user templates \u2014 but no time entries. Partners can generate one from the <strong>Firm</strong> tab in the top navigation and distribute it to new team members for instant onboarding.</p>',

    settings:'<h3>Settings</h3>'
      +'<h4>Firm</h4><p>Set your firm name and the display name shown in the app header and on printed invoices. Build and export a Firm Profile to share with team members for one-click onboarding.</p>'
      +'<h4>Appearance</h4><p>Toggle dark mode and choose a layout density: Comfortable, Compact, or Spacious. Changes apply immediately without a reload.</p>'
      +'<h4>Export</h4><p>Configure the quick-export button in the header (CSV or Excel). Also run the full Export Wizard for custom date ranges, column selection, grouping, and file format options.</p>'
      +'<h4>Backup</h4><p>Download a complete JSON backup of all your data, restore from a previous backup, or save a fresh standalone copy of the app as an HTML file.</p>'
      +'<h4>Descriptions</h4><p>Manage description presets \u2014 the chip suggestions that appear below the description field when logging time. Drag to reorder, click to edit, or delete presets individually.</p>'
      +'<h4>Email</h4><p>Create and manage reusable email templates with subject lines and body text. Templates support built-in and custom placeholders. Presets are available in any Send Email modal throughout the app.</p>'
      +'<h4>Placeholders</h4><p>Define custom tokens such as <code>{my_token}</code> for use in email subjects, body text, and export filenames. Built-in placeholders (client name, invoice number, date, etc.) are filled automatically. Custom placeholders use the static value you assign here.</p>'
      +'<h4>Advanced</h4><p>Set your role (Attorney, Partner, or Billing Staff), enable or disable the Analytics tab, toggle Fee Allocation mode, and access the Danger Zone to reset all app data. This tab also contains the <strong>Download Claude Guide</strong> button, which regenerates the AI architecture reference file used when modifying the app with Claude.</p>',

    backup:'<h3>Backup &amp; Data</h3>'
      +'<div class="note">\u26a0\ufe0f <strong>Your data exists only in this browser.</strong> Clearing browser storage, switching browsers, or using a different device will not carry your data over. Back up regularly.</div>'
      +'<h4>Full JSON Backup</h4>'
      +'<p>Go to <strong>\u2699\ufe0f Settings \u2192 Backup</strong> and click <em>Download Full Backup (.json)</em>. The export contains all clients, matters, time entries, contacts, invoices, settings, and presets. The filename includes the current date and time for easy versioning.</p>'
      +'<h4>Restoring from Backup</h4>'
      +'<p>Click <strong>Restore / Import Data</strong> and select a previously saved .json backup file. This operation replaces all current data \u2014 download a fresh backup first if you want to preserve the current state.</p>'
      +'<h4>Firm Profile</h4>'
      +'<p>A Firm Profile is a configuration-only export \u2014 it contains clients, matters, contacts, and presets, but no time entries or invoices. Use it to onboard new team members: they import the profile on a fresh install and have the full firm setup immediately.</p>'
      +'<h4>Save a Copy of the App</h4>'
      +'<p>Use <em>Save App as HTML</em> in the Backup tab to download a standalone copy of the application file itself. This is useful for updating to a newer version: save your data as a JSON backup, download the new HTML, open it, and restore your backup.</p>'
      +'<h4>Storage Technology</h4>'
      +'<p>SixMinuteLog stores all data in your browser\'s <strong>IndexedDB</strong> \u2014 a structured local database built into every modern browser. Data never leaves your device. For best reliability, use the same browser and profile consistently, and avoid clearing browser storage without backing up first.</p>',

    claude:'<h3>Development Workflow</h3>'
      +'<p>SixMinuteLog was developed using Claude through the Claude web interface at <a href="https://claude.ai" target="_blank" style="color:var(--purple)">claude.ai</a>. The project intentionally avoids traditional development environments, frameworks, and build systems. Development occurs through structured iterations with Claude while preserving the core design constraint: the entire system remains a single standalone HTML file that runs fully offline.</p>'
      +'<h4>Claude Project Configuration</h4>'
      +'<p>Before starting development work, create a Claude Project in the Claude interface. This ensures architectural constraints are automatically applied to every development chat.</p>'
      +'<p>Inside the Claude Project settings, define the following as the Project System Instruction:</p>'
      +'<code style="display:block;background:var(--bg2);padding:10px 12px;border-radius:6px;margin:6px 0;font-size:12px;line-height:1.8">Keep the app fully offline without CDN or other dependencies.<br>Ensure there is no encoding corruption.<br>Keep the architecture modular and expandable.<br>Ensure the system can handle large datasets.<br>Maintain strong database design using IndexedDB.</code>'
      +'<p>This instruction enforces the fundamental design principles of SixMinuteLog and prevents Claude from suggesting frameworks, CDNs, or architecture changes that would break the single-file design. Start all development conversations inside this project so the instruction is always active.</p>'
      +'<h4 style="margin-top:20px;border-top:1px solid var(--border-l);padding-top:16px">Starting a Development Session</h4>'
      +'<p>Development sessions begin by exporting two files from the running application.</p>'
      +'<ol>'
      +'<li>In <strong>⚙️ Settings → Advanced</strong>, click <strong>Download Claude Guide</strong>. This exports <code>CLAUDE.md</code> — a structured description of the application architecture, database layout, and development constraints.</li>'
      +'<li>In <strong>Settings → Backup</strong>, click <strong>Save App as HTML</strong>. This downloads the complete application as <code>index.html</code>.</li>'
      +'<li>Open <a href="https://claude.ai" target="_blank" style="color:var(--purple)">claude.ai</a>, start a new chat inside the SixMinuteLog project, and upload both files.</li>'
      +'<li>Begin with a prompt in this format:<br><code style="display:block;background:var(--bg2);padding:8px 12px;border-radius:6px;margin:6px 0;font-size:12px;white-space:pre-wrap">Read CLAUDE.md first. Then modify index.html to [describe your change]</code></li>'
      +'</ol>'
      +'<p>Claude will read the architecture guide, analyze the application, and return an updated <code>index.html</code>. Download it, open it in your browser, and test.</p>'
      +'<p>For multiple changes, list them as a numbered sequence in a single message. Claude works through each in order, confirms each step, and prints a full summary at the end.</p>'
      +'<h4 style="margin-top:20px;border-top:1px solid var(--border-l);padding-top:16px">Testing</h4>'
      +'<p>Because the application runs entirely in the browser, testing requires no build process or deployment step. Opening the file in a browser loads the updated system immediately. Verify that the new functionality works as expected and that existing features remain stable.</p>'
      +'<p>If issues appear, return to the same Claude conversation and describe the observed behavior. Claude can analyze and correct the implementation within the same session.</p>'
      +'<h4 style="margin-top:20px;border-top:1px solid var(--border-l);padding-top:16px">Preparing the Next Session</h4>'
      +'<p>After modifications are tested and confirmed, regenerate the architecture documentation so future sessions remain synchronised with the updated codebase. Open the modified application and again select <strong>Download Claude Guide</strong> from <strong>Settings → Advanced</strong>. This generates a new <code>CLAUDE.md</code> reflecting the current application structure.</p>'
      +'<p>Always begin future sessions using the latest exported guide and HTML file. The complete workflow is a repeating cycle:</p>'
      +'<code style="display:block;background:var(--bg2);padding:10px 12px;border-radius:6px;margin:6px 0;font-size:12px;text-align:center;letter-spacing:.01em">export guide → export app → upload to Claude → request change → test → regenerate guide</code>',

    faq:'<h3>Frequently Asked Questions</h3>'+[
      ['Where is my data stored?','All data is stored in your browser\'s IndexedDB \u2014 a local database built into every modern browser. Nothing is ever transmitted to a server or external service. Data exists only in the browser profile where it was entered.'],
      ['Can I access my data on another device or browser?','Not automatically. Export a JSON backup from the current device via \u2699\ufe0f Settings \u2192 Backup, then use Restore on the other device or browser. Each browser instance maintains its own independent database.'],
      ['Why doesn\'t switching a dropdown clear my typed values?','This is intentional. The app preserves all form field values before every re-render, so changing the Client, Matter, or Team Member dropdown never erases your typed hours, rate, or description.'],
      ...(ST.prefs.revenueSplit?[['How does fee allocation work?','Enable Fee Allocation in \u2699\ufe0f Settings \u2192 Advanced. Then set an Attorney Share % on each contact record (for example, 65 means the attorney retains 65% and the firm retains 35%). The Analytics tab displays the full breakdown per attorney and across the firm.']]:[] ),
      ['What are ABA / UTBMS codes?','ABA Uniform Task-Based Management System codes are a standardised taxonomy used in legal billing to categorise work by task type. They are required by many corporate clients and insurance carriers. Assign codes per entry in the New Entry form, or use the 🧾 button to set codes in bulk (available to Billing Staff).'],
      ['How does rate history work?','Each contact can have multiple rate history entries, each with an effective date. When a time entry is created, the system selects the most recent rate whose effective date falls on or before the entry date. This ensures that historical entries always reflect the rate that was in effect at the time, regardless of subsequent rate changes.'],
      ['What is a Firm Profile?','A Firm Profile is a configuration-only export that contains clients, matters, contacts, and presets \u2014 but no time entries or invoices. A partner can generate one and distribute it to new team members, who import it on a fresh install to have the complete firm setup immediately.'],
      ['How precise are hours values?','Hours are stored at up to 4 decimal places of precision. Entries logged using the built-in timer also store the exact raw duration in milliseconds. Billing views and invoices display values to one decimal place. Hover over a timer-sourced value in the timesheet to see the exact measured duration.'],
      ['How do I back up my data?','Go to \u2699\ufe0f Settings \u2192 Backup and click Download Full Backup (.json). The file includes all data and is timestamped. Store it in a safe location and back up regularly.'],
      ['Which browsers are supported?','Chrome and Chromium-based browsers (Edge, Brave) offer the most stable IndexedDB implementation. Firefox and Safari also work. Always use the same browser profile for consistent access to your data.'],
      ['Does this work offline?','Yes. The file has no external dependencies and requires no internet connection. Download the HTML file, save it locally, and open it by double-clicking \u2014 it runs entirely in your browser without any network access.'],
      ['Can multiple people use the same file?','No \u2014 the app is designed for a single user per browser instance. Multi-person workflows use the submission package system: attorneys export their entries as a .json package, and the partner imports it. The Firm Profile handles initial configuration distribution.'],
    ].map(function(q){return '<div class="faq-item"><strong>'+H(q[0])+'</strong><p>'+q[1]+'</p></div>';}).join('')
  };
  return buildModal({size:'lg',
    title:IC.help+' Help & Guide',titleClass:'u-fac8',
    onClose:'A.closeM()',
    body:'<div class="help-lay"><div class="help-nav">'+tabs.map(function(t){return '<button class="'+(ST.helpTab===t[0]?'on':'')+'" onclick="A.setHT(\''+t[0]+'\')">'+H(t[1])+'</button>';}).join('')+'</div>'
      +'<div class="help-body">'+(content[ST.helpTab]||'')+'</div></div>'
  });
}

function buildExportModal(){
  var x=ST.csvX;
  var ds=x.dataset;

  // ── Dataset selector buttons ──
  var dsBtns=['entries','clients','matters','contacts'].map(function(d){
    var lbls={entries:'Time Entries',clients:'Clients',matters:'Matters',contacts:'Contacts'};
    var on=ds===d;
    return '<button class="btn'+(on?' btn-dk':' btn-gh')+'" style="flex:1;justify-content:center;font-size:12px;padding:8px 6px" onclick="A.csvXDataset(\''+d+'\')">'+lbls[d]+'</button>';
  }).join('');

  // ── Helpers ──
  function chkBox(id,checked,onchange,label,hint){
    return '<label style="display:flex;align-items:flex-start;gap:8px;font-size:12px;cursor:pointer;padding:5px 0;line-height:1.4">'
      +'<input type="checkbox" id="'+id+'" name="'+id+'" '+(checked?'checked':'')+' onchange="'+onchange+'" style="margin-top:1px;flex-shrink:0;width:13px;height:13px;cursor:pointer">'
      +'<span><strong>'+label+'</strong>'+(hint?'<br><span class="u-fs11c3">'+hint+'</span>':'')+'</span></label>';
  }
  function colGrid(cols){
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">'+cols+'</div>';
  }
  function section(title,body,noBorder){
    return '<div class="set-section"'+(noBorder?' class="u-nobb"':'')+'>'
      +'<h3 style="margin-bottom:10px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2)">'+title+'</h3>'
      +body+'</div>';
  }

  var body='';

  if(ds==='entries'){
    // Date range
    var drBody='<div class="frow c2">'
      +'<div class="fl"><label for="csvx-dfrom">From</label><input type="date" id="csvx-dfrom" value="'+H(x.dateFrom||'')+'" onchange="A.csvXOpt(\'dateFrom\',this.value)"></div>'
      +'<div class="fl"><label for="csvx-dto">To</label><input type="date" id="csvx-dto" value="'+H(x.dateTo||'')+'" onchange="A.csvXOpt(\'dateTo\',this.value)"></div>'
      +'</div>'
      +'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px">'
      +['today','week','month','quarter','year','all'].map(function(p){
        var lbl={today:'Today',week:'This Week',month:'This Month',quarter:'This Quarter',year:'This Year',all:'All Time'}[p];
        return '<button class="btn btn-gh u-fs11p49" onclick="A.csvXPreset(\''+p+'\')">'+lbl+'</button>';
      }).join('')+'</div>';
    body+=section('Date Range',drBody);

    // Client filter
    var clOpts2=ST.clients.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
    var clBd='<label style="display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;padding:3px 0">'
      +'<input type="checkbox" id="csv-all-clients" name="csv-all-clients" '+(x.allClients?'checked':'')+' onchange="A.csvXAllClients(this.checked)" class="u-ico">'
      +'<strong>All clients</strong></label>';
    if(!x.allClients && clOpts2.length>0){
      clBd+='<div style="max-height:110px;overflow-y:auto;border:1px solid var(--border);border-radius:7px;padding:4px 8px;margin-top:6px;background:var(--bg)">';
      clOpts2.forEach(function(c){
        clBd+='<label style="display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;padding:2px 0">'
          +'<input type="checkbox" id="csv-cl-'+c.id+'" name="csv-cl-'+c.id+'" '+(x.clientIds[c.id]?'checked':'')+' onchange="A.csvXTogClient('+c.id+',this.checked)" class="u-ico-ns">'
          +H(c.name)+'</label>';
      });
      clBd+='</div>';
    } else if(!x.allClients){
      clBd+='<p class="u-hint6">No clients in database.</p>';
    }
    body+=section('Filter by Client',clBd);

    // Matter filter
    var maOpts2=ST.matters.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
    var maBd='<label style="display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;padding:3px 0">'
      +'<input type="checkbox" id="csv-all-matters" name="csv-all-matters" '+(x.allMatters?'checked':'')+' onchange="A.csvXAllMatters(this.checked)" class="u-ico">'
      +'<strong>All matters</strong></label>';
    if(!x.allMatters && maOpts2.length>0){
      maBd+='<div style="max-height:110px;overflow-y:auto;border:1px solid var(--border);border-radius:7px;padding:4px 8px;margin-top:6px;background:var(--bg)">';
      maOpts2.forEach(function(m){
        var cl=_lu.cl[m.clientId];
        maBd+='<label style="display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;padding:2px 0">'
          +'<input type="checkbox" id="csv-ma-'+m.id+'" name="csv-ma-'+m.id+'" '+(x.matterIds[m.id]?'checked':'')+' onchange="A.csvXTogMatter('+m.id+',this.checked)" class="u-ico-ns">'
          +H(m.name)+(cl?' <span class="u-fs11c3">— '+H(cl.name)+'</span>':'')+'</label>';
      });
      maBd+='</div>';
    } else if(!x.allMatters){
      maBd+='<p class="u-hint6">No matters in database.</p>';
    }
    body+=section('Filter by Matter',maBd);

    // Columns
    function eCol(k,lbl){ return '<label class="u-tog"><input type="checkbox" id="csv-col-'+k+'" name="csv-col-'+k+'" '+(x.cols[k]?'checked':'')+' onchange="A.csvXTogCol(\''+k+'\')" class="u-ico-ns">'+lbl+'</label>'; }
    body+=section('Columns',
      '<div class="u-g220">'
      +eCol('date','Date')
      +eCol('client','Client')
      +eCol('matter','Matter')
      +eCol('contact','Billing Contact')
      +eCol('hours','Hours')
      +eCol('rate','Rate')
      +eCol('amount','Amount')
      +eCol('desc','Description')
      +eCol('by','Created By')
      +eCol('abaCode','ABA Task Code')
      +eCol('entryId','Entry ID')
      +'</div>'
      +'<div class="u-fg6mt8">'
      +'<button class="btn btn-gh u-fs11p49" onclick="A.csvXAllCols(true)">Select All</button>'

// Resolve a route assignment object to its string value
// r = {type, ref, field, value}; cppl = client.clientPeople array
function _resolveRouteVal(r,cppl){
  if(!r||!r.type) return '';
  var fld=r.field||'email';
  if(r.type==='static') return r.value||'';
  if(r.type==='clientPerson'){
    var p=(cppl||[])[r.ref];
    if(!p) return '';
    return fld==='email'?(p.email||''):fld==='phone'?(p.phone||''):p.name||'';
  }
  if(r.type==='firmContact'){
    var ct=_lu.ct[r.ref]||null;
    if(!ct) return '';
    return fld==='email'?(ct.email||''):fld==='phone'?(ct.phone||''):ct.name||'';
  }
  return '';
}
// Resolve any custom placeholder for a context {clientId, matterId}
// Priority: matter route → client route → linkedField → defaultValue
function _resolveRoutedPH(ph,ctx,_resolveLinkedFieldFn){
  ctx=ctx||{};
  if(ctx.matterId){
    var ma=_lu.ma[ctx.matterId]||null;
    if(ma&&ma.phRoutes&&ma.phRoutes[ph.id]){
      var maCl=_lu.cl[ma.clientId]||null;
      var v=_resolveRouteVal(ma.phRoutes[ph.id],(maCl&&maCl.clientPeople)||[]);
      if(v) return v;
    }
  }
  if(ctx.clientId){
    var cl=_lu.cl[ctx.clientId]||null;
    if(cl&&cl.phRoutes&&cl.phRoutes[ph.id]){
      var v2=_resolveRouteVal(cl.phRoutes[ph.id],cl.clientPeople||[]);
      if(v2) return v2;
    }
  }
  if(ph.linkedField&&_resolveLinkedFieldFn) return _resolveLinkedFieldFn(ph.linkedField);
  return ph.defaultValue||'';
}

// Build the full token→value map used by replacePlaceholders
// ctx: optional object with {clientName, matterName, invNum, invAmount, entriesCount, hoursTotal}
function _phMap(ctx, mp){
  ctx=ctx||{};
  mp=mp||{};
  var now=new Date();
  var monthNamesL=MONTH_NAMES_L, monthNamesS=MONTH_NAMES_S, dayNamesL=DAY_NAMES_L, dayNamesS=DAY_NAMES_S;
  var y=now.getFullYear(), mo=now.getMonth(), d=now.getDate(), dow=now.getDay();
  var moN=pad2(mo+1), dN=pad2(d);
  // ISO week number
  var _wk2=new Date(Date.UTC(y,mo,d));
  var _day2=_wk2.getUTCDay()||7; _wk2.setUTCDate(_wk2.getUTCDate()+4-_day2);
  var _yr2=new Date(Date.UTC(_wk2.getUTCFullYear(),0,1));
  var wkNum=pad2(Math.ceil((((_wk2-_yr2)/86400000)+1)/7));
  var dateStr=monthNamesL[mo]+' '+y;
  var due=new Date(now); due.setDate(due.getDate()+30);
  var dueStr=monthNamesL[due.getMonth()]+' '+due.getDate()+', '+due.getFullYear();
  var map={
    '{filename}': (function(){var n=new Date();return 'billing-backup_'+toIsoDate(n)+'_'+pad2(n.getHours())+pad2(n.getMinutes())+'.json';})(),
    '{date}':        dateStr,
    '{date_today}':  monthNamesL[mo]+' '+d+', '+y,
    '{date_iso}':    y+'-'+moN+'-'+dN,
    '{day}':         String(d),
    '{day_name}':    dayNamesL[dow],
    '{day_short}':   dayNamesS[dow],
    '{month_name}':  monthNamesL[mo],
    '{month_short}': monthNamesS[mo],
    '{month_num}':   moN,
    '{year}':        String(y),
    '{quarter}':     'Q'+String(Math.floor(mo/3)+1),
    '{week_num}':    wkNum,
    '{due_date}': dueStr,
    '{client}':   ctx.clientName||'',
    '{matter}':   ctx.matterName||'',
    '{firm}':     ST.prefs.firmName||(ST.firmProfile&&ST.firmProfile.firmName)||'',
    '{invoice_num}': ctx.invNum||'',
    '{amount}':   ctx.invAmount||'',
    '{entries_count}': ctx.entriesCount!=null?String(ctx.entriesCount):'',
    '{hours_total}':   ctx.hoursTotal||'',
    '{user}':     (ST.user&&ST.user.name)||'',
    '{initials}': (ST.user&&ST.user.initials)||'',
    '{cc_list}':  mp.cc||''
  };
  var _cl=null,_clCt=null,_clCts=null,_clPeople=null,_ma=null,_maCt=null;
  function _getClient(){
    if(_cl===null){
      _cl=_lu.cl[ctx.clientId]||{};
      // Resolve primary firm contact: prefer contactIds[0], fall back to legacy contactId
      var primaryCtId=(_cl.contactIds&&_cl.contactIds.length)?_cl.contactIds[0]:(_cl.contactId||null);
      _clCt=primaryCtId?(_lu.ct[primaryCtId]||{}):{};
      // All firm contacts linked to client
      var allCtIds=(_cl.contactIds&&_cl.contactIds.length)?_cl.contactIds:(_cl.contactId?[_cl.contactId]:[]);
      _clCts=allCtIds.map(function(id){return _lu.ct[id];}).filter(Boolean);
      // Client-side people (client.clientPeople[])
      _clPeople=(_cl.clientPeople&&_cl.clientPeople.length)?_cl.clientPeople:[];
    }
    return _cl;}
  function _getMatter(){
    if(_ma===null){_ma=_lu.ma[ctx.matterId]||{};
      _maCt=_ma.contactId?(_lu.ct[_ma.contactId]||{}):{};}
    return _ma;}
  function _resolveLinkedField(key){
    switch(key){
      case 'client_name':          return _getClient().name||'';
      case 'client_email':         return _getClient().email||'';
      case 'client_phone':         return _getClient().phone||'';
      case 'client_rate':          return _getClient().rate?'$'+_getClient().rate+'/hr':'';
      // Primary firm contact (first in contactIds[], fallback to legacy contactId)
      case 'client_contact_name':  _getClient(); return (_clCt&&_clCt.name)||'';
      case 'client_contact_role':  _getClient(); return (_clCt&&_clCt.role)||'';
      case 'client_contact_email': _getClient(); return (_clCt&&_clCt.email)||'';
      case 'client_contact_phone': _getClient(); return (_clCt&&_clCt.phone)||'';
      // All firm contacts joined
      case 'client_contacts_names':  _getClient(); return _clCts.map(function(c){return c.name;}).join(', ');
      case 'client_contacts_emails': _getClient(); return _clCts.map(function(c){return c.email;}).filter(Boolean).join(', ');
      // Client-side people — aggregate fields only (pick specific people via per-client routing)
      case 'client_people_names':  _getClient(); return _clPeople.map(function(p){return p.name;}).join(', ');
      case 'client_people_emails': _getClient(); return _clPeople.map(function(p){return p.email;}).filter(Boolean).join(', ');
      case 'client_people_phones': _getClient(); return _clPeople.map(function(p){return p.phone;}).filter(Boolean).join(', ');      case 'matter_name':          return _getMatter().name||'';
      case 'matter_contact_name':  _getMatter(); return (_maCt&&_maCt.name)||'';
      case 'matter_contact_role':  _getMatter(); return (_maCt&&_maCt.role)||'';
      case 'matter_contact_email': _getMatter(); return (_maCt&&_maCt.email)||'';
      case 'matter_contact_phone': _getMatter(); return (_maCt&&_maCt.phone)||'';
      case 'user_name':            return (ST.user&&ST.user.name)||'';
      case 'user_initials':        return (ST.user&&ST.user.initials)||'';
      case 'user_email':           return (ST.user&&ST.user.email)||'';
      case 'user_phone':           return (ST.user&&ST.user.phone)||'';
      default:                     return '';
    }
  }
  (ST.mailPlaceholders||[]).forEach(function(p){
    // Unified resolution: matter route → client route → linked field → default value
    map['{'+p.key+'}'] = _resolveRoutedPH(p,ctx,_resolveLinkedField);
  });
  return map;
}

// Apply a token→value map to a string
function _applyPH(s, map){
  s=s||'';
  Object.keys(map).forEach(function(k){ s=s.split(k).join(map[k]); });
  return s;
}

// Apply file-title placeholders to a prefix string.
// dataset: 'entries'|'clients'|'matters'|'contacts'
function _applyFilePH(prefix, dataset){
  if(!prefix) return '';
  var now=new Date();
  var monthNames=MONTH_NAMES_L, monthShort=MONTH_NAMES_S, dayNames=DAY_NAMES_L, dayShort=DAY_NAMES_S;
  var y=now.getFullYear(), mo=now.getMonth(), d=now.getDate();
  var h=now.getHours(), mi=now.getMinutes(), dow=now.getDay();
  var moN=pad2(mo+1), dN=pad2(d);
  // ISO week number
  var _wk=new Date(Date.UTC(y,mo,d));
  var _day=_wk.getUTCDay()||7; _wk.setUTCDate(_wk.getUTCDate()+4-_day);
  var _yr=new Date(Date.UTC(_wk.getUTCFullYear(),0,1));
  var weekNum=pad2(Math.ceil((((_wk-_yr)/86400000)+1)/7));
  var isoDate=toIsoDate(now);
  var map={
    '{date}':        isoDate,
    '{date_us}':     moN+'/'+dN+'/'+y,
    '{date_uk}':     dN+'/'+moN+'/'+y,
    '{datetime}':    isoDate+'_'+pad2(h)+'-'+pad2(mi),
    '{year}':        String(y),
    '{month}':       moN,
    '{month_name}':  monthNames[mo],
    '{month_short}': monthShort[mo],
    '{day}':         dN,
    '{day_name}':    dayNames[dow],
    '{day_short}':   dayShort[dow],
    '{quarter}':     'Q'+String(Math.floor(mo/3)+1),
    '{week}':        weekNum,
    '{time}':        pad2(h)+'-'+pad2(mi),
    '{dataset}':     dataset||'export',
    '{user}':        (ST.user&&ST.user.name)||'',
    '{initials}':    (ST.user&&ST.user.initials)||'',
    '{firm}':        ST.prefs.firmName||(ST.firmProfile&&ST.firmProfile.firmName)||''
  };
  (ST.mailPlaceholders||[]).forEach(function(p){
    map['{'+p.key+'}']=p.defaultValue||'';
  });
  return _applyPH(prefix, map);
}
