  function ago(d,n){d.setDate(d.getDate()-n);return d;}
  function agoM(d,n){d.setMonth(d.getMonth()-n);return d;}
  function agoY(d,n){d.setFullYear(d.getFullYear()-n);return d;}
  var cut, cutEnd;
  if(f==='today') cut=t;
  else if(f==='week'){ var _wd=t.getDay(); cut=new Date(t); cut.setDate(t.getDate()-((_wd+6)%7)); }
  else if(f==='month') cut=new Date(now.getFullYear(),now.getMonth(),1);
  else if(f==='quarter') cut=ago(new Date(t),91);
  else if(f==='year')  cut=new Date(now.getFullYear(),0,1);
  else if(f==='this_month'){
    cut=new Date(now.getFullYear(),now.getMonth(),1);
  } else if(f==='this_quarter'){
    var qStart=Math.floor(now.getMonth()/3)*3;
    cut=new Date(now.getFullYear(),qStart,1);
  } else if(f==='this_year'){
    cut=new Date(now.getFullYear(),0,1);
  } else return arr; // 'all'
  // Parse YYYY-MM-DD as local midnight via global localDate() — avoids timezone boundary errors
  return arr.filter(function(e){return localDate(e.date)>=cut;});
}

// mruOpts — builds an opts array for a <select> with MRU items first, then alphabetical remainder.
// arr      : entity array (clients / matters / contacts)
// entries  : ST.entries — scanned newest-first to determine recent usage
// field    : key on entry to match against entity id (e.g. 'clientId', 'matterId', 'contactId')
// labelFn  : function(entity) → label string
// n        : max MRU items to surface at the top (default 10)
// Returns  : flat opts array [{v,l}] — MRU group (with disabled header), then rest (with disabled header if both non-empty).
function mruOpts(arr, entries, field, labelFn, n){
  n = n || 10;
  var sorted = arr.slice().sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  var seen = {}, mruIds = [];
  // Walk entries newest-first to collect unique recently-used ids
  var byDate = ST.entries.slice().sort(function(a,b){ return b.date < a.date ? -1 : b.date > a.date ? 1 : 0; });
  for(var i=0; i<byDate.length && mruIds.length<n; i++){
    var eid = String(byDate[i][field]||'');
    if(eid && !seen[eid]){ seen[eid]=true; mruIds.push(eid); }
  }
  // Split into mru subset (recency order) and rest (alphabetical)
  var mruSet = {};
  mruIds.forEach(function(id){ mruSet[id]=true; });
  var mruItems = mruIds.map(function(id){ return arr.find(function(x){ return String(x.id)===id; }); }).filter(Boolean);
  var restItems = sorted.filter(function(x){ return !mruSet[String(x.id)]; });
  var opts = [];
  if(mruItems.length && restItems.length){
    opts.push({grp:'Recent'});
    mruItems.forEach(function(x){ opts.push({v:x.id, l:labelFn(x)}); });
    opts.push({grpEnd:true});
    opts.push({grp:'All'});
    restItems.forEach(function(x){ opts.push({v:x.id, l:labelFn(x)}); });
    opts.push({grpEnd:true});
  } else {
    // Not enough history yet — just alphabetical
    sorted.forEach(function(x){ opts.push({v:x.id, l:labelFn(x)}); });
  }
  return opts;
}

// Convert an analytics filter period to an IDB-queryable {from, to} date range.
// Returns YYYY-MM-DD strings (empty string = open bound). Used by
// _loadAnalyticsEntries() so IDB does the date filtering — not a JS Array.filter().
function filterToDateRange(f){
  var now=new Date();
  var from='', to=toIsoDate(now);
  if(f==='today'){
    from=to;
  } else if(f==='week'){
    var w=new Date(now); w.setDate(w.getDate()-7); from=toIsoDate(w);
  } else if(f==='month'){
    var mo=new Date(now); mo.setMonth(mo.getMonth()-1); from=toIsoDate(mo);
  } else if(f==='quarter'){
    var q=new Date(now); q.setDate(q.getDate()-91); from=toIsoDate(q);
  } else if(f==='year'){
    var yr=new Date(now); yr.setFullYear(yr.getFullYear()-1); from=toIsoDate(yr);
  } else if(f==='this_month'){
    from=now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-01';
  } else if(f==='this_quarter'){
    var qm=Math.floor(now.getMonth()/3)*3;
    from=now.getFullYear()+'-'+pad2(qm+1)+'-01';
  } else if(f==='this_year'){
    from=now.getFullYear()+'-01-01';
  } else {
    // 'all' — open range
    from=''; to='';
  }
  return {from:from,to:to};
}

// Returns the fraction of annual salary that maps to the given filter period.
// Used to prorate salary for bonus/shortfall comparisons.
// Returns null if the period is indeterminate ('all').
function salaryForPeriod(annual, f){
  if(annual==null||annual==='') return null;
  var a=Number(annual);
  var now=new Date();
  if(f==='week')        return a/52;
  if(f==='month')       return a/12;
  if(f==='quarter')     return a/4;
  if(f==='year')        return a;
  if(f==='this_month'){
    // Days elapsed in this calendar month / days in month
    var daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    var dayOfMonth=now.getDate();
    return (a/12)*(dayOfMonth/daysInMonth);
  }
  if(f==='this_quarter'){
    var qStartM=Math.floor(now.getMonth()/3)*3;
    var qStart=new Date(now.getFullYear(),qStartM,1);
    var qEnd=new Date(now.getFullYear(),qStartM+3,0);
    var qDays=(qEnd-qStart)/86400000+1;
    var elapsed=Math.floor((now-qStart)/86400000)+1;
    return (a/4)*(elapsed/qDays);
  }
  if(f==='this_year'){
    var isLeap=(now.getFullYear()%4===0&&now.getFullYear()%100!==0)||(now.getFullYear()%400===0);
    var yearDays=isLeap?366:365;
    var jan1=new Date(now.getFullYear(),0,1);
    var elapsed2=Math.floor((now-jan1)/86400000)+1;
    return a*(elapsed2/yearDays);
  }
  return null; // 'all' — no meaningful proration
}

// Human-readable salary period label for display
function salaryPeriodLabel(f){
  return {
    week:'weekly (÷52)', month:'monthly (÷12)', quarter:'quarterly (÷4)',
    year:'annual', this_month:'month-to-date', this_quarter:'quarter-to-date',
    this_year:'year-to-date', all:null
  }[f]||null;
}

// Sync form field values to state before any re-render triggered by dropdown changes
// This prevents typed text from being lost when a select triggers a re-render
// syncForm(target?) — generic DOM-driven state preservation.
//
// Every field() call in a managed form carries data-sf="namespace.property"
// (dot-notation) which maps directly to ST[namespace][property].
// Three-segment paths (e.g. "cf.newPerson.name") write one level deeper.
// Raw inputs not built via field() must carry a matching data-sf manually.
//
// Hot-path (O(1)): pass the changed DOM element as `target`.
// Bulk-path (O(N)): call with no args to scan the active overlay zone (#z-ov).
// Fields whose data-sf does not contain a dot are silently skipped (transient
// add-row inputs that are read directly by action handlers via g()).
function syncForm(target){
  if(!ST.modal) return;

  function _writeEl(el){
    var sf=el.dataset.sf;
    // Only handle dot-notation paths — bare ids are transient inputs, skip them
    if(!sf||sf.indexOf('.')===-1) return;
    var val=el.type==='checkbox'?el.checked:el.value;
    var parts=sf.split('.');
    var obj=ST[parts[0]];
    if(!obj||typeof obj!=='object') return;
    if(parts.length===2){
      obj[parts[1]]=val;
    } else if(parts.length===3){
      if(!obj[parts[1]]||typeof obj[parts[1]]!=='object') obj[parts[1]]={};
      obj[parts[1]][parts[2]]=val;
    }
  }

  // Fast path: O(1) — caller supplied the changed element directly
  if(target&&target.dataset&&target.dataset.sf){
    _writeEl(target);
    return;
  }

  // Full scan fallback — scoped to modal overlay zone to avoid full-document traversal
  var scanRoot=document.getElementById('z-ov')||document;
  scanRoot.querySelectorAll('[data-sf]').forEach(_writeEl);
}

// === SELECTORS
// Pure data-preparation functions — no HTML, no DOM side-effects.
// Called by view functions to decouple data logic from HTML rendering.
// NOTE: pagination selectors clamp the active page number as a corrective side-effect,
// matching the prior inline behavior that views relied on.

// ── Client list ───────────────────────────────────────────────────────────────
// Returns {list, totalFiltered, totalPages, pageSize} — list is the current page slice.
function getFilteredSortedClients(){
  var list=ST.clients;
  if(ST.clSearch) list=list.filter(function(c){
    return containsStr(c.name,ST.clSearch)||(c.email&&containsStr(c.email,ST.clSearch));
  });
  if(ST.clGrpFilter==='ungrouped') list=list.filter(function(c){return !c.groupId;});
  else if(ST.clGrpFilter) list=list.filter(function(c){return String(c.groupId)===String(ST.clGrpFilter);});
  var _matterCounts={};
  if(ST.clSort==='matters'){
    ST.matters.forEach(function(m){ _matterCounts[m.clientId]=(_matterCounts[m.clientId]||0)+1; });
  }
  list=[].concat(list).sort(function(a,b){
    if(ST.clSort==='matters') return (_matterCounts[b.id]||0)-(_matterCounts[a.id]||0);
    if(ST.clSort==='group'){
      var ga=_lu.gr[a.groupId],gb=_lu.gr[b.groupId];
      var gna=ga?ga.name:'zzz',gnb=gb?gb.name:'zzz';
      if(gna!==gnb) return gna.localeCompare(gnb);
      return a.name.localeCompare(b.name);
    }
    return a.name.localeCompare(b.name);
  });
  var totalFiltered=list.length;
  var PS=ST.CL_PAGE_SIZE||50;
  var totalPages=Math.max(1,Math.ceil(totalFiltered/PS));
  if(ST.clPage>=totalPages) ST.clPage=totalPages-1;
  if(ST.clPage<0) ST.clPage=0;
  var start=ST.clPage*PS;
  return {list:list.slice(start,start+PS),totalFiltered:totalFiltered,totalPages:totalPages,pageSize:PS};
}

// ── Matter list ───────────────────────────────────────────────────────────────
// Returns {list, totalFiltered, totalPages, pageSize} or null when no matters exist.
function getFilteredSortedMatters(){
  if(ST.matters.length===0) return null;
  var list=ST.matters;
  if(ST.maClientFilter) list=list.filter(function(m){return m.clientId==ST.maClientFilter;});
  if(ST.maSearch) list=list.filter(function(m){
    return containsStr(m.name,ST.maSearch)||(m.description&&containsStr(m.description,ST.maSearch));
  });
  list=[].concat(list).sort(function(a,b){
    if(ST.maSort==='client'){
      var ca=_lu.cl[a.clientId],cb=_lu.cl[b.clientId];
      var cn=((ca&&ca.name)||'').localeCompare((cb&&cb.name)||'');
      if(cn!==0) return cn;
      return a.name.localeCompare(b.name);
    }
    return a.name.localeCompare(b.name);
  });
  var totalFiltered=list.length;
  var PS=ST.MA_PAGE_SIZE||50;
  var totalPages=Math.max(1,Math.ceil(totalFiltered/PS));
  if(ST.maPage>=totalPages) ST.maPage=totalPages-1;
  if(ST.maPage<0) ST.maPage=0;
  var start=ST.maPage*PS;
  return {list:list.slice(start,start+PS),totalFiltered:totalFiltered,totalPages:totalPages,pageSize:PS};
}

// ── Contact list ──────────────────────────────────────────────────────────────
// Returns {list, totalFiltered, totalPages, pageSize} or null when no contacts exist.
function getFilteredSortedContacts(){
  if(ST.contacts.length===0) return null;
  var list=ST.contacts;
  if(ST.ctSearch) list=list.filter(function(c){
    return containsStr(c.name,ST.ctSearch)||(c.role&&containsStr(c.role,ST.ctSearch))||(c.email&&containsStr(c.email,ST.ctSearch));
  });
  list=[].concat(list).sort(function(a,b){
    if(ST.ctSort==='role') return (a.role||'').localeCompare(b.role||'');
    if(ST.ctSort==='rate') return Number(b.rate||0)-Number(a.rate||0);
    return a.name.localeCompare(b.name);
  });
  var totalFiltered=list.length;
  var PS=ST.CT_PAGE_SIZE||50;
  var totalPages=Math.max(1,Math.ceil(totalFiltered/PS));
  if(ST.ctPage>=totalPages) ST.ctPage=totalPages-1;
  if(ST.ctPage<0) ST.ctPage=0;
  var start=ST.ctPage*PS;
  return {list:list.slice(start,start+PS),totalFiltered:totalFiltered,totalPages:totalPages,pageSize:PS};
}

// ── Analytics: totals ─────────────────────────────────────────────────────────
// Returns {hrs, bill} for a filtered entries array.
function getAnalyticsTotals(fe){
  var hrs=fe.reduce(function(s,e){return s+Number(e.hours);},0);
  var bill=fe.reduce(function(s,e){return s+calcAmount(e.hours,e.rate,true);},0);
  return {hrs:hrs,bill:bill};
}

// ── Analytics: revenue by client ──────────────────────────────────────────────
// O(E) single-pass accumulator → [{name, hrs, bill}] sorted descending by bill.
function getRevenueByClient(fe){
  var acc={};
  fe.forEach(function(e){
    if(!e.clientId) return;
    if(!acc[e.clientId]) acc[e.clientId]={hrs:0,bill:0};
    acc[e.clientId].hrs=Math.round((acc[e.clientId].hrs+Number(e.hours))*10000)/10000;
    acc[e.clientId].bill=Math.round((acc[e.clientId].bill+calcAmount(e.hours,e.rate,true))*100)/100;
  });
  var clMap={};
  ST.clients.forEach(function(c){ clMap[c.id]=c.name; });
  return Object.keys(acc).map(function(cid){
    return {name:clMap[cid]||'Unknown',hrs:acc[cid].hrs,bill:acc[cid].bill};
  }).filter(function(c){return c.hrs>0;}).sort(function(a,b){return b.bill-a.bill;});
}

// ── Analytics: revenue by client group ───────────────────────────────────────
// O(C + E) — builds clientId→groupId map once, then single entry pass.
// Returns [] when no groups are defined.
function getRevenueByGroup(fe){
  if(!ST.groups.length) return [];
  var clToGrp={};
  ST.clients.forEach(function(c){ if(c.groupId) clToGrp[c.id]=c.groupId; });
  var acc={};
  fe.forEach(function(e){
    var gid=clToGrp[e.clientId];
    if(!gid) return;
    if(!acc[gid]) acc[gid]={hrs:0,bill:0};
    acc[gid].hrs=Math.round((acc[gid].hrs+Number(e.hours))*10000)/10000;
    acc[gid].bill=Math.round((acc[gid].bill+calcAmount(e.hours,e.rate,true))*100)/100;
  });
  return ST.groups.map(function(g){
    var a=acc[g.id]||{hrs:0,bill:0};
    return {name:g.name,hrs:a.hrs,bill:a.bill};
  }).filter(function(g){return g.hrs>0;}).sort(function(a,b){return b.bill-a.bill;});
}

// ── Analytics: contact revenue split ─────────────────────────────────────────
// O(E) single pass accumulator + O(C) contact map.
// Returns {contactSplit, totalOwn, totalFirm, uHrs, uBill, userPct}.
// contactSplit: [{id,name,hrs,bill,ownPct,own,firm,annualSalary,periodSalary,net}]
// Billing staff and partners are excluded from the split table (no personal cut).
// Unassigned entries are attributed to the current user's ownPct.
function getContactRevenueSplit(fe,salPeriodFn){
  var ctIds=ST.contacts.map(function(c){return c.id;});
  var ctSet={};
  for(var _i=0;_i<ctIds.length;_i++) ctSet[ctIds[_i]]=true;
  var ctAcc={};
  fe.forEach(function(e){
    var key=e.contactId&&ctSet[e.contactId]?e.contactId:'__unassigned';
    if(!ctAcc[key]) ctAcc[key]={hrs:0,bill:0};
    ctAcc[key].hrs=Math.round((ctAcc[key].hrs+Number(e.hours))*10000)/10000;
    ctAcc[key].bill=Math.round((ctAcc[key].bill+calcAmount(e.hours,e.rate,true))*100)/100;
  });
  var splitEligible=ST.contacts.filter(function(c){return c.role!=='billing_staff'&&c.role!=='partner';});
  var contactSplit=splitEligible.map(function(c){
    var acc=ctAcc[c.id]||{hrs:0,bill:0};
    var pct=c.ownPct!=null?Number(c.ownPct):100;
    var own=acc.bill*pct/100;
    var annualSal=c.salary!=null&&c.salary!==''?Number(c.salary):null;
    var periodSal=salPeriodFn(annualSal);
    var net=periodSal!=null?own-periodSal:null;
    return {id:c.id,name:c.name,hrs:acc.hrs,bill:acc.bill,ownPct:pct,own:own,
            firm:acc.bill*(100-pct)/100,annualSalary:annualSal,periodSalary:periodSal,net:net};
  }).filter(function(c){return c.hrs>0;});
  var unacc=ctAcc['__unassigned']||{hrs:0,bill:0};
  var uHrs=unacc.hrs,uBill=unacc.bill;
  var userPct=ST.user&&ST.user.ownPct!=null?Number(ST.user.ownPct):100;
  if(uHrs>0){
    var uOwn=uBill*userPct/100;
    contactSplit.push({id:'__unassigned',name:'(Unassigned)',hrs:uHrs,bill:uBill,ownPct:userPct,
      own:uOwn,firm:uBill*(100-userPct)/100,annualSalary:null,periodSalary:null,net:null});
  }
  var totalOwn=contactSplit.reduce(function(s,c){return s+c.own;},0);
  var totalFirm=contactSplit.reduce(function(s,c){return s+c.firm;},0);
  return {contactSplit:contactSplit,totalOwn:totalOwn,totalFirm:totalFirm,
          uHrs:uHrs,uBill:uBill,userPct:userPct,rawCtAcc:ctAcc};
}

// === SAVE
//
// Strategy:
//   saveOne(coll, rec)  — immediate single-record upsert (for form saves, no data-loss risk)
//   delOne(coll, id)    — immediate single-record delete
//   save()              — near-instant full-state sync (0ms debounce — batches same-tick calls, starts IDB next event-loop tick)
//   _flushSave()        — immediate (no debounce) full sync — called on tab hide
//
// Incremental persistence model — NO full getAll() scans:
//   saveOne/delOne    → immediate atomic single-record writes (hot path, always preferred)
//   save()            → bulk path: putBatch upserts + drains _pendingDeletes queue
//   replaceCollection → bulk-replace helper; diffs old vs new IDs, queues orphan deletes
//
var _saveTimer=null;
var _dirty={};          // { collName: true } — collections with pending upserts
var _pendingDeletes={}; // { collName: { id: true } } — IDs queued for deletion on next flush
// Granular entry-ID tracking — only the records that actually changed.
// Populated by saveOne('entries',rec); cleared on _flushSave reset.
// When entries are replaced via replaceCollection() the map stays empty,
// which is the signal to _flushSave that the full ST.entries array must be written.
var _dirtyEntries={};   // { id: record } — entry records needing individual upsert
var _dirtyInvoices={};  // { id: record } — invoice records needing individual upsert
// Mirrors _dirtyEntries: populated by saveOne('invoices',rec) so that a subsequent
// _flushSave triggered by _dirty._all (e.g. settings save) writes only the changed
// invoice records instead of the entire ST.invoices array in one transaction.
// When empty (replaceCollection path), _flushSave falls back to the full array.
// When true, _flushSave uses Store.syncCollection for entries (getAllKeys diff + batch delete)
// instead of putBatch. Set by replaceCollection() so that a full restore deletes
// ghost records from ALL years in IDB, not just those present in the partial
// in-memory ST.entries view (which only holds the current year on startup).
var _fullEntriesSync=false;
// Set ONLY by replaceCollection() when entries are replaced wholesale (import/restore).
// Guards the syncCollection (getAllKeys diff + batch delete) path in _flushSave — ensures we never
// delete prior-year records that are absent from a partial in-memory ST.entries view.
// _capDirtyEntries() does NOT touch this flag; its recovery path uses putBatchChunked.
var _needsOrphanPrune=false;
// Safety cap: if more than _MAX_DIRTY_ENTRIES unique entry records accumulate in
// _dirtyEntries (e.g. after repeated IDB failures), _capDirtyEntries() flags
// _chunkedEntriesWrite=true.  This routes the next flush through putBatchChunked
// (small sequential transactions of _CHUNK_SIZE records each) instead of the
// single putBulkAll transaction — avoiding a repeat of the payload-size failure
// that caused the queue growth in the first place.
// NOTE: _capDirtyEntries does NOT set _fullEntriesSync or _needsOrphanPrune, so
// needsSyncCollection stays false on its own.  The ST._entriesMode==='full' guard
// in _flushSave provides a second line of defence for the replaceCollection path.
var _MAX_DIRTY_ENTRIES=300;
var _CHUNK_SIZE=50; // records per IDB transaction in chunked-write recovery mode
// Per-tab unique suffix for the close-flush Web Lock.
// Each tab holds its own lock rather than competing on a shared name —
// eliminates the steal:true cross-tab hazard where a closing tab could
// interrupt an ongoing IDB transaction in a sibling tab.
var _TAB_LOCK_NAME='_smlog_flush_'+(typeof crypto!=='undefined'&&crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2));
// When true, _flushSave writes _dirtyEntries in small sequential chunks via
// putBatchChunked instead of including them in the single putBulkAll transaction.
// Set by _capDirtyEntries() when the dirty queue grows beyond _MAX_DIRTY_ENTRIES
// after repeated IDB failures.  Cleared on successful flush.
// This replaces the old _fullEntriesSync escalation path, which would write all of
// ST.entries as one oversized transaction — mathematically guaranteeing another
// quota/lock failure when the root cause was payload size.
var _chunkedEntriesWrite=false;
function _capDirtyEntries(){
  if(Object.keys(_dirtyEntries).length>_MAX_DIRTY_ENTRIES){
    // Do NOT escalate to _fullEntriesSync: writing the entire ST.entries array as one
    // transaction would guarantee another quota or lock failure when the previous failure
    // was caused by an oversized payload.  Instead, keep _dirtyEntries intact and flag
    // for chunked sequential writes so recovery drains the queue in small, discrete
    // transactions that stay well within IDB size limits.
    _chunkedEntriesWrite=true;
  }
}

// Mark a collection dirty so the next save() includes it
function _markDirty(coll){ _dirty[coll]=true; }

// Queue explicit deletes for orphaned IDs (used by replaceCollection).
// These are drained in _flushSave alongside putBatch upserts.
function _queueDeletes(coll, ids){
  if(!ids||!ids.length) return;
  if(!_pendingDeletes[coll]) _pendingDeletes[coll]={};
  ids.forEach(function(id){ _pendingDeletes[coll][id]=true; });
  _dirty[coll]=true;
}

// Replace an entire collection in ST and queue deletes for any orphaned IDs.
// Use this instead of direct ST.arr = newArr when doing bulk import/restore.
//   coll     — IDB store name (e.g. 'clients')
//   stProp   — ST property name (e.g. 'clients')
//   newArr   — replacement array
function replaceCollection(coll, stProp, newArr){
  var oldIds=(ST[stProp]||[]).map(function(r){return r.id;});
  var newIdSet={};
  (newArr||[]).forEach(function(r){ if(r&&r.id!=null) newIdSet[r.id]=true; });
  var orphans=oldIds.filter(function(id){ return !newIdSet[id]; });
  _queueDeletes(coll, orphans);
  _markDirty(coll);                      // always mark dirty — _queueDeletes skips this when there are no orphans
  if(coll==='entries'){ _dirtyEntries={}; _fullEntriesSync=true; _needsOrphanPrune=true; } // discard stale per-record map; signal full IDB sync + orphan prune
  if(coll==='invoices'){ _dirtyInvoices={}; } // discard stale per-record map; full array written by colsMap on next flush
  ST[stProp]=newArr;
}

// Flush all dirty state to IDB immediately (no debounce).
// Returns a Promise that resolves when all writes complete.
// Uses putBatch (upsert-only, no getAll scan) + drains _pendingDeletes queue.
// Deletes are tracked explicitly via replaceCollection/_queueDeletes/delOne —
// no full table scan is ever needed.
// skipFullSync=true: called from close/hide handlers — always use atomic putBatch,
// never syncCollection.  Cursor-less getAllKeys+batch-delete in syncCollection is still
// an async two-step that can be cut short during page unload; putBatch issues all .put()
// calls within a single transaction body so IDB commits or rolls back atomically.
// _fullEntriesSync is intentionally left true so the next normal flush still runs
// the getAllKeys diff-prune to remove any orphan records.
function _flushSave(skipFullSync){
  clearTimeout(_saveTimer);
  _saveTimer=null;

  // ── Build the collections map (only dirty stores) ──
  var colsMap={};
  if(_dirty.clients||_dirty._all)  colsMap.clients  = ST.clients;
  if(_dirty.matters||_dirty._all)  colsMap.matters  = ST.matters;
  if(_dirty.contacts||_dirty._all) colsMap.contacts = ST.contacts;
  // Invoices: granular write — only changed records, mirroring the _dirtyEntries pattern.
  // _dirtyInvoices is populated by saveOne('invoices',rec); when empty (replaceCollection
  // path or first flush after startup) fall back to the full ST.invoices array so that
  // a restore/import still writes every record.
  if(_dirty.invoices||_dirty._all){
    var _invoicesToWrite=Object.keys(_dirtyInvoices).length
      ? Object.keys(_dirtyInvoices).map(function(id){return _dirtyInvoices[id];})
      : ST.invoices;
    if(_invoicesToWrite&&_invoicesToWrite.length) colsMap.invoices=_invoicesToWrite;
  }
  if(_dirty.groups||_dirty._all)   colsMap.groups   = ST.groups;

  // Entries: never written on _dirty._all alone (avoid 20 000-record write on settings save).
  // Three sub-paths:
  //   • _chunkedEntriesWrite=true → entries omitted from putBulkAll; written separately via putBatchChunked
  //   • replaceCollection + _needsOrphanPrune + !skipFullSync → syncCollection (getAllKeys diff + batch delete, separate)
  //   • everything else → putBulkAll with only changed records (or full array for bulk replace)
  // SAFETY: never run the getAllKeys diff-prune (syncCollection) unless the full entry set is in
  // memory.  If _entriesMode==='partial', ST.entries holds only the current year; allowing
  // syncCollection here would delete every prior-year IDB record not in that slice.
  // This guards the scenario where _capDirtyEntries() fires (setting _chunkedEntriesWrite=true)
  // while _needsOrphanPrune is already true from a prior failed replaceCollection —
  // both flags being true would otherwise route into syncCollection with partial data.
  var needsSyncCollection = _dirty.entries && _fullEntriesSync && _needsOrphanPrune && !skipFullSync && ST._entriesMode==='full';
  // When chunked mode is active, entries are written separately — keep them out of putBulkAll.
  var needsChunkedEntries = _dirty.entries && _chunkedEntriesWrite && !needsSyncCollection;
  if(_dirty.entries && !needsSyncCollection && !needsChunkedEntries){
    var _entriesToWrite=Object.keys(_dirtyEntries).length
      ? Object.keys(_dirtyEntries).map(function(id){return _dirtyEntries[id];})
      : ST.entries;
    if(_entriesToWrite&&_entriesToWrite.length) colsMap.entries=_entriesToWrite;
  }

  // ── Meta map — always written (cheap single-record puts) ──
  var metaMap={
    prefs:            ST.prefs,
    descpresets:      ST.descPresets,
    mailpresets:      ST.mailPresets,
    mailplaceholders: ST.mailPlaceholders,
    itmode:           {itMode:ST.itMode, firmProfile:ST.firmProfile},
    linkageRules:     ST.linkageRules
  };

  // ── Snapshot dirty state BEFORE async ops so we can restore on failure ──
  // (Clearing eagerly before Promise resolution was the race: a mid-flight abort
  //  would leave the DB behind memory with no record of what still needs writing.)
  var _snapDirty=_dirty, _snapDeletes=_pendingDeletes,
      _snapEntries=_dirtyEntries, _snapInvoices=_dirtyInvoices,
      _snapFullSync=_fullEntriesSync, _snapNeedsPrune=_needsOrphanPrune,
      _snapChunked=_chunkedEntriesWrite;
  _dirty={}; _pendingDeletes={}; _dirtyEntries={}; _dirtyInvoices={}; _needsOrphanPrune=false;
  _chunkedEntriesWrite=false;
  // Only clear _fullEntriesSync when syncCollection actually ran (skipFullSync=false).
  // On close/hide flushes (skipFullSync=true) we used putBulkAll; keep the flag so
  // the next normal flush still runs the full orphan-prune cursor pass.
  if(!skipFullSync) _fullEntriesSync=false;

  // ── Single atomic transaction for all collections + deletes + meta ──
  // putBulkAll enlists EVERY dirty store in one db.transaction() so IDB either
  // commits all stores or rolls back all stores — no partial writes possible.
  var mainOp = Store.putBulkAll(colsMap, _snapDeletes, metaMap);

  // syncCollection runs separately: it uses getAllKeys() + batch delete (two async steps)
  // which cannot be merged into a putBulkAll transaction — but it is only triggered by an
  // explicit full-restore (replaceCollection), never by normal edit flows.
  var syncOp = needsSyncCollection
    ? Store.syncCollection('entries', ST.entries)
    : Promise.resolve();

  // Chunked entries write — runs after putBulkAll so meta/other collections are already
  // committed.  Each chunk is its own small IDB transaction, preventing the oversized-
  // payload failure that triggered chunked mode in the first place.
  //
  // JOURNAL PATTERN: Before any chunk is written, a '_chunkWritePending' meta key is
  // committed to IDB.  If the browser crashes mid-chunk the next session detects the
  // marker and warns the user — the only honest recovery when the correct in-memory data
  // is unavailable (memory is rebuilt from the partially-written IDB on startup).
  // On success the marker is cleared in the same async chain.
  var chunkedArr = _snapChunked
    ? Object.keys(_snapEntries).map(function(id){ return _snapEntries[id]; })
    : null;
  var chunkedOp = (_snapChunked && chunkedArr && chunkedArr.length)
    ? Store.setMeta('_chunkWritePending', {pending: true, ts: Date.now(), count: chunkedArr.length})
        .then(function(){ return Store.putBatchChunked('entries', chunkedArr, _CHUNK_SIZE); })
        .then(function(){ return Store.setMeta('_chunkWritePending', {pending: false}); })
    : Promise.resolve();

  return Promise.all([mainOp, syncOp, chunkedOp]).then(function(){
    // Confirmed committed — snapshots are discarded (already cleared above).
  }).catch(function(e){
    console.warn('_flushSave error',e);
    toast('Save failed \u2014 check disk space.','err');
    // Restore dirty flags so the next flush retries every collection that failed.
    Object.keys(_snapDirty).forEach(function(k){ _dirty[k]=true; });
    Object.keys(_snapDeletes).forEach(function(coll){
      _pendingDeletes[coll]=Object.assign(_pendingDeletes[coll]||{}, _snapDeletes[coll]);
    });
    Object.keys(_snapEntries).forEach(function(id){
      if(!_dirtyEntries[id]) _dirtyEntries[id]=_snapEntries[id];
    });
    Object.keys(_snapInvoices).forEach(function(id){
      if(!_dirtyInvoices[id]) _dirtyInvoices[id]=_snapInvoices[id];
    });
    _capDirtyEntries(); // if queue grew beyond cap, flag for chunked writes next flush
    if(_snapFullSync) _fullEntriesSync=true;
    if(_snapNeedsPrune) _needsOrphanPrune=true;
    // Preserve chunked mode across failures — once triggered, stay chunked until a
    // flush succeeds so we never revert to the oversized single-transaction path.
    if(_snapChunked) _chunkedEntriesWrite=true;
  });
}

// Safe full-entry loader — flushes any pending debounced write before reading IDB.
// ALWAYS use this instead of Store.getAll('entries') directly.
// Prevents the race condition where a 200ms-debounced save (e.g. approveAll)
// hasn't committed yet when a tab switch triggers a full IDB read, causing
// stale data to overwrite in-memory state and silently revert recent actions.
function _loadAllEntries(){
  if(_saveTimer){
    // A debounced flush is queued — drain it now so the IDB read sees fresh data.
    return _flushSave().then(function(){ return Store.getAll('entries'); });
  }
  return Store.getAll('entries');
}

// Returns the entries array for export/submit/backup operations.
// Uses the temporary _exportEntries cache when loaded; falls back to the
// partial-year ST.entries so callers never need to branch on _entriesMode.
function _getExportPool(){
  return ST._exportEntries!==null ? ST._exportEntries : ST.entries;
}

// Loads ALL entries from IDB into ST._exportEntries — a temporary export-only cache.
// Does NOT touch ST.entries or ST._entriesMode so the lean partial-year DOM
// cache is never inflated by an export or submit action.
// Returns a Promise that resolves with the full entries array.
function _loadExportEntries(){
  if(ST._exportEntries!==null) return Promise.resolve(ST._exportEntries);
  var base=_saveTimer?_flushSave():Promise.resolve();
  return base.then(function(){ return Store.getAll('entries'); }).then(function(all){
    ST._exportEntries=all;
    return all;
  });
}

// Analytics-scoped entry loader — queries ONLY the date range needed for the
// current filter using the IDB dateIdx index.  Never loads the full history
// into ST.entries; stores results in ST._anEntries (separate cache).
// This is the key fix for the scaling/memory bottleneck: a firm with 50k entries
// and a "This Month" filter fetches ~200 rows, not 50,000.
function _loadAnalyticsEntries(filter){
  var range=filterToDateRange(filter);
  // Flush any pending writes first so IDB reflects the latest in-memory state
  _anLoading=true;
  var base=_saveTimer?_flushSave():Promise.resolve();
  return base.then(function(){
    return Store.getEntriesInRange(range.from, range.to);
  }).then(function(entries){
    _anLoading=false;
    ST._anEntries=entries;
    _anFetchVer++;
    render();
  }).catch(function(e){
    console.warn('_loadAnalyticsEntries failed',e);
    _anLoading=false;
    ST._anEntries=[];
    render();
  });
}

// ── Entry cache helpers ───────────────────────────────────────────────────────
// Called after every single-entry mutation. Keeps _approvalEntries
// consistent without a full IDB reload. markLuDirty() deliberately does NOT clear
// these caches — they are live-patched here instead.
// _tsPageResult is invalidated (not patched) so the next render re-fetches the correct page.

// Upsert one entry record into the approval cache (if loaded); invalidate the page result.
function _patchEntry(rec){
  // Invalidate cursor page; bump gen so any in-flight load discards its stale result
  _tsPageResult=null; _tsAggCache=null; _tsPageGen++;
  if(ST._approvalEntries){
    var found2=false;
    ST._approvalEntries=ST._approvalEntries.map(function(e){
      if(e.id==rec.id){found2=true;return rec;}
      return e;
    });
    if(!found2) ST._approvalEntries=ST._approvalEntries.concat([rec]);
  }
  // Keep _lu.en live after initial build — O(1) upsert avoids a full O(n) rebuild per save
  if(_luEnVer!==-1) _lu.en[rec.id]=rec;
}

// Remove one entry from the approval cache (if loaded); invalidate the page result.
function _removeEntry(id){
  // Invalidate cursor page; bump gen so any in-flight load discards its stale result
  _tsPageResult=null; _tsAggCache=null; _tsPageGen++;
  if(ST._approvalEntries)
    ST._approvalEntries=ST._approvalEntries.filter(function(e){return e.id!=id;});
  // Keep _lu.en live — O(1) delete avoids a full O(n) rebuild on every entry deletion
  if(_luEnVer!==-1) delete _lu.en[id];
}

// Invalidate all entry caches (bulk operations: import, reset, restore).
function _invalidateEntryCaches(){
  ST._tsAllEntries=null; _tsPageResult=null; _tsAggCache=null; _tsPageLoading=false; _tsPageGen++;
  _tsAllLoading=false; _tsPendingPatches=[];
  ST._approvalEntries=null; _approvalsLoading=false;
  _luEnVer=-1; _lu.en={}; // force full rebuild on next invoice access after bulk change
}

// ── Approvals entry loader ────────────────────────────────────────────────────
// Partner:  statusIdx 'pending' + 'approved' + 'rejected'
// Attorney: createdByIdx by current user name
var _approvalsLoading=false;
function _loadApprovalsEntries(){
  if(_approvalsLoading) return;
  _approvalsLoading=true;
  var role=myRole();
  var me=ST.user?ST.user.name:'';
  var base=_saveTimer?_flushSave():Promise.resolve();
  var p;
  if(role==='partner'){
    p=base.then(function(){
      return Promise.all([
        Store.getEntriesByStatus('pending'),
        Store.getEntriesByStatus('approved'),
        Store.getEntriesByStatus('rejected')
      ]);
    }).then(function(r){return r[0].concat(r[1]).concat(r[2]);});
  } else {
    p=base.then(function(){
      return me?Store.getEntriesByCreator(me):Promise.resolve([]);
    });
  }
  p.then(function(entries){
    _approvalsLoading=false;
    ST._approvalEntries=entries;
    render();
  }).catch(function(e){
    console.warn('_loadApprovalsEntries failed',e);
    _approvalsLoading=false;
    ST._approvalEntries=[];
    render();
  });
}

// ── Timesheet "All Time" loader ───────────────────────────────────────────────
// Cursor-based "All Time" page loader — replaces the old _loadTsAllEntries that
// pulled every entry into RAM. Only the current PAGE_SIZE slice is ever held in memory.
// For date sorts: IDB cursor skips to the correct offset — O(offset) time, O(page_size) space.
// For non-date sorts: streams all matching entries, sorts in JS, returns slice, GC's the rest.
var _tsPageResult=null;  // {entries,total,hrs,bill,key} | null
var _tsPageLoading=false;
var _tsPageGen=0;         // incremented by every mutation; guards in-flight loads against stale writes
// Aggregate cache — keyed by filter+sort WITHOUT page number so totals survive page turns.
// Invalidated on any data mutation or filter/sort change; preserved on page-only navigation.
var _tsAggCache=null;    // {key,total,hrs,bill} | null
var _tsAllLoading=false;  // kept so legacy guards compile (always false now)
var _tsPendingPatches=[];  // no longer used; kept to avoid ReferenceError in legacy guards

function _loadTsPage(){
  if(_tsPageLoading)return;
  var PAGE_SIZE=ST.TS_PAGE_SIZE||50;
  var role=ST.user?ST.user.role||'attorney':'attorney';
  var me=ST.user?ST.user.name:'';
  // Billing staff see all timekeepers; attorneys see only their own
  var effCreatedBy=(role==='billing_staff')?'':me;
  // Contact filter (billing staff filtering by attorney) overrides the default
  var ctFName=ST.tsContactFilter&&_lu.ct[ST.tsContactFilter]?_lu.ct[ST.tsContactFilter].name:'';
  var finalCreatedBy=ctFName||effCreatedBy;
  // aggKey identifies the filter+sort combination WITHOUT page number.
  // _tsAggCache is valid across page turns as long as this key stays the same.
  var aggKey=[ST.tsSort,ST.tsClientFilter||'',ST.tsMatterFilter||'',finalCreatedBy,PAGE_SIZE].join('|');
  var pageKey=[ST.tsSort,ST.tsClientFilter||'',ST.tsMatterFilter||'',finalCreatedBy,ST.tsPage,PAGE_SIZE].join('|');
  if(_tsPageResult&&_tsPageResult.key===pageKey)return; // already current
  _tsPageLoading=true;
  var _capturedGen=_tsPageGen;  // snapshot — if a mutation fires during flight, gen advances and we discard
  // Determine whether we have valid cached aggregates for this filter/sort combination.
  // If yes, we pass skipAgg:true so getEntriesPage only fetches the page slice (no full scan).
  // For unfiltered date-sort this also enables cursor.advance() — O(1) JS work to reach the page.
  var aggHit=!!(_tsAggCache&&_tsAggCache.key===aggKey);
  var base=_saveTimer?_flushSave():Promise.resolve();
  base.then(function(){
    // Build comparator here so it closes over _lu lookup maps
    var cmpFn=null;
    if(ST.tsSort==='client'){
      cmpFn=function(a,b){
        var ca=_lu.cl[a.clientId],cb=_lu.cl[b.clientId];
        return((ca&&ca.name)||'').localeCompare((cb&&cb.name)||'');
      };
    } else if(ST.tsSort==='hours'){
      cmpFn=function(a,b){return Number(b.hours)-Number(a.hours);};
    } else if(ST.tsSort==='amount'){
      cmpFn=function(a,b){return(Number(b.hours)||0)*(Number(b.rate)||0)-(Number(a.hours)||0)*(Number(a.rate)||0);};
    }
    return Store.getEntriesPage({
      sort:ST.tsSort, page:ST.tsPage, pageSize:PAGE_SIZE,
      createdBy:finalCreatedBy,
      clientId:ST.tsClientFilter||'',
      matterId:ST.tsMatterFilter||'',
      cmpFn:cmpFn,
      skipAgg:aggHit  // true on page turns — avoids full N-record scan for totals already known
    });
  }).then(function(res){
    _tsPageLoading=false;
    // If a mutation fired while we were fetching, discard stale result — next render re-fetches
    if(_tsPageGen!==_capturedGen){ render(); return; }
    var entries=res.entries;
    var agg;
    if(aggHit&&_tsAggCache&&_tsAggCache.key===aggKey){
      // Page-turn: reuse the cached aggregates — no full scan was needed
      agg=_tsAggCache;
    } else {
      // Filter/sort change or first load: store fresh aggregates for subsequent page turns
      agg={key:aggKey,total:res.total,hrs:res.hrs||0,bill:res.bill||0};
      _tsAggCache=agg;
    }
    _tsPageResult={entries:entries,total:agg.total,hrs:agg.hrs,bill:agg.bill,key:pageKey};
    render();
  }).catch(function(e){
    console.warn('_loadTsPage failed',e);
    _tsPageLoading=false;
    if(_tsPageGen===_capturedGen){
      _tsPageResult={entries:[],total:0,hrs:0,bill:0,key:pageKey};
    }
    render();
  });
}

// Debounced save — used for rapid-fire changes (e.g. settings toggles, imports).
// For single-record mutations prefer saveOne/delOne instead.
function save(){
  _dirty._all=true;  // full sync on next flush
  markLuDirty();     // bulk changes always invalidate lookup cache
  clearTimeout(_saveTimer);
  // 0 ms: IDB transaction starts on the very next event-loop tick rather than
  // 200 ms later.  Synchronous batching still works (multiple save() calls in
  // the same handler all cancel the previous timer before it fires).  Combined
  // with the Web-Locks keepalive in _closeFlush() this eliminates the window
  // where a user closes the tab before the debounced write starts.
  _saveTimer=setTimeout(_flushSave, 0);
}

// Immediate single-record upsert — use after saving a form (no data-loss window).
function saveOne(coll, rec){
  if(!rec||rec.id==null) return;
  // putRecord is the authoritative atomic write — we deliberately do NOT set
  // _dirty[coll] here. Touching _dirty from saveOne would create a race: the
  // 200ms meta-flush timer would need to clear it again, but by then another
  // operation might have legitimately dirtied the same (or another) collection,
  // causing _flushSave to skip data it should have written.
  markLuDirty(); // lookup maps must be rebuilt after any record mutation
  // Track individual invoice records so _flushSave can write only changed records
  // when _dirty._all fires (e.g. settings save), avoiding a full-array transaction
  // that grows without bound as billing history accumulates.
  if(coll==='invoices') _dirtyInvoices[rec.id]=rec;
  Store.putRecord(coll, rec).catch(function(e){ console.warn('saveOne failed',coll,e); toast('Save failed \u2014 check disk space.','err'); });
  // Debounce meta writes only. _dirty/_dirtyEntries are intentionally left
  // untouched so concurrent bulk-save state is never silently discarded.
  // (_flushSave always writes the full metaMap too, so if a tab-hide flush fires
  // first it will clear _saveTimer and write meta itself — no double-write risk.)
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    _saveTimer=null;
    Store.setMeta('prefs',ST.prefs);
    Store.setMeta('descpresets',ST.descPresets);
    Store.setMeta('mailpresets',ST.mailPresets);
    Store.setMeta('mailplaceholders',ST.mailPlaceholders);
    Store.setMeta('itmode',{itMode:ST.itMode,firmProfile:ST.firmProfile});
  }, 200);
}

// Immediate single-record delete — use after confirming a delete action.
// Store.deleteRecord is atomic; no dirty flag or cleanup timer is needed here.
// Any concurrent bulk-save dirty state is left intact for _flushSave to handle.
function delOne(coll, id){
  if(id==null) return;
  markLuDirty(); // lookup maps must be rebuilt after any record deletion
  Store.deleteRecord(coll, id).catch(function(e){ console.warn('delOne failed',coll,id,e); toast('Delete failed \u2014 check disk space.','err'); });
}

// ── Flush immediately when tab is hidden or page is being unloaded ──
// pagehide: fires synchronously before the page is destroyed (close/navigate/BFcache).
// visibilitychange=hidden: catches background-tab suspensions that pagehide misses.
// beforeunload: fires before pagehide, allowing IDB transactions to be OPENED while
//   the browsing context is still fully alive. This is the most reliable hook on
//   Firefox, whose Web Locks implementation during page unload can be inconsistent.
//   By the time pagehide fires the transactions are already in flight.
// All handlers pass skipFullSync=true so only atomic putBatch calls are issued — the
// two-step syncCollection (getAllKeys → batch delete) is intentionally skipped here because
// its async steps can be interrupted during page close.
// _fullEntriesSync is preserved so the orphan-prune runs on the next normal flush.
//
// Web Locks keepalive: modern browsers may kill the page before async IDB ops
// finish. navigator.locks.request() holds a lock (and therefore the browsing
// context alive) until the returned Promise settles, giving every IDB write a
// chance to commit even when the user closes the tab immediately after an action.
// Per-tab lock name (_TAB_LOCK_NAME) — each tab holds its own exclusive lock so
// a closing tab never steals a lock from a sibling tab that may be mid-transaction.
// Firefox note: Web Locks is available in Firefox but can be unreliable during
// unload; the beforeunload pre-flush minimises reliance on it.
function _closeFlush(){
  // Nothing to do if no collections are dirty AND no timer is pending.
  if(!Object.keys(_dirty).length && !_saveTimer) return;
  var p=_flushSave(true); // clears _saveTimer internally; returns Promise.all
  if(navigator.locks && navigator.locks.request){
    // Hold a Web Lock until all IDB writes have settled.
    // Wrap in try/catch: some browsers (strict privacy mode, older Firefox) throw
    // synchronously or reject the lock request — fall back to the bare Promise so
    // _flushSave still runs rather than silently failing.
    try {
      navigator.locks.request(_TAB_LOCK_NAME, {}, function(){ return p; })
        .catch(function(e){ console.warn('_closeFlush lock rejected, flush already in progress',e); });
    } catch(e) {
      console.warn('_closeFlush: Web Locks unavailable, flushing without keepalive',e);
      // p is already running; nothing more to do — the IDB writes will complete
      // as long as the browser keeps the context alive long enough (beforeunload
      // gives us a synchronous head-start; pagehide + visibilitychange fire too).
    }
  }
}
// beforeunload: earliest synchronous hook — start IDB transactions while the
// context is fully alive. Do NOT call return value (no dialog shown).
window.addEventListener('beforeunload', function(){
  _closeFlush();
});
window.addEventListener('pagehide', function(){
  // Always attempt — pagehide can fire without a preceding beforeunload
  // (e.g. mobile browser backgrounding, BFcache navigation).
  _closeFlush();
});
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='hidden'){
    _closeFlush();
  } else {
    // Tab returned from background — setInterval may have been throttled or frozen while
    // hidden, so explicitly check for a midnight rollover now with the correct wall-clock time.
    _checkRowTmrRollover();
  }
});

function savePrefs(){
  Store.setMeta('prefs',ST.prefs);
  applyPrefs();
}
function applyPrefs(){
  var b=document.body;
  // Dark mode: null=auto (follow system), true=always dark, false=always light
  var dm=ST.prefs.darkMode;
  var sysDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(dm===true||(dm===null&&sysDark)) b.classList.add('dark'); else b.classList.remove('dark');
  // Layout
  b.classList.remove('layout-compact','layout-comfortable','layout-spacious');
  if(ST.prefs.layout&&ST.prefs.layout!=='comfortable') b.classList.add('layout-'+ST.prefs.layout);
  // Title bar
  document.title=ST.prefs.appName||'SixMinuteLog.com';
}
// Re-apply when OS theme changes (only affects users in auto mode)
if(window.matchMedia){
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){
    applyPrefs();
  });
}

// === TOAST
function toast(msg,type){
  type=type||'ok';
  var el=document.createElement('div');
  el.className='toast t-'+type;
  el.innerHTML=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function(){el.remove();},3000);
}

// === PAGINATION BUILDER
// buildPagination(cur, total, totalFiltered, pageSize, pfx, wrapStyle)
//   cur           0-based current page index
//   total         total pages
//   totalFiltered total records after filter
//   pageSize      records per page
//   pfx           action-name prefix: 'ts' -> A.tsFirstPage/PrevPage/NextPage/LastPage
//   wrapStyle     optional extra CSS appended to the outer div
function buildPagination(cur,total,totalFiltered,pageSize,pfx,wrapStyle){
  if(total<=1) return '';
  var pageStart=cur*pageSize;
  var pageEnd=Math.min(pageStart+pageSize,totalFiltered);
  var info='Page '+(cur+1)+' of '+total+' ('+(pageStart+1)+'\u2013'+pageEnd+' of '+totalFiltered+')';
  var bs='padding:5px 11px;font-size:12px;border:1px solid var(--border);border-radius:7px;background:var(--white);color:var(--ink);cursor:pointer';
  var ws='display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--ink3)'+(wrapStyle?';'+wrapStyle:'');
  var atFirst=cur===0;
  var atLast=cur>=total-1;
  return '<div style="'+ws+'">'
    +'<button style="'+bs+'" '+(atFirst?'disabled':'')+' onclick="A.'+pfx+'FirstPage()">&#8676; First</button>'
    +'<button style="'+bs+'" '+(atFirst?'disabled':'')+' onclick="A.'+pfx+'PrevPage()">&#8249; Prev</button>'
    +'<span>'+info+'</span>'
    +'<button style="'+bs+'" '+(atLast?'disabled':'')+' onclick="A.'+pfx+'NextPage()">Next &#8250;</button>'
    +'<button style="'+bs+'" '+(atLast?'disabled':'')+' onclick="A.'+pfx+'LastPage('+(total-1)+')">Last &#8677;</button>'
    +'</div>';
}

// === FIELD BUILDER
function field(label,id,o){
  o=o||{};
  var req=o.req?'<span class="req" aria-hidden="true">*</span>':'';
  var reqAttr=o.req?' aria-required="true"':'';
  var ec=o.err?'err':'';
  var errId=o.err?id+'-err':'';
  var autocompleteAttr=o.autocomplete?' autocomplete="'+o.autocomplete+'"':'';
  var ariaInvalid=o.err?' aria-invalid="true"':'';
  var ariaDesc=o.err?' aria-describedby="'+errId+'"':o.hint?' aria-describedby="'+id+'-hint"':'';
  var oninput=o.oninput?' oninput="'+o.oninput+'"':'';
  var onchange=o.onchange?' onchange="'+o.onchange+'"':'';
  var onkeydown=o.onkeydown?' onkeydown="'+o.onkeydown+'"':'';
  var afocus=o.autofocus?' autofocus':'';
  // inputmode: explicit override > auto-detect from type/pfx/sfx
  var im=o.inputmode||(o.type==='number'?'decimal':o.pfx==='$'?'decimal':o.sfx==='%'?'numeric':null);
  var imAttr=im?' inputmode="'+im+'"':'';
  var ctrl='';
  if(o.type==='inline-action'){
    var confirmBtn='<button class="btn-confirm" onclick="'+o.onConfirm+'" aria-label="Confirm">&#10003;</button>';
    var cancelBtn=o.onCancel?'<button class="btn-cancel" onclick="'+o.onCancel+'" aria-label="Cancel">&#10005;</button>':'';
    ctrl='<div class="ql-new-row"><input id="'+id+'" data-sf="'+(o.sf||id)+'" value="'+H(o.val||'')+'" placeholder="'+H(o.ph||'')+'"'+(o.dis?' disabled':'')+reqAttr+ariaInvalid+ariaDesc+autocompleteAttr+oninput+onkeydown+afocus+' />'+confirmBtn+cancelBtn+'</div>';
  } else if(o.type==='select'){
    var opts=(o.opts||[]).map(function(op){
      if(op.grp !== undefined) return '<optgroup label="'+H(op.grp)+'">';
      if(op.grpEnd) return '</optgroup>';
      return '<option value="'+H(op.v)+'"'+(String(op.v)===String(o.val||'')?'selected':'')+(op.dis?' disabled':'')+'>'+H(op.l)+'</option>';
    }).join('');
    ctrl='<select id="'+id+'" data-sf="'+(o.sf||id)+'" class="'+ec+'"'+(o.dis?' disabled':'')+reqAttr+ariaInvalid+ariaDesc+autocompleteAttr+oninput+onchange+'>'+opts+'</select>';
  } else if(o.type==='textarea'){
    ctrl='<textarea id="'+id+'" data-sf="'+(o.sf||id)+'" rows="'+(o.rows||3)+'" class="'+ec+'" placeholder="'+H(o.ph||'')+'"'+reqAttr+ariaInvalid+ariaDesc+autocompleteAttr+'>'+H(o.val||'')+'</textarea>';
  } else if(o.pfx||o.sfx){
    var sfxHtml=o.sfx?'<span class="sfx" aria-hidden="true">'+o.sfx+'</span>':'';
    var hasSfxCls=o.sfx?' has-sfx':'';
    ctrl='<div class="pw">'+(o.pfx?'<span class="pfx" aria-hidden="true">'+o.pfx+'</span>':'')+sfxHtml+'<input type="'+(o.type||'text')+'" id="'+id+'" data-sf="'+(o.sf||id)+'" class="'+ec+hasSfxCls+'" placeholder="'+H(o.ph||'')+'" value="'+H(o.val||'')+'"'+(o.dis?' disabled':'')+reqAttr+ariaInvalid+ariaDesc+autocompleteAttr+imAttr+oninput+onkeydown+afocus+' /></div>';
  } else {
    ctrl='<input type="'+(o.type||'text')+'" id="'+id+'" data-sf="'+(o.sf||id)+'" class="'+ec+'" placeholder="'+H(o.ph||'')+'" value="'+H(o.val||'')+'"'+(o.dis?' disabled':'')+reqAttr+ariaInvalid+ariaDesc+autocompleteAttr+imAttr+oninput+onkeydown+afocus+(o.step?' step="'+o.step+'"':'')+(o.min!==undefined?' min="'+o.min+'"':'')+(o.max!==undefined?' max="'+o.max+'"':'')+' />';
  }
  return '<div class="fl"><label for="'+id+'">'+(o.rawLabel?label:H(label))+req+'</label>'+ctrl
    +(o.err?'<div class="emsg" id="'+errId+'" role="alert">'+H(o.err)+'</div>':'')
    +(o.hint&&!o.err?'<div class="hint" id="'+id+'-hint">'+o.hint+'</div>':'')
    +'</div>';
}

// buildModal(o) — standard modal chrome. Eliminates repeated outer-wrapper boilerplate.
// opts: size (sm|md|lg, default md), title (inner HTML of h2), titleClass (optional class on h2),
//       onClose (onclick string), body (inner HTML), footer (inner HTML),
//       extraClass (appended to .modal), modalStyle (inline style on .modal),
//       bodyStyle (inline style on .modal-bd), ovClick (onclick on .ov for backdrop dismiss)
function buildModal(o){
  // o.size          modal-sm/md/lg/xl (default 'md')
  // o.extraClass    appended to modal div class (e.g. 'u-modht')
  // o.modalStyle    inline style on modal div
  // o.bodyClass     appended to modal-bd class (e.g. 'u-scrollf')
  // o.bodyStyle     inline style on modal-bd
  // o.ovClick       onclick on backdrop overlay — adds stopPropagation to modal div
  // o.preBody       raw HTML inserted between modal-hd and modal-bd (no wrapper)
  // o.headerActions replaces the default X close button area entirely
  // o.onClose       onclick for the default X close button
  // o.title         h2 text (may contain HTML)
  // o.titleClass    class on h2
  // o.body          modal-bd inner HTML
  // o.footer        modal-ft inner HTML — omit key or pass null to skip footer div
  // o.footerStyle   inline style on modal-ft
  var size=o.size||'md';
  var extra=o.extraClass?' '+o.extraClass:'';
  var mStyle=o.modalStyle?' style="'+o.modalStyle+'"':'';
  var bClass=o.bodyClass?' '+o.bodyClass:'';
  var bStyle=o.bodyStyle?' style="'+o.bodyStyle+'"':'';
  var ovClick=o.ovClick?' onclick="'+o.ovClick+'"':'';
  var mClick=o.ovClick?' onclick="event.stopPropagation()"':'';
  var fStyle=o.footerStyle?' style="'+o.footerStyle+'"':'';
  var closeArea=o.headerActions!=null?o.headerActions
    :'<button class="btn-ic" onclick="'+o.onClose+'" aria-label="Close dialog">'+IC.x+'</button>';
  var titleId='modal-title-'+Math.random().toString(36).slice(2,8);
  return '<div class="ov" role="presentation"'+ovClick+'><div class="modal modal-'+size+extra+'" role="dialog" aria-modal="true" aria-labelledby="'+titleId+'"'+mStyle+mClick+'>'
    +'<div class="modal-hd"><h2 id="'+titleId+'"'+(o.titleClass?' class="'+o.titleClass+'"':'')+'>'+(o.title||'')+'</h2>'
    +closeArea+'</div>'
    +(o.preBody||'')
    +'<div class="modal-bd'+bClass+'"'+bStyle+'>'+o.body+'</div>'
    +(o.footer!=null?'<div class="modal-ft"'+fStyle+'>'+o.footer+'</div>':'')
    +'</div></div>';
}

// === VIEWS

// == Timesheet ==
// Returns (lazily-creating) the Web Worker used for large-dataset off-thread sorting.
// The worker code is inlined as a Blob so the app stays 100% offline with no CDN.
// Pre-computed numeric sort keys (_ts, _cn, _hr, _am, _cat) are attached to each
// entry before transfer so the worker needs no lookup tables.
function _getSortWorker(){
  if(_sortWorker) return _sortWorker;
  // Worker receives raw entry objects + a lightweight {id:name} client map.
  // All augmentation (sort keys: _ts, _cn, _hr, _am, _cat) happens off-thread,
  // avoiding the O(n) Object.assign + string-lookup loop that blocked the main thread.
  // Worker receives only a slim array of {id,_ts,_cn,_hr,_am,_cat} objects —
  // pre-computed on the main thread before postMessage so Structured Clone copies
  // a minimal payload instead of full entry objects (avoids main-thread blocking
  // for large datasets). The worker sorts and returns an array of IDs; the main
  // thread reconstructs the sorted entry array via its own id→entry map.
  var code=[
    'self.onmessage=function(e){',
    '  var d=e.data,arr=d.slim,s=d.sort;',
    '  arr.sort(function(a,b){',
    '    if(s==="date-asc")  return a._ts-b._ts;',
    '    if(s==="client")    return a._cn.localeCompare(b._cn);',
    '    if(s==="hours")     return b._hr-a._hr;',
    '    if(s==="amount")    return b._am-a._am;',
    '    var dd=b._ts-a._ts; return dd!==0?dd:b._cat-a._cat;',
    '  });',
    '  var ids=new Array(arr.length);',
    '  for(var i=0;i<arr.length;i++) ids[i]=arr[i].id;',
    '  self.postMessage({key:d.key,ids:ids,hrs:d.hrs,bill:d.bill});',
    '};'
  ].join('\n');
  var blob=new Blob([code],{type:'application/javascript'});
  _sortWorker=new Worker(URL.createObjectURL(blob));
  return _sortWorker;
}

// Returns (lazily-creating) the Web Worker used for off-thread analytics computation.
// Inlined as a Blob — no CDN or external file needed; 100% offline.
// The worker receives slim entry objects + lightweight lookup maps so Structured
// Clone copies a minimal payload.  It performs all O(E) accumulations
// (totals, byClient, byGroup, contactSplit / rawCtAcc) and posts one result
// message back to the main thread.
function _getAnalyticsWorker(){
  if(_anCalcWorker) return _anCalcWorker;
  var code=[
    'self.onmessage=function(ev){',
    '  var d=ev.data;',
    '  var fe=d.fe, clMap=d.clMap, clToGrp=d.clToGrp, groups=d.groups;',
    '  var splitCts=d.splitCts, ctIdSet=d.ctIdSet, userPct=d.userPct;',
    '  var anFilter=d.anFilter, nowMs=d.nowMs, key=d.key;',
    // ── Inline helpers (no main-thread globals available inside Worker) ──────
    '  function rndHours(h){ var v=Number(h||0); return (Math.round((v+Number.EPSILON)*10)/10); }',
    '  function calcAmt(hours,rate){',
    '    return Math.round(rndHours(hours)*Number(rate||0)*100)/100;',
    '  }',
    '  function salaryForPeriod(annual,f){',
    '    if(annual==null||annual==="") return null;',
    '    var a=Number(annual), now=new Date(nowMs);',
    '    if(f==="week")    return a/52;',
    '    if(f==="month")   return a/12;',
    '    if(f==="quarter") return a/4;',
    '    if(f==="year")    return a;',
    '    if(f==="this_month"){',
    '      var dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();',
    '      return (a/12)*(now.getDate()/dim);',
    '    }',
    '    if(f==="this_quarter"){',
    '      var qsm=Math.floor(now.getMonth()/3)*3;',
    '      var qs=new Date(now.getFullYear(),qsm,1);',
    '      var qe=new Date(now.getFullYear(),qsm+3,0);',
    '      var qd=(qe-qs)/86400000+1;',
    '      var el=Math.floor((now-qs)/86400000)+1;',
    '      return (a/4)*(el/qd);',
    '    }',
    '    if(f==="this_year"){',
    '      var yr=now.getFullYear();',
    '      var isLeap=(yr%4===0&&yr%100!==0)||(yr%400===0);',
    '      var yd=isLeap?366:365;',
    '      var j1=new Date(yr,0,1);',
    '      var el2=Math.floor((now-j1)/86400000)+1;',
    '      return a*(el2/yd);',
    '    }',
    '    return null;',
    '  }',
    // ── Totals: O(E) ────────────────────────────────────────────────────────
    '  var totHrs=0, totBill=0;',
    '  for(var i=0;i<fe.length;i++){',
    '    totHrs+=Number(fe[i].hours);',
    '    totBill+=calcAmt(fe[i].hours,fe[i].rate);',
    '  }',
    // ── Revenue by client: O(E) ─────────────────────────────────────────────
    '  var clAcc={};',
    '  for(var i=0;i<fe.length;i++){',
    '    var e=fe[i]; if(!e.clientId) continue;',
    '    if(!clAcc[e.clientId]) clAcc[e.clientId]={hrs:0,bill:0};',
    '    clAcc[e.clientId].hrs=Math.round((clAcc[e.clientId].hrs+Number(e.hours))*10000)/10000;',
    '    clAcc[e.clientId].bill=Math.round((clAcc[e.clientId].bill+calcAmt(e.hours,e.rate))*100)/100;',
    '  }',
    '  var byClient=[], cids=Object.keys(clAcc);',
    '  for(var i=0;i<cids.length;i++){',
    '    var cid=cids[i];',
    '    if(clAcc[cid].hrs>0) byClient.push({name:clMap[cid]||"Unknown",hrs:clAcc[cid].hrs,bill:clAcc[cid].bill});',
    '  }',
    '  byClient.sort(function(a,b){return b.bill-a.bill;});',
    // ── Revenue by group: O(E) ──────────────────────────────────────────────
    '  var grpAcc={};',
    '  for(var i=0;i<fe.length;i++){',
    '    var e=fe[i]; var gid=clToGrp[e.clientId]; if(!gid) continue;',
    '    if(!grpAcc[gid]) grpAcc[gid]={hrs:0,bill:0};',
    '    grpAcc[gid].hrs=Math.round((grpAcc[gid].hrs+Number(e.hours))*10000)/10000;',
    '    grpAcc[gid].bill=Math.round((grpAcc[gid].bill+calcAmt(e.hours,e.rate))*100)/100;',
    '  }',
    '  var byGroup=[];',
    '  for(var i=0;i<groups.length;i++){',
    '    var g=groups[i], a=grpAcc[g.id]||{hrs:0,bill:0};',
    '    if(a.hrs>0) byGroup.push({name:g.name,hrs:a.hrs,bill:a.bill});',
    '  }',
    '  byGroup.sort(function(a,b){return b.bill-a.bill;});',
    // ── Contact revenue split: O(E) — accumulates ALL contacts for rawCtAcc ─
    '  var ctAcc={};',
    '  for(var i=0;i<fe.length;i++){',
    '    var e=fe[i];',
    '    var k=(e.contactId&&ctIdSet[e.contactId])?e.contactId:"__unassigned";',
    '    if(!ctAcc[k]) ctAcc[k]={hrs:0,bill:0};',
    '    ctAcc[k].hrs=Math.round((ctAcc[k].hrs+Number(e.hours))*10000)/10000;',
    '    ctAcc[k].bill=Math.round((ctAcc[k].bill+calcAmt(e.hours,e.rate))*100)/100;',
    '  }',
    '  var contactSplit=[];',
    '  for(var i=0;i<splitCts.length;i++){',
    '    var c=splitCts[i], acc=ctAcc[c.id]||{hrs:0,bill:0};',
    '    if(acc.hrs<=0) continue;',
    '    var pct=c.ownPct!=null?Number(c.ownPct):100;',
    '    var own=acc.bill*pct/100;',
    '    var annSal=c.salary!=null&&c.salary!==""?Number(c.salary):null;',
    '    var perSal=salaryForPeriod(annSal,anFilter);',
    '    var net=perSal!=null?own-perSal:null;',
    '    contactSplit.push({id:c.id,name:c.name,hrs:acc.hrs,bill:acc.bill,ownPct:pct,',
    '      own:own,firm:acc.bill*(100-pct)/100,annualSalary:annSal,periodSalary:perSal,net:net});',
    '  }',
    '  var unacc=ctAcc["__unassigned"]||{hrs:0,bill:0};',
    '  if(unacc.hrs>0){',
    '    var uOwn=unacc.bill*userPct/100;',
    '    contactSplit.push({id:"__unassigned",name:"(Unassigned)",hrs:unacc.hrs,bill:unacc.bill,',
    '      ownPct:userPct,own:uOwn,firm:unacc.bill*(100-userPct)/100,',
    '      annualSalary:null,periodSalary:null,net:null});',
    '  }',
    '  var totalOwn=0, totalFirm=0;',
    '  for(var i=0;i<contactSplit.length;i++){totalOwn+=contactSplit[i].own;totalFirm+=contactSplit[i].firm;}',
    '  self.postMessage({',
    '    key:key,',
    '    totals:{hrs:totHrs,bill:totBill},',
    '    byClient:byClient,',
    '    byGroup:byGroup,',
    '    split:{contactSplit:contactSplit,totalOwn:totalOwn,totalFirm:totalFirm,',
    '           uHrs:unacc.hrs,uBill:unacc.bill,userPct:userPct,rawCtAcc:ctAcc}',
    '  });',
    '};'
  ].join('\n');
  var blob=new Blob([code],{type:'application/javascript'});
  _anCalcWorker=new Worker(URL.createObjectURL(blob));
  _anCalcWorker.onmessage=function(ev){
    var res=ev.data;
    // Discard stale results (filter changed while worker was running)
    if(res.key!==_anCalcPendingKey) return;
    _anCalcResult=res;
    _anCalcLoading=false;
    _anCalcPendingKey=null;
    render();
  };
  _anCalcWorker.onerror=function(err){
    console.warn('Analytics worker error — falling back to synchronous computation',err);
    _anCalcWorker=null; // will be recreated next call; fall back to sync path
    _anCalcLoading=false;
    _anCalcPendingKey=null;
    render();
  };
  return _anCalcWorker;
}

// Dispatches off-thread analytics computation for the current ST._anEntries.
// Builds slim entry objects and lookup maps on the main thread, then posts to
// the worker.  Results arrive via _anCalcWorker.onmessage → render().
function _computeAnalyticsAsync(fe, calcKey){
  if(_anCalcLoading && _anCalcPendingKey===calcKey) return; // already in-flight for this key
  _anCalcLoading=true;
  _anCalcPendingKey=calcKey;

  // Slim entries — only the fields the worker needs (minimises Structured Clone cost)
  var slim=new Array(fe.length);
  for(var i=0;i<fe.length;i++){
    var e=fe[i];
    slim[i]={hours:e.hours,rate:e.rate,clientId:e.clientId||'',contactId:e.contactId||''};
  }

  // Client id→name map
  var clMap={};
  ST.clients.forEach(function(c){ clMap[c.id]=c.name; });

  // clientId→groupId map (only clients that have a group)
  var clToGrp={};
  ST.clients.forEach(function(c){ if(c.groupId) clToGrp[c.id]=c.groupId; });

  // Groups list (slim)
  var groups=ST.groups.map(function(g){ return {id:g.id,name:g.name}; });

  // All valid contactIds as a lookup set (for __unassigned classification)
  var ctIdSet={};
  ST.contacts.forEach(function(c){ ctIdSet[c.id]=true; });

  // Split-eligible contacts only (billing_staff and partners excluded from split table)
  var splitCts=ST.contacts
    .filter(function(c){ return c.role!=='billing_staff'&&c.role!=='partner'; })
    .map(function(c){
      return {id:c.id,name:c.name,ownPct:c.ownPct,
              salary:(c.salary!=null&&c.salary!==''?c.salary:null)};
    });

  var userPct=ST.user&&ST.user.ownPct!=null?Number(ST.user.ownPct):100;

  try{
    var w=_getAnalyticsWorker();
    w.postMessage({
      fe:slim, clMap:clMap, clToGrp:clToGrp, groups:groups,
      splitCts:splitCts, ctIdSet:ctIdSet, userPct:userPct,
      anFilter:ST.anFilter, nowMs:Date.now(), key:calcKey
    });
  } catch(err){
    // Worker unavailable (e.g. CSP) — fall back to synchronous selector functions
    console.warn('Analytics worker unavailable, falling back to sync computation',err);
    _anCalcWorker=null;
    _anCalcLoading=false;
    _anCalcPendingKey=null;
    var salPeriodFnSync=function(annual){ return salaryForPeriod(annual,ST.anFilter); };
    var _totalsSync=getAnalyticsTotals(fe);
    var _splitSync=getContactRevenueSplit(fe,salPeriodFnSync);
    _anCalcResult={
      key:calcKey,
      totals:_totalsSync,
      byClient:getRevenueByClient(fe),
      byGroup:getRevenueByGroup(fe),
      split:_splitSync
    };
    render();
  }
}

function vTimesheet(){
  var role=myRole();
  var me=ST.user?ST.user.name:'';

  // "All Time" filter: use cursor-based IDB pagination — never loads full history into RAM.
  // When the page result is ready, _tsPageResult holds exactly one page of entries + totals.
  // While loading, fall through and render ST.entries (partial year) as a placeholder.
  var _PAGE_SIZE=ST.TS_PAGE_SIZE||50;
  var _usePageResult=false;
  if(ST.tsFilter==='all'){
    var _effCreatedBy=(role==='billing_staff')?'':me;
    var _ctFName2=ST.tsContactFilter&&_lu.ct[ST.tsContactFilter]?_lu.ct[ST.tsContactFilter].name:'';
    var _finalCreatedBy=_ctFName2||_effCreatedBy;
    var _tsPageKey=[ST.tsSort,ST.tsClientFilter||'',ST.tsMatterFilter||'',_finalCreatedBy,ST.tsPage,_PAGE_SIZE].join('|');
    if(_tsPageResult&&_tsPageResult.key===_tsPageKey){
      _usePageResult=true;  // page is ready — use it directly
    } else if(!_tsPageLoading){
      _loadTsPage();  // kick off async fetch; fall through to partial data this render
    }
  }

  // Attorneys and partners see ONLY their own entries in this tab.
  // Billing staff see all entries (that's their job as hub).
  // When _usePageResult: entries are already filtered/sorted/paginated by IDB layer.
  var _basePool=_usePageResult?_tsPageResult.entries:ST.entries;
  var baseEntries=(_usePageResult||(role==='billing_staff'))
    ? _basePool
    : _basePool.filter(function(e){return e.createdBy===me;});

  var fopts=['all','today','week','month','year'].map(function(v){
    var l={all:'All Time',today:'Today',week:'This Week',month:'This Month',year:'This Year'}[v];
    return '<option value="'+v+'"'+(ST.tsFilter===v?' selected':'')+'>'+l+'</option>';
  }).join('');

  var formH=ST.modal==='ef'?entryForm():'';

  // ── Role-specific notice bar ──────────────────────────────────────────────
  var noticeH='';
  if(role==='billing_staff'){
    noticeH='<div class="role-notice">'+IC.shield
      +' <span><strong>Billing mode:</strong> Add entries on behalf of attorneys, assign ABA codes &amp; matter numbers, then use <strong>📤 Send to Partner</strong> to export a review package for the partner\'s instance.</span></div>';
  }

  // ── Table ─────────────────────────────────────────────────────────────────
  // Cache key covers every input that affects the rendered table and stats.
  // The entry form (ef) is NOT in the key — form changes don't need a table rebuild.
  var tsCacheKey=[_dataVer,ST.tsFilter,ST.tsClientFilter||'',ST.tsMatterFilter||'',ST.tsContactFilter||'',
                  ST.tsSort,ST.tsPage,role,me,(ST.rowTmr?'t'+ST.rowTmr.entId:''),
                  (_usePageResult?_tsPageResult.key:(_tsPageLoading?'L':'N'))].join('|');
  var tableH, hrs, bill;
  if(_tsCache.key===tsCacheKey){
    // Fast path: nothing that affects the table changed. Skip all filter/sort/row work.
    tableH=_tsCache.tableH;
    hrs=_tsCache.hrs; bill=_tsCache.bill;
  } else {
  // ── Sort-level cache (key excludes ST.tsPage and ST.rowTmr) ─────────────────
  // Filter + sort is O(n log n). Page navigation and timer ticks must NOT re-run
  // this work — they reuse the cached sorted array and only rebuild the O(page_size)
  // row slice. The sort cache is invalidated only when data or filter/sort inputs change.
  var tsSortKey=[_dataVer,ST.tsFilter,ST.tsClientFilter||'',ST.tsMatterFilter||'',
                 ST.tsContactFilter||'',ST.tsSort,role,me,
                 (_usePageResult?_tsPageResult.key:(_tsPageLoading?'L':'N'))].join('|');
  var sorted, paginated, totalFiltered;

  if(_usePageResult){
    // ── Cursor fast path: IDB already filtered, sorted, and paginated ──────────
    // The IDB cursor delivered exactly _PAGE_SIZE entries for this page.
    // No JS sort, filter, or slice needed.
    paginated=_tsPageResult.entries;
    totalFiltered=_tsPageResult.total;
    hrs=_tsPageResult.hrs;
    bill=_tsPageResult.bill;
    sorted=paginated; // used only for the sorted.length===0 guard below
  } else {
  if(_tsSortCache.key===tsSortKey){
    // Fast sort path: reuse cached result — O(1)
    sorted=_tsSortCache.sorted; hrs=_tsSortCache.hrs; bill=_tsSortCache.bill;
  } else {
    // Slow sort path: filter (O(n) date compare) + sort (O(m log m)).
    // For small datasets (≤2000 entries) or when no prior cached result exists, sort
    // runs synchronously this frame. For large datasets the sort is handed off to a
    // Web Worker (true off-thread execution) and the stale cached result is served
    // for this render pass; a follow-up render() fires when the worker posts back.
    var fe=filterEnt(baseEntries,ST.tsFilter);
    if(ST.tsClientFilter) fe=fe.filter(function(e){return e.clientId==ST.tsClientFilter;});
    if(ST.tsMatterFilter) fe=fe.filter(function(e){return e.matterId==ST.tsMatterFilter;});
    if(ST.tsContactFilter){var _ctF=_lu.ct[ST.tsContactFilter]||null;var _ctFName=_ctF?_ctF.name:null;if(_ctFName) fe=fe.filter(function(e){return e.createdBy===_ctFName;});}
    var SORT_THRESH=2000;
    if(fe.length<=SORT_THRESH||!_tsSortCache.sorted.length){
      // Synchronous path: small dataset or no prior data to serve as placeholder
      sorted=[].concat(fe).sort(function(a,b){
        if(ST.tsSort==='date-asc') return localDate(a.date)-localDate(b.date);
        if(ST.tsSort==='client'){
          var ca=_lu.cl[a.clientId],cb=_lu.cl[b.clientId];
          return ((ca&&ca.name)||'').localeCompare((cb&&cb.name)||'');
        }
        if(ST.tsSort==='hours') return Number(b.hours)-Number(a.hours);
        if(ST.tsSort==='amount') return calcAmount(b.hours,b.rate)-calcAmount(a.hours,a.rate);
        var dd=localDate(b.date)-localDate(a.date);
        return dd!==0?dd:(b.createdAt||0)-(a.createdAt||0);
      });
      hrs=fe.reduce(function(s,e){return s+Number(e.hours);},0);
      bill=fe.reduce(function(s,e){return s+calcAmount(e.hours,e.rate);},0);
      _tsSortCache={key:tsSortKey,sorted:sorted,hrs:hrs,bill:bill};
      _tsSortPending=false;
    } else if(_tsSortPendingKey!==tsSortKey){
      // Large dataset: sort on a Web Worker thread — zero main-thread blocking.
      // Entries are augmented with pre-computed numeric sort keys before transfer
      // so the worker needs no lookup tables and postMessage serialisation is cheap.
      _tsSortPending=true;
      _tsSortPendingKey=tsSortKey;
      // Build a slim {clientId: name} map — O(clients), not O(entries).
      // The worker receives this alongside the raw fe array and computes all
      // sort keys (_ts,_cn,_hr,_am,_cat) off-thread, eliminating the
      // O(n) Object.assign + string-lookup loop that previously blocked the main thread.
      // Build client-name map once — O(clients), not O(entries)
      var _clMap={};
      for(var _ci=0;_ci<ST.clients.length;_ci++){var _c=ST.clients[_ci];_clMap[_c.id]=_c.name||'';}
      var _wHrs=fe.reduce(function(s,e){return s+Number(e.hours);},0);
      var _wBill=fe.reduce(function(s,e){return s+calcAmount(e.hours,e.rate);},0);
      // Build slim sort-key objects — O(n) lightweight props only.
      // Structured Clone copies this tiny payload instead of full entry objects,
      // eliminating main-thread blocking for large datasets.
      var _slim=new Array(fe.length);
      for(var _si=0;_si<fe.length;_si++){
        var _se=fe[_si];
        _slim[_si]={id:_se.id,_ts:+localDate(_se.date),_cn:_clMap[_se.clientId]||'',
                    _hr:Number(_se.hours),_am:calcAmount(_se.hours,_se.rate),_cat:_se.createdAt||0};
      }
      // Build id->entry map so onmessage can reconstruct the sorted array from IDs.
      var _feById={};
      for(var _fi=0;_fi<fe.length;_fi++) _feById[fe[_fi].id]=fe[_fi];
      var _w=_getSortWorker();
      _w.onmessage=function(ev){
        var r=ev.data;
        _tsSortPending=false;
        _tsSortPendingKey=null;
        // Rebuild sorted entry array from the ID order returned by the worker.
        // filter(Boolean) guards against entries removed while the worker was running.
        var _sortedArr=r.ids.map(function(id){return _feById[id];}).filter(Boolean);
        _tsSortCache={key:r.key,sorted:_sortedArr,hrs:r.hrs,bill:r.bill};
        render();
      };
      _w.onerror=function(){
        // Worker failed (e.g. strict CSP): fall back to synchronous sort next render
        _sortWorker=null; _tsSortPending=false; _tsSortPendingKey=null; render();
      };
      // Send only the slim sort-key array — no full entry objects cross the thread boundary
      _w.postMessage({key:tsSortKey,slim:_slim,sort:ST.tsSort,hrs:_wHrs,bill:_wBill});
      // Serve stale sort cache for this render pass while the worker is running
      sorted=_tsSortCache.sorted;
      hrs=_tsSortCache.hrs;
      bill=_tsSortCache.bill;
    } else {
      // Sort already scheduled for this key — serve stale data again
      sorted=_tsSortCache.sorted;
      hrs=_tsSortCache.hrs;
      bill=_tsSortCache.bill;
    }
  }
  // Paginate from sorted array (non-All-Time path or All-Time with non-date sort during load)
  totalFiltered=sorted.length;
  var totalPages_=Math.max(1,Math.ceil(totalFiltered/_PAGE_SIZE));
  if(ST.tsPage>=totalPages_) ST.tsPage=totalPages_-1;
  if(ST.tsPage<0) ST.tsPage=0;
  var _ps=ST.tsPage*_PAGE_SIZE;
  paginated=sorted.slice(_ps,_ps+_PAGE_SIZE);
  } // end else (!_usePageResult)

  // ── Row build — O(page_size) ──────────────────────────────────────────────
  tableH='';
  var totalPages=Math.max(1,Math.ceil(totalFiltered/_PAGE_SIZE));
  if(sorted.length===0&&!_usePageResult){
    tableH=buildEmptyState('\u23F1','No entries yet',(role==='billing_staff'?'No entries in this time range. Use \'+ New Entry\' to add entries on behalf of an attorney.':'Click \u201C+ New Entry\u201D or tap \u26A1 to log time.'));
  } else if(paginated.length===0){
    tableH=buildEmptyState('\u23F1','No entries yet',(role==='billing_staff'?'No entries in this time range. Use \'+ New Entry\' to add entries on behalf of an attorney.':'Click \u201C+ New Entry\u201D or tap \u26A1 to log time.'));
  } else {
    var rows=paginated.map(function(e){
      var cl=_lu.cl[e.clientId];
      var mt=_lu.ma[e.matterId];
      var ct=_lu.ct[e.contactId];
      var amt=calcAmount(e.hours,e.rate,true);
      var est=e.status||'pending';
      var rt=ST.rowTmr;
      var isActive=rt&&String(rt.entId)===String(e.id);
      var isOther=rt&&!isActive;

      // Actions
      var canEdit=false,canDelete=false;
      var isOwnEntry=(e.createdBy===(ST.user?ST.user.name:''));
      if(role==='partner'){canEdit=true;canDelete=true;}
      else if(role==='attorney'){canEdit=isOwnEntry&&(est==='pending'||est==='rejected');canDelete=isOwnEntry&&(est==='pending'||est==='rejected');}

      var timerBtn='';
      if(role!=='billing_staff'){
        if(isActive){
          timerBtn=safe('<button type="button" onclick="A.rowTmrStop()" title="Stop timer" aria-label="Stop timer" class="btn-ic row-tmr-stop" style="font-size:14px;padding:3px 6px;color:var(--red)">■</button>');
        } else if(e.date>=today()){
          timerBtn=html`<button type="button" data-id="${e.id}" onclick="A.rowTmrStart(this.dataset.id)" title="${rt?'Switch timer to this entry':'Start timer for this entry'}" aria-label="${rt?'Switch timer to this entry':'Start timer for this entry'}" class="btn-ic" style="font-size:13px;opacity:${rt?'0.25':'0.65'};padding:3px 6px">⏱</button>`;
        }
      }
      var actionsH=html`<div class="tda">${canEdit?html`<button type="button" data-id="${e.id}" onclick="A.editEnt(this.dataset.id)" title="Edit entry" aria-label="Edit entry">${safe(IC.edit)}</button>`:''
        }${canDelete?html`<button type="button" data-id="${e.id}" onclick="A.delEnt(this.dataset.id)" title="Delete entry" aria-label="Delete entry">${safe(IC.trash)}</button>`:''
        }<button type="button" data-id="${e.id}" onclick="A.dupEnt(this.dataset.id)" title="Duplicate to today" aria-label="Duplicate entry to today" style="opacity:0.6">${safe(IC.copy)}</button
        >${role==='billing_staff'?html`<button type="button" data-id="${e.id}" onclick="A.billingEditEntry(this.dataset.id)" title="Add ABA code / matter number" aria-label="Add ABA code or matter number" class="u-cbl">🧾</button>`:''
        }${timerBtn}</div>`;

      var abaDisplay=e.abaCode?html`<span style="font-family:var(--font-mono);font-size:10px;color:var(--blue);display:block">${e.abaCode}</span>`:'';
      var mnDisplay=(mt&&mt.matterNumber)?html`<span style="font-family:var(--font-mono);font-size:10px;color:var(--ink3);display:block">#${mt.matterNumber}</span>`:'';
      var byCell=role==='billing_staff'?html`<td data-label="By"><span class="badge" title="${e.createdBy||''}">${e.createdByIni||'?'}</span></td>`:'';

      var trClass=isActive?'tr-active-tmr':(isOther?'tr-dimmed':'');
      return html`<tr id="tr-ent-${e.id}"${safe(trClass?' class="'+trClass+'"':'')}><td data-label="Date" style="white-space:nowrap;color:var(--ink2)">${safe($d(e.date))}</td
