// Build the final .csv filename for any export.
// cfg: {filenamePrefix, dataset, dateFrom, dateTo}
// datePresetLabel: optional human label like 'this-month' (quick export only)
// Logic:
//   • If prefix (after placeholder expansion) is non-empty → use it as the
//     full stem so the user has full control.  Just sanitize + append .csv.
//   • If prefix is empty → auto-build a descriptive stem:
//       <dataset>_<date-range-or-preset>_<stamp>
// ext: 'csv' | 'xlsx'  (defaults to 'csv' for backwards compat)
function _buildExportFilename(cfg, datePresetLabel, ext){
  var e=ext||'csv';
  var now=new Date();
  var stamp=toIsoDate(now);
  var expanded=_applyFilePH(cfg.filenamePrefix||'', cfg.dataset);
  var stem=expanded.replace(/[^a-zA-Z0-9_\-]/g,'_').replace(/_{2,}/g,'_').replace(/^_+|_+$/g,'');
  if(stem){
    return stem+'.'+e;
  }
  var dsLabel={entries:'time-entries',clients:'clients',matters:'matters',contacts:'contacts'}[cfg.dataset]||cfg.dataset;
  var datePart='';
  if(datePresetLabel && datePresetLabel!=='all'){
    datePart='_'+datePresetLabel;
  } else if(cfg.dateFrom||cfg.dateTo){
    datePart=(cfg.dateFrom?'_'+cfg.dateFrom:'')+(cfg.dateTo&&cfg.dateTo!==cfg.dateFrom?'_to_'+cfg.dateTo:'');
  }
  return dsLabel+datePart+'_'+stamp+'.'+e;
}
// Backwards-compat alias
function _buildCsvFilename(cfg, datePresetLabel){ return _buildExportFilename(cfg, datePresetLabel, 'csv'); }

// ═══════════════════════════════════════════════════════════════════════════
// XLSX EXPORT — pure JS, zero dependencies, no CDN
// Architecture: data rows → OOXML sheet XML → uncompressed ZIP → Blob download
// ═══════════════════════════════════════════════════════════════════════════

// CRC-32 lookup table (used by ZIP local-file and central-directory headers)
var _crc32Table=(function(){
  var t=new Uint32Array(256);
  for(var i=0;i<256;i++){
    var c=i;
    for(var j=0;j<8;j++) c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);
    t[i]=c;
  }
  return t;
})();

function _crc32(bytes){
  var c=0xFFFFFFFF>>>0;
  for(var i=0;i<bytes.length;i++) c=(c>>>8)^_crc32Table[(c^bytes[i])&0xFF];
  return (c^0xFFFFFFFF)>>>0;
}

// Minimal ZIP writer — store (no compression, method=0).
// files: [{name:string, data:Uint8Array}]  → returns Uint8Array
function _zipStore(files){
  var enc=new TextEncoder();
  var localParts=[];   // interleaved local-header + file-data Uint8Arrays
  var centralParts=[];
  var offsets=[];
  var runOffset=0;

  for(var fi=0;fi<files.length;fi++){
    var f=files[fi];
    var nameBytes=enc.encode(f.name);
    var data=f.data;
    var crc=_crc32(data);
    var sz=data.length;

    // Local file header (30 bytes + filename)
    var lfh=new Uint8Array(30+nameBytes.length);
    var lv=new DataView(lfh.buffer);
    lv.setUint32(0,0x04034B50,true); // PK\3\4
    lv.setUint16(4,20,true);          // version needed: 2.0
    lv.setUint16(6,0,true);           // flags
    lv.setUint16(8,0,true);           // compression: store
    lv.setUint16(10,0,true);          // mod time
    lv.setUint16(12,0,true);          // mod date
    lv.setUint32(14,crc,true);
    lv.setUint32(18,sz,true);         // compressed size
    lv.setUint32(22,sz,true);         // uncompressed size
    lv.setUint16(26,nameBytes.length,true);
    lv.setUint16(28,0,true);          // extra length
    lfh.set(nameBytes,30);

    offsets.push(runOffset);
    localParts.push(lfh);
    localParts.push(data);
    runOffset+=lfh.length+sz;

    // Central directory record (46 bytes + filename)
    var cde=new Uint8Array(46+nameBytes.length);
    var cv=new DataView(cde.buffer);
    cv.setUint32(0,0x02014B50,true); // PK\1\2
    cv.setUint16(4,20,true);          // version made by
    cv.setUint16(6,20,true);          // version needed
    cv.setUint16(8,0,true);
    cv.setUint16(10,0,true);          // compression: store
    cv.setUint16(12,0,true);
    cv.setUint16(14,0,true);
    cv.setUint32(16,crc,true);
    cv.setUint32(20,sz,true);
    cv.setUint32(24,sz,true);
    cv.setUint16(28,nameBytes.length,true);
    cv.setUint16(30,0,true);          // extra length
    cv.setUint16(32,0,true);          // comment length
    cv.setUint16(34,0,true);          // disk start
    cv.setUint16(36,0,true);          // internal attrs
    cv.setUint32(38,0,true);          // external attrs
    cv.setUint32(42,offsets[fi],true);
    cde.set(nameBytes,46);
    centralParts.push(cde);
  }

  var cdSize=centralParts.reduce(function(s,p){return s+p.length;},0);
  var eocd=new Uint8Array(22);
  var ev=new DataView(eocd.buffer);
  ev.setUint32(0,0x06054B50,true); // PK\5\6
  ev.setUint16(4,0,true);
  ev.setUint16(6,0,true);
  ev.setUint16(8,files.length,true);
  ev.setUint16(10,files.length,true);
  ev.setUint32(12,cdSize,true);
  ev.setUint32(16,runOffset,true);
  ev.setUint16(20,0,true);

  var all=localParts.concat(centralParts).concat([eocd]);
  var total=all.reduce(function(s,p){return s+p.length;},0);
  var out=new Uint8Array(total); var pos=0;
  for(var i=0;i<all.length;i++){ out.set(all[i],pos); pos+=all[i].length; }
  return out;
}

// XML-escape for OOXML cell content
function _xlEsc(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,''); // strip illegal XML chars
}

// Convert 0-based column index → Excel column letter(s) (A, B, … Z, AA, …)
function _xlCol(n){
  var s='';
  for(n++;n>0;n=Math.floor((n-1)/26)) s=String.fromCharCode(65+((n-1)%26))+s;
  return s;
}

// Build XLSX bytes from a 2-D array of rows.
// rows[0] = header strings; rows[1..] = data (strings or numbers).
// Numeric-looking strings (after stripping a leading $) are stored as numbers
// so Excel formulas and formatting work correctly.
// sheetName: worksheet tab label (max 31 chars, safe chars only)
function _buildXlsxBytes(rows, sheetName){
  var enc=new TextEncoder();
  var sn=(sheetName||'Sheet1').replace(/[\\\/\?\*\[\]:]/g,'').slice(0,31)||'Sheet1';

  // ── Sheet XML ───────────────────────────────────────────────────────────
  var shXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"'
    +' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
    +'<sheetData>';

  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri];
    shXml+='<row r="'+(ri+1)+'">';
    for(var ci=0;ci<row.length;ci++){
      var ref=_xlCol(ci)+(ri+1);
      var raw=row[ci];
      if(raw===null||raw===undefined) raw='';
      var str=String(raw);
      // Try numeric: strip optional leading $ and trailing % then parse
      var stripped=str.replace(/^\$/,'');
      var num=Number(stripped);
      if(str!==''&&!isNaN(num)&&isFinite(num)){
        shXml+='<c r="'+ref+'"><v>'+num+'</v></c>';
      } else {
        shXml+='<c r="'+ref+'" t="inlineStr"><is><t>'+_xlEsc(str)+'</t></is></c>';
      }
    }
    shXml+='</row>';
  }
  shXml+='</sheetData></worksheet>';

  // ── Workbook XML ────────────────────────────────────────────────────────
  var wbXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"'
    +' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
    +'<sheets><sheet name="'+_xlEsc(sn)+'" sheetId="1" r:id="rId1"/></sheets>'
    +'</workbook>';

  // ── Styles XML (minimal — required by Excel) ────────────────────────────
  var stXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
    +'<fonts><font><sz val="11"/><name val="Calibri"/></font></fonts>'
    +'<fills><fill><patternFill patternType="none"/></fill>'
    +'<fill><patternFill patternType="gray125"/></fill></fills>'
    +'<borders><border><left/><right/><top/><bottom/><diagonal/></border></borders>'
    +'<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>'
    +'<cellXfs><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/></cellXfs>'
    +'</styleSheet>';

  // ── Relationships ────────────────────────────────────────────────────────
  var relsMain='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    +'<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument"'
    +' Target="xl/workbook.xml"/>'
    +'</Relationships>';

  var relsWb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    +'<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet"'
    +' Target="worksheets/sheet1.xml"/>'
    +'<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles"'
    +' Target="styles.xml"/>'
    +'</Relationships>';

  // ── Content Types ────────────────────────────────────────────────────────
  var ctXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'
    +'<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'
    +'<Default Extension="xml" ContentType="application/xml"/>'
    +'<Override PartName="/xl/workbook.xml"'
    +' ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'
    +'<Override PartName="/xl/worksheets/sheet1.xml"'
    +' ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>'
    +'<Override PartName="/xl/styles.xml"'
    +' ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>'
    +'</Types>';

  var files=[
    {name:'[Content_Types].xml',    data:enc.encode(ctXml)},
    {name:'_rels/.rels',            data:enc.encode(relsMain)},
    {name:'xl/workbook.xml',        data:enc.encode(wbXml)},
    {name:'xl/_rels/workbook.xml.rels', data:enc.encode(relsWb)},
    {name:'xl/worksheets/sheet1.xml',   data:enc.encode(shXml)},
    {name:'xl/styles.xml',          data:enc.encode(stXml)}
  ];
  return _zipStore(files);
}

// ── Partner Assignment Helper ──────────────────────────────────────────────────
// Returns first partner-role contact assigned to a client, or null.
function _getClientPartner(clientId){
  if(!clientId) return null;
  var cl=_lu.cl[clientId]||null;
  if(!cl||!cl.contactIds||!cl.contactIds.length) return null;
  for(var i=0;i<cl.contactIds.length;i++){
    var ctid=cl.contactIds[i];
    var ct=_lu.ct[ctid]||null;
    if(ct&&ct.role&&isPartnerRole(ct.role)) return ct;
  }
  return null;
}

// Returns map of {partnerId|'__none__': {partner, entries[]}} for entries grouped by assigned partner.
function _groupEntriesByPartner(entries){
  var groups={};
  var groupOrder=[];
  entries.forEach(function(e){
    var pt=_getClientPartner(e.clientId);
    var key=pt?String(pt.id):'__none__';
    if(!groups[key]){groups[key]={partner:pt,entries:[]};groupOrder.push(key);}
    groups[key].entries.push(e);
  });
  return {groups:groups,order:groupOrder};
}

// ── Submit Timesheet Modal ─────────────────────────────────────────────────────
// Unified send + email form. Replaces the old workflow export modal.
function buildSubmitTimesheetModal(){
  var role=myRole();
  var me=ST.user?ST.user.name:'';
  var fe=filterEnt(_getExportPool(),ST.tsFilter);
  if(ST.tsClientFilter) fe=fe.filter(function(e){return e.clientId==ST.tsClientFilter;});
  if(ST.tsMatterFilter) fe=fe.filter(function(e){return e.matterId==ST.tsMatterFilter;});

  // Scope entries by role
  var entries, pkgType, recipient, recipientRole, recipientRoleKey;
  if(role==='attorney'){
    entries=fe.filter(function(e){return e.createdBy===me;});
    pkgType='attorney_submission';
    recipient='Billing Staff'; recipientRole='for billing processing'; recipientRoleKey='billing_staff';
  } else if(role==='billing_staff'){
    entries=fe;
    pkgType='billing_review';
    recipient='Partner'; recipientRole='for approval'; recipientRoleKey='partner_approval';
  } else if(role==='partner'){
    entries=fe.filter(function(e){return (e.status||'pending')==='approved';});
    pkgType='partner_approval';
    recipient='Billing Staff'; recipientRole='for invoicing'; recipientRoleKey='billing_staff';
  } else {
    entries=fe; pkgType='attorney_submission'; recipient='Billing'; recipientRole=''; recipientRoleKey='billing_staff';
  }

  var hrs=entries.reduce(function(s,e){return s+Number(e.hours||0);},0);
  var bill=entries.reduce(function(s,e){return s+calcAmount(e.hours||0,e.rate||0,true);},0);
  var dateFrom=entries.length?entries.reduce(function(mn,e){return e.date<mn?e.date:mn;},entries[0].date):'';
  var dateTo=entries.length?entries.reduce(function(mx,e){return e.date>mx?e.date:mx;},entries[0].date):'';
  var firmName=ST.prefs&&ST.prefs.firmName?ST.prefs.firmName:'';

  var emptyNotice=entries.length===0
    ?'<div class="role-notice u-mb16">⚠ No entries available to submit in the current view. Adjust your time filter or filters above.</div>':'';

  // Auto-find recipient email from contacts
  var rcpEmail='';
  if(recipientRoleKey==='billing_staff'){
    var bsCt=ST.contacts.find(function(c){return c.email&&c.role&&containsStr(c.role,'billing');});
    if(bsCt) rcpEmail=bsCt.email;

// === LOOKUP MAPS
// Built once per data-change (guarded by _luDirty flag).
// All views use _lu.cl/ma/ct for O(1) lookups instead of repeated .find().
// _lu.en (entries map) is intentionally NOT rebuilt here — with tens of thousands
// of entries it's expensive and only invoice-review actually needs it.
// Invoice functions call buildEntryLookup() directly when needed.
var _lu={cl:{},ma:{},ct:{},gr:{},en:{}};
var _luDirty=true;
var _luEnVer=-1; // -1 = never built; 0 = built and kept live via incremental patches
function markLuDirty(){_luDirty=true;_dataVer++;ST._anEntries=null;_anLoading=false;_anCalcResult=null;_anCalcLoading=false;_anCalcPendingKey=null;ST._exportEntries=null;}
function buildLookups(){
  if(!_luDirty) return;
  var cl={},ma={},ct={},gr={};
  ST.clients.forEach(function(r){cl[r.id]=r;});
  ST.matters.forEach(function(r){ma[r.id]=r;});
  ST.contacts.forEach(function(r){ct[r.id]=r;});
  ST.groups.forEach(function(r){gr[r.id]=r;});
  _lu.cl=cl; _lu.ma=ma; _lu.ct=ct; _lu.gr=gr;
  _luDirty=false;
}
// Lazily build the entries lookup — called only when invoice review needs it.
// Built once on first access; _patchEntry/_removeEntry keep it live via O(1) incremental
// updates so subsequent calls are always no-ops. _invalidateEntryCaches() resets the flag
// after bulk import/restore so a full rebuild fires on the next invoice access.
function buildEntryLookup(){
  if(_luEnVer!==-1) return; // already built and maintained live — no full scan needed
  var en={};
  ST.entries.forEach(function(r){en[r.id]=r;});
  _lu.en=en;
  _luEnVer=0; // mark as built; incremental patches in _patchEntry/_removeEntry keep it live
}

// === RENDER CACHE
//
// _dataVer: monotonically increases whenever ST.entries/clients/matters/contacts
//   mutate (via markLuDirty). Used as the authoritative "data freshness" token
//   for all view caches. Filter/sort state is included separately in cache keys.
//
// Zone rendering: #app is split into three independently morphed zones:
//   z-hdr  — header + nav bar
//   z-main — current tab content
//   z-ov   — modal overlays
//
// Zones are only morphed when their composite key changes, eliminating the
// full-app DOM diff that fired on every user interaction. The critical hot
// paths that are now free:
//   • Opening settings/help/ql/up modal while on Timesheet tab → z-main skipped
//   • Changing a dropdown inside the entry form (ef) → z-main rebuilt, but
//     the timesheet TABLE is returned from _tsCache (see below) → O(page_size)
//     not O(total_entries)
//
var _dataVer=0; // incremented by markLuDirty() on any data mutation

// ── Timesheet table cache ────────────────────────────────────────────────────
// Two-level cache for vTimesheet():
//
//  _tsSortCache  — caches filter+sort (O(n log n)) across page and rowTmr changes.
//                  Key excludes ST.tsPage and ST.rowTmr so page navigation re-uses
//                  the sorted array without re-scanning the full dataset.
//
//  _tsCache      — caches the final rendered HTML for one specific page.
//                  Key includes ST.tsPage and ST.rowTmr.
//                  When only the page changes the sort is free (O(1) lookup) and
//                  only the O(page_size) row-build runs.
var _tsSortCache={key:null,sorted:[],hrs:0,bill:0};
var _tsSortPending=false;   // true while an off-thread sort is in flight
var _tsSortPendingKey=null; // tsSortKey the pending sort was scheduled for
var _sortWorker=null;       // lazily-created Web Worker for large-dataset sorts
var _tsCache={key:null,hrs:0,bill:0,filteredLen:0,tableH:'',statRows:null};

// ── Analytics cache ──────────────────────────────────────────────────────────
// vAnalytics() has no inline form; the entire output can be cached.
var _anCache={key:null,html:''};
var _anFetchVer=0;         // incremented after each successful _loadAnalyticsEntries() fetch
var _anLoading=false;      // true while an IDB range query is in-flight; prevents duplicate fetches
// Analytics computation is offloaded to a Web Worker so that O(E) accumulations
// (totals, byClient, byGroup, contactSplit) never block the main thread.
var _anCalcWorker=null;       // lazily-created Web Worker for off-thread analytics computation
var _anCalcResult=null;       // {key, totals, byClient, byGroup, split} from last worker run
var _anCalcLoading=false;     // true while analytics worker is computing
var _anCalcPendingKey=null;   // calc key for in-flight worker dispatch (prevents duplicate dispatches)

// ── Zone render-state tracking ───────────────────────────────────────────────
// Stores the key from the last successful morph of each zone.
// A zone is only re-morphed when its new key differs from the stored key.
var _rKeys={hdr:null,main:null,mainModal:null,ov:null,tsForm:null};

// === MORPH
// Incremental DOM patching (no CDN, no external deps).
// Walks old/new DOM trees and updates only what changed.
// Preserves focused elements and cursor position naturally,
// eliminating the old _dFocusSel hack entirely.
// Keyed reconciliation: elements with id= are matched by id across the list,
// preventing O(n) mismatch when rows are added/removed.
var _morphBuf=document.createElement('div');

function _mAttrs(o,n){
  // Remove attrs absent from new node
  for(var i=o.attributes.length-1;i>=0;i--){
    var nm=o.attributes[i].name;
    if(!n.hasAttribute(nm)) o.removeAttribute(nm);
  }
  // Add/update attrs from new node
  for(var j=0;j<n.attributes.length;j++){
    var a=n.attributes[j];
    if(o.getAttribute(a.name)!==a.value) o.setAttribute(a.name,a.value);
  }
}

function _mEl(o,n){
  var focused=(document.activeElement===o);
  _mAttrs(o,n);
  // Sync form-control values — skip focused element to avoid cursor jump
  if(!focused){
    if(o.tagName==='INPUT'&&o.type!=='checkbox'&&o.type!=='radio'){
      var nv=n.hasAttribute('value')?n.getAttribute('value'):'';
      if(o.value!==nv) o.value=nv;
    }
    if(o.tagName==='INPUT'&&(o.type==='checkbox'||o.type==='radio')){
      var nc2=n.hasAttribute('checked');
      if(o.checked!==nc2) o.checked=nc2;
    }
    if(o.tagName==='TEXTAREA'){
      // textarea value lives as child text in HTML; textContent gives decoded string
      var tv=n.textContent;
      if(o.value!==tv) o.value=tv;
    }
  }
  // Recurse children (skip textarea — its content is the value, not children)
  if(o.tagName!=='TEXTAREA') _mKids(o,n);
  // Select: after options are patched, align .value to the selected option
  if(!focused&&o.tagName==='SELECT'){
    var sel=n.querySelector('option[selected]');
    var sv=sel?sel.value:(n.getAttribute('value')||'');
    if(sv!==''&&o.value!==sv) o.value=sv;
  }
}

function _mKids(o,n){
  var nc=n.childNodes,i,nk,rn,match,oid={};
  // Build id-keyed index of current children for O(1) keyed matching
  var cur=o.firstChild;
  while(cur){if(cur.nodeType===1&&cur.id)oid[cur.id]=cur;cur=cur.nextSibling;}

  for(i=0;i<nc.length;i++){
    nk=nc[i];
    rn=o.childNodes[i]||null; // live NodeList — updates as we insert/move nodes
    if(nk.nodeType===3){       // text node
      if(rn&&rn.nodeType===3){
        if(rn.textContent!==nk.textContent) rn.textContent=nk.textContent;
      } else {
        o.insertBefore(document.createTextNode(nk.textContent),rn);
      }
    } else if(nk.nodeType===1){ // element node
      match=null;
      if(nk.id&&oid[nk.id]){match=oid[nk.id];delete oid[nk.id];}
      if(match){
        // Keyed match found — move to current position if needed
        if(match!==rn) o.insertBefore(match,rn);
        if(match.tagName===nk.tagName) _mEl(match,nk);
        else { var cl=nk.cloneNode(true); o.replaceChild(cl,match); }
      } else if(rn&&rn.nodeType===1&&rn.tagName===nk.tagName&&!rn.id){
        // Unkeyed structural match — update in-place
        _mEl(rn,nk);
      } else {
        // No match — insert clone
        o.insertBefore(nk.cloneNode(true),rn);
      }
    }
  }
  // Trim extra old children
  while(o.childNodes.length>nc.length) o.removeChild(o.lastChild);
}

function morph(el,html){
  _morphBuf.innerHTML=html;
  _mKids(el,_morphBuf);
  _morphBuf.innerHTML=''; // release references
}

  // mainKey encodes all tab-view inputs EXCEPT ef form state (handled by ef exception).
  var mainKey=ST.tab+'|'+_dataVer

    // is still valid — skip the full vTimesheet() call and tableH concatenation.

    var _didTsFormOnly=false;

  // their CONTENT changes — so we do NOT cache overlays. The overlay zone is

  var ovKey=(ST.modal||'')+(ST._conf?'_conf':'')+(ST._prompt?'_prompt':'');
  var prevOv=_rKeys.ov||'';
  if(ovKey||prevOv){  // skip morph only if both are empty

    if(ST._conf) overlays=buildConfirmModal();

    else if(ST.modal==='up') overlays=buildUP();
    else if(ST.modal==='ql') overlays=buildQL();
    else if(ST.modal==='help') overlays=buildHelp();
    else if(ST.modal==='settings') overlays=buildSettings();
    else if(ST.modal==='mailpreset') overlays=buildMailPreset();
    else if(ST.modal==='mailph') overlays=buildMailPH();
    else if(ST.modal==='mailsend') overlays=buildMailSend();
    else if(ST.modal==='mailcompose') overlays=buildMailCompose();
    else if(ST.modal==='importData') overlays=buildImportModal();
    else if(ST.modal==='exportModal') overlays=buildExportModal();
    else if(ST.modal==='submitTimesheet') overlays=buildSubmitTimesheetModal();
    else if(ST.modal==='receivePackage') overlays=buildReceivePackageModal();
    else if(ST.modal==='ituser') overlays=buildITUserModal();
    else if(ST.modal==='profileImport') overlays=buildProfileImport();
    else if(ST.modal==='userSelect') overlays=buildITUserSelect();
    else if(ST.modal==='invForm') overlays=buildInvoiceForm();
    else if(ST.modal==='invPrint') overlays=buildInvoicePrint();
    else if(ST.modal==='pref') overlays=buildPartnerReview();
    else if(ST.modal==='workflowImport') overlays=buildWorkflowImportPreview();

    else if(ST.modal==='billingEdit') overlays=buildBillingEditModal();
    morph(document.getElementById('z-ov'),overlays);
    _rKeys.ov=ovKey;
  }

  document.getElementById('fab').style.display=((isBilling()&&ST.tab!=='timesheet')||(ST.modal&&ST.modal!=='help'&&ST.modal!=='settings'))?'none':'flex';
  if(ST.modal==='up') setTimeout(function(){var el=document.getElementById('up-n');if(el)el.focus();},50);
  if(ST._prompt) setTimeout(function(){var el=document.getElementById('_prompt-val');if(el){el.focus();el.select();}},50);
  if(ST.modal==='mailpreset') setTimeout(_mpPreview,30);
}


// === ROW TIMER ROLLOVER CHECK
// Called both from the setInterval tick AND from the visibilitychange 'visible' handler.
// Returns true if a rollover was detected and handled (caller should skip display update).
// Extracted so that a tab waking from background suspension always evaluates the correct
// elapsed time and midnight boundary — setInterval is throttled/frozen in hidden tabs.
function _checkRowTmrRollover(){
  if(!ST.rowTmr||!ST.rowTmr.startMs) return false;
  // Derive the session's start date using the **current** local timezone offset.
  // Both sides of the comparison use the same offset, so a mid-session timezone change
  // (user travels) shifts both values together — no spurious or missed rollovers.
  // The old cached startDate string was computed at timer-start in the then-current
  // timezone, making it stale and incorrect after the device timezone changes.
  var nowDate=today();
  var startDateLocal=toIsoDate(new Date(ST.rowTmr.startMs));
  if(nowDate===startDateLocal) return false;
  // Midnight boundary crossed — save elapsed to old entry, open new entry for today.
  var rtSnap=ST.rowTmr;
  clearInterval(rtSnap.iv);
  var elapsed=Date.now()-rtSnap.startMs+rtSnap.accMs;
  var srcEnt=ST.entries.find(function(x){return String(x.id)===String(rtSnap.entId);});
  if(srcEnt&&elapsed>0){
    // Accumulate in ms first; convert to decimal hours exactly once to avoid repeated FP addition errors.
    var finalRawMs=srcEnt.rawMs!=null?(srcEnt.rawMs+elapsed):elapsed;
    var finalHrs=msToHours(finalRawMs);
    var closed=Object.assign({},srcEnt,{hours:finalHrs,rawMs:finalRawMs});
    ST.entries=ST.entries.map(function(x){return String(x.id)===String(rtSnap.entId)?closed:x;});
    _patchEntry(closed);
    saveOne('entries',closed);
  }
  if(srcEnt){
    var newEnt=Object.assign({},srcEnt,{id:uid(),date:nowDate,hours:0,rawMs:null,
      status:(myRole()==='partner'?'approved':'pending'),finalized:false});
    ST.entries=ST.entries.concat([newEnt]);
    _patchEntry(newEnt);
    saveOne('entries',newEnt);
    ST.rowTmr=null;
    toast('Midnight \u2014 time saved. New entry started for today.','ok');
    A.rowTmrStart(newEnt.id);
  } else {
    ST.rowTmr=null; render();
  }
  return true;
}

  saveEnt:function(){

    var entRole=myRole();
    f.contactId=(entRole==='billing_staff')?f.byContactId:(entRole==='attorney'?f.contactId:g('ef-ct'));
    // Partner: if contactId still blank (team-member dropdown left empty), default to own contact record
    if(entRole==='partner'&&!f.contactId&&ST.user){var _pSelf=ST.contacts.find(function(c){return c.isUser||(c.name&&ST.user.name&&c.name===ST.user.name);});if(_pSelf)f.contactId=String(_pSelf.id);}
    var _eh=document.getElementById('ef-hh'),_em=document.getElementById('ef-mm');var _hv=_eh?parseInt(_eh.value,10):0,_mv=_em?parseInt(_em.value,10):0;if(isNaN(_hv))_hv=0;if(isNaN(_mv))_mv=0;f.hours=String(toPreciseHours(hhmmToDec(_hv,_mv)));f.rate=fmtCur(g('ef-r')||'');f.description=g('ef-desc');f.abaCode=g('ef-aba')||'';
    // (entRole already set above)

    var errs={};

    if(!f.hours||isNaN(Number(f.hours))||Number(f.hours)<=0) errs.h='Enter hours';
    else {
      // 24-hour daily cap: sum all entries for f.date, excluding the one being edited
      var _dayTotal=ST.entries.reduce(function(s,e){return (e.date===f.date&&String(e.id)!==String(ST.editId||''))?s+Number(e.hours):s;},0);
      if(_dayTotal+Number(f.hours)>24) errs.h='Total hours for this date would exceed 24 ('+(_dayTotal).toFixed(2)+'h already logged)';

  // ── Workflow Transfer Package Import ────────────────────────────────────────
  importWorkflowPackage:function(inp){
    var file=inp.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var pkg=JSON.parse(ev.target.result);
        if(!pkg||!pkg._type||!pkg._version){
          // Try regular JSON import fallback
          if(pkg&&pkg._version===1){A.importJSON({files:[file]});return;}
          toast('Not a valid workflow package or backup file','err'); return;
        }
        // Detect name conflicts before showing the import preview
        var detection=_detectImportConflicts(pkg);
        if(detection.conflicts.length){
          // Route to Linkage Review first — user must resolve mismatches
          ST._pendingLinkage={pkg:pkg,conflicts:detection.conflicts,resolved:detection.resolved};
          ST.modal='linkageReview';
        } else {
          // No conflicts — proceed directly to import preview with auto-resolved map
          ST._pendingWorkflowPkg=pkg;
          ST._pendingWorkflowLinkage=detection.resolved;
          ST.modal='workflowImport';
        }
        render();
      }catch(e){toast('Failed to read file','err');console.error(e);}
    };
    reader.onerror=function(ev){
      var code=ev.target.error?ev.target.error.name:'Unknown';
      toast('File read failed ('+code+'). The file may be unreadable or corrupt.','err');
      console.error('importWorkflowPackage: FileReader error',ev.target.error);
      inp.value='';
    };
    reader.readAsText(file,'UTF-8'); inp.value='';
  },
  confirmWorkflowImport:function(){
    var pkg=ST._pendingWorkflowPkg;
    if(!pkg){toast('No package to import','err');return;}
    var linkageMap=ST._pendingWorkflowLinkage||{clients:{},matters:{},contacts:{}};
    function _doImport(){
      var msg=_importWorkflowPackage(pkg,linkageMap);
      ST._pendingWorkflowPkg=null;
      ST._pendingWorkflowLinkage=null;
      ST.modal=null;
      render();
      toast(msg);
    }
    // Must operate on the full dataset — if in partial mode, load all entries first
    if(ST._entriesMode==='partial'){
      toast('Loading full history before import\u2026','warn');
      _loadAllEntries().then(function(entries){
        ST.entries=entries;
        ST._entriesMode='full';
        ST._totalEntryCount=entries.length;
        markLuDirty();
        _doImport();
      }).catch(function(e){
        toast('Failed to load full history: '+e,'err');
        console.error(e);
      });
    } else {
      _doImport();
    }
  },
  cancelWorkflowImport:function(){
    ST._pendingWorkflowPkg=null;
    ST._pendingWorkflowLinkage=null;
    ST.modal=null;
    render();
  },

  // ── Linkage Review actions ───────────────────────────────────────────────────
  confirmLinkageReview:function(){
    var d=ST._pendingLinkage;
    if(!d){toast('No linkage session active','err');return;}

    // Read user's selections from the DOM
    var linkageMap={clients:{},matters:{},contacts:{}};
    // Merge the already-auto-resolved entities
    Object.keys(d.resolved.clients).forEach(function(k){linkageMap.clients[k]=d.resolved.clients[k];});
    Object.keys(d.resolved.matters).forEach(function(k){linkageMap.matters[k]=d.resolved.matters[k];});
    Object.keys(d.resolved.contacts).forEach(function(k){linkageMap.contacts[k]=d.resolved.contacts[k];});

    // Read DOM selections for the conflict items
    var selects=document.querySelectorAll('[data-lnk-type]');
    selects.forEach(function(sel){
      var type=sel.getAttribute('data-lnk-type');
      var pkgId=sel.getAttribute('data-lnk-pkgid');
      var incomingName=sel.getAttribute('data-lnk-name');
      var val=sel.value; // localId or '__new__'
      var collKey=type+'s';
      linkageMap[collKey][pkgId]=(val==='__new__')?null:val;

      // Check "remember" checkbox for this row
      var idx=sel.id.replace('lnk-sel-'+type+'-','');
      var chk=document.getElementById('lnk-rem-'+type+'-'+idx);
      if(chk&&chk.checked){
        var ruleKey=type+':'+normStr(incomingName);
        if(val==='__new__'){
          ST.linkageRules[ruleKey]={isNew:true,confirmedAt:new Date().toISOString()};
        } else {
          var localArr=type==='client'?ST.clients:type==='matter'?ST.matters:ST.contacts;
          var localRec=localArr.find(function(x){return x.id===val;});
          if(localRec) ST.linkageRules[ruleKey]={localId:val,localName:localRec.name,savedAt:new Date().toISOString()};
        }
      }
    });

    // Proceed to import preview with the fully-resolved linkage map
    ST._pendingWorkflowPkg=d.pkg;
    ST._pendingWorkflowLinkage=linkageMap;
    ST._pendingLinkage=null;
    ST.modal='workflowImport';
    // Persist any newly-saved rules immediately (fire-and-forget; pagehide also flushes)
    _flushSave();
    render();
  },

    ST._pendingLinkage=null;
    ST._pendingWorkflowPkg=null;
    ST._pendingWorkflowLinkage=null;
    ST.modal=null;
    render();
  },

  ctfRemRate:function(idx){

    var rh=ST.ctf.rateHistory||[];
    // idx is index in the sorted display order (desc by date), map back to original array
    var sorted=rh.slice().sort(function(a,b){return a.effectiveDate<b.effectiveDate?1:-1;});
    var entry=sorted[idx];
    if(!entry) return;
    ST.ctf.rateHistory=rh.filter(function(r){return r!==entry&&!(r.effectiveDate===entry.effectiveDate&&r.rate===entry.rate);});
    render();
  },

  saveCt:function(){
    var f=ST.ctf;
    f.name=g('ctf-n'); f.role=g('ctf-ro'); f.email=g('ctf-e'); f.phone=g('ctf-p'); f.rate=fmtCur(g('ctf-rate')||'');
    var opv=g('ctf-op'); f.ownPct=opv!==''?Math.min(100,Math.max(0,Number(opv))):100;
    var salv=g('ctf-sal'); f.salary=salv&&salv!==''?fmtCur(salv):'';
    var errs={};
    if(!f.name||!f.name.trim()) errs.n='Name required';
    if(f.email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email)) errs.e='Invalid email';
    f.errs=errs;
    if(Object.keys(errs).length){render();return;}
    var existing=ST.editId?(_lu.ct[ST.editId]||null):null;
    // If rate history has entries, the latest applicable entry today is the authoritative current rate.
    // It overrides the manually-typed default rate to keep autoRate lookups accurate.
    var rh=f.rateHistory||[];
    var latestR=_rateOnDate(rh,today());
    // Use != null (not ||) so that a deliberate rate-history value of 0 (pro bono) is preserved
    var savedRate=(latestR!=null)?latestR:(f.rate?Number(f.rate):'');
    var c={id:ST.editId||uid(),name:f.name.trim(),role:f.role||'',email:f.email||'',phone:f.phone||'',rate:savedRate,ownPct:f.ownPct,salary:f.salary?Number(f.salary):'',rateHistory:rh,createdBy:ST.user?ST.user.name:'',createdByIni:ST.user?ST.user.initials:'?'};
    // Preserve isUser flag if this contact is the logged-in user
    if(existing&&existing.isUser) c.isUser=true;
    if(ST.editId){ST.contacts=ST.contacts.map(function(x){return x.id==ST.editId?c:x;});toast('Contact updated');}
    else{ST.contacts=ST.contacts.concat([c]);toast('Contact added');}
    // If this is the user's own contact, keep ST.user in sync
    if(c.isUser&&ST.user){
      var oldIni=ST.user.initials||'';
      // Auto-regen initials if name changed and initials were auto-generated (matching old name pattern)
      var autoIni=ST.user.name?getInitials(ST.user.name):'';
      var newAutoIni=getInitials(c.name);
      var ini2=(oldIni===autoIni)?newAutoIni:oldIni;
      ST.user=Object.assign({},ST.user,{name:c.name,role:c.role,email:c.email,phone:c.phone,rate:c.rate,ownPct:c.ownPct,salary:c.salary,initials:ini2});
      Store.setMeta('user',ST.user);
    }
    saveOne('contacts',c); A.closeF();
  },

    var entRole=myRole();
    f.contactId=(entRole==='billing_staff')?f.byContactId:(entRole==='attorney'?f.contactId:g('ef-ct'));
    // Partner: if contactId blank, default to own contact record
    if(entRole==='partner'&&!f.contactId&&ST.user){var _pSelf2=ST.contacts.find(function(c){return c.isUser||(c.name&&ST.user.name&&c.name===ST.user.name);});if(_pSelf2)f.contactId=String(_pSelf2.id);}
    f.rate=fmtCur(g('ef-r')||''); f.description=g('ef-desc'); f.abaCode=g('ef-aba')||'';

    if(entRole==='billing_staff'&&!f.byContactId) errs.by='Select the attorney for this entry';
    f.errs=errs;
    if(Object.keys(errs).length){render();return;}
    var createdBy,createdByIni;
    if(entRole==='billing_staff'){
      var byCt=_lu.ct[f.byContactId]||null;
      createdBy=byCt?byCt.name:'Unknown';
      createdByIni=byCt?(byCt.initials||getInitials(byCt.name)):'?';
    } else {
      createdBy=ST.user?ST.user.name:'';
      createdByIni=ST.user?ST.user.initials:'?';
    }
    var existingEntry=ST.editId?ST.entries.find(function(e){return e.id==ST.editId;}):null;

      clientId:f.clientId,matterId:f.matterId||'',contactId:f.contactId||'',

        var _addDayOther=ST.entries.reduce(function(s,e){return (e.date===target.date&&String(e.id)!==String(f.addToId))?s+Number(e.hours):s;},0);
        if(_addDayOther+Number(target.hours)+hrs>24){toast('Cannot add: total for '+target.date+' would exceed 24h','err');return;}
        var newRawMs=(target.rawMs!=null&&f.rawMs!=null)?(target.rawMs+f.rawMs):null;
        // When both sides have exact ms, derive hours from ms to avoid chained FP addition.
        var newHrs=newRawMs!=null?msToHours(newRawMs):addPreciseHours(target.hours,hrs);
        var updated;
        ST.entries=ST.entries.map(function(x){if(String(x.id)===String(f.addToId)){updated=Object.assign({},x,{hours:newHrs,rawMs:newRawMs});return updated;}return x;});

  // Row-level stopwatch
  rowTmrStart:function(entId){
    // Mutual exclusion: stop global Quick Log timer before starting a row timer.
    // Snapshot tmrOn *before* stopTmr() mutates it so the branch is stable.
    var qlWasOn=ST.tmrOn;
    if(qlWasOn){
      stopTmr();
      ST.ql.hours=String(msToHours(ST.tmrMs));
      ST.ql.rawMs=ST.tmrMs;
      toast('Quick Log timer stopped \u2014 row timer started','warn');
    }
    var rt=ST.rowTmr;
    if(rt&&String(rt.entId)!==String(entId)){
      A.confirm_('Timer is running on another entry. Switch to this one? Time on the other entry will be discarded.',function(){
        clearInterval(rt.iv);
        A._startRowTmr(entId);
      },{title:'Switch Timer',okLabel:'Switch',danger:false});
      return;
    }
    A._startRowTmr(entId);
  },
  _startRowTmr:function(entId,initialAccMs){
    // Defensive clear — prevents double-tick if a race condition leaves an orphaned interval.
    if(ST.rowTmr&&ST.rowTmr.iv) clearInterval(ST.rowTmr.iv);
    // startMs anchors the session epoch — rollover check derives the start date from this
    // at check time using the then-current timezone, so device timezone changes mid-session
    // (travel) keep both sides of the comparison in sync. No cached startDate string needed.
    ST.rowTmr={entId:entId,startMs:Date.now(),accMs:initialAccMs||0,iv:null};
    ST.rowTmr.iv=setInterval(function(){
      // Midnight rollover — delegate to shared helper (also called on tab-visibility restore).
      if(_checkRowTmrRollover()) return;
      var el=document.getElementById('row-tmr-'+entId);
      if(!el){return;} // Element hidden (user changed tabs) — keep ticking in memory.
      var ms=Date.now()-ST.rowTmr.startMs+ST.rowTmr.accMs;
      el.textContent=formatStopwatch(ms);
    },500);
    render();
  },
  rowTmrStop:function(){
    var rt=ST.rowTmr;if(!rt)return;
    clearInterval(rt.iv);
    var elapsed=Date.now()-rt.startMs+rt.accMs;
    var target=ST.entries.find(function(x){return String(x.id)===String(rt.entId);});
    if(!target){ST.rowTmr=null;render();return;}
    // Accumulate in ms first; convert to decimal hours exactly once to avoid repeated FP addition errors.
    var newRawMs=target.rawMs!=null?(target.rawMs+elapsed):elapsed;
    var newHrs=msToHours(newRawMs);
    var updated;
    ST.entries=ST.entries.map(function(x){
      if(String(x.id)===String(rt.entId)){updated=Object.assign({},x,{hours:newHrs,rawMs:newRawMs});return updated;}
      return x;
    });
    if(updated){_patchEntry(updated);saveOne('entries',updated);}
    ST.rowTmr=null;
    toast('+'+(Math.round((msToHours(elapsed)+Number.EPSILON)*10)/10).toFixed(1)+'h added \u2192 '+(Math.round((newHrs+Number.EPSILON)*10)/10).toFixed(1)+'h total \u26A1');
    render();
  },

  // Timer
  togTmr:function(){
    if(ST.tmrOn){
      stopTmr();
      var hrs=ST.tmrMs/3600000;
      // Preserve full precision in hours field; no forced minimum — user can review and adjust
      ST.ql.hours=String(toPreciseHours(hrs));
      ST.ql.rawMs=ST.tmrMs; // carry exact ms to save
    } else {
      // Mutual exclusion: stop any running row timer before starting the global timer
      if(ST.rowTmr){
        clearInterval(ST.rowTmr.iv);
        ST.rowTmr=null;
        toast('Row timer stopped \u2014 Quick Log timer started','warn');
      }
      ST.tmrStart=Date.now();
      ST.tmrOn=true;
      ST.tmrIv=setInterval(function(){
        var el=document.getElementById('ql-t'); if(!el){stopTmr();return;}
        var ms=Date.now()-ST.tmrStart+ST.tmrMs;
        el.textContent=formatStopwatch(ms);
        el.className='timer-num timer-on';
      },500);
    }
    render();
  },

  // ── Shared CSV generation engine ──
  // cfg mirrors the shape of ST.csvX.
  // For 'entries', cfg must have dateFrom/dateTo already resolved (strings or '').
  // Returns the CSV string (with BOM).
  _runCsvExport:function(cfg){
    buildLookups();
    var x=cfg; var ds=x.dataset;
    var csv='';
    var rowsRaw=[]; // parallel raw-row collection for XLSX export

    function esc(v){
      if(v===null||v===undefined) return '';
      var s=String(v);
      if(s.indexOf(',')!==-1||s.indexOf('"')!==-1||s.indexOf('\n')!==-1||s.indexOf('\r')!==-1){
        return '"'+s.replace(/"/g,'""')+'"';
      }
      return s;
    }
    function row(cells){ rowsRaw.push(cells.slice()); return cells.map(esc).join(',')+'\r\n'; }

    function fmtDate(d){
      if(!d) return '';
      var p=d.split('-'); if(p.length!==3) return d;
      var y=p[0],m=p[1],dd=p[2];
      if(x.dateFormat==='us') return m+'/'+dd+'/'+y;
      if(x.dateFormat==='uk') return dd+'/'+m+'/'+y;
      if(x.dateFormat==='long'){
        var mn=MONTH_NAMES_L;
        return mn[parseInt(m,10)-1]+' '+parseInt(dd,10)+', '+y;
      }
      return d;
    }
    function fmtMoney(v){
      var n=parseFloat(v)||0;
      var s=n.toFixed(2);
      return x.currencySymbol?'$'+s:s;
    }
    function fmtHours(v){ var h=x.roundHours?rndHours(v):parseFloat(v)||0; return h.toFixed(x.roundHours?1:2); }
    function fmtAmt(hrs,rate){ return fmtMoney(calcAmount(hrs,rate,x.roundHours)); }

    function groupKey(e){
      if(x.groupBy==='group'){
        var ecl=_lu.cl[e.clientId];
        if(ecl&&ecl.groupId){ var eg=_lu.gr[ecl.groupId]; return eg?eg.name:'(No Group)'; }
        return '(No Group)';
      }
      if(x.groupBy==='client'){ var cl=_lu.cl[e.clientId]; return cl?cl.name:'(No Client)'; }
      if(x.groupBy==='matter'){ var ma=_lu.ma[e.matterId]; return ma?ma.name:'(No Matter)'; }
      if(x.groupBy==='date-month'){ var p=e.date.split('-'); return p[0]+'-'+p[1]; }
      if(x.groupBy==='date-week'){
        var dt=localDate(e.date);
        var mon=new Date(dt); mon.setDate(dt.getDate()-((dt.getDay()+6)%7));
        return 'Week of '+mon.toISOString().split('T')[0];
      }
      return '';
    }

    if(ds==='entries'){
      // Filter entries using cfg
      var rows=_getExportPool();
      if(x.dateFrom) rows=rows.filter(function(e){return e.date>=x.dateFrom;});
      if(x.dateTo)   rows=rows.filter(function(e){return e.date<=x.dateTo;});
      if(!x.allClients && x.clientIds){
        var _cids=x.clientIds;
        rows=rows.filter(function(e){return _cids[e.clientId];});
      }
      if(!x.allMatters && x.matterIds){
        var _mids=x.matterIds;
        rows=rows.filter(function(e){return _mids[e.matterId];});
      }

      var c=x.cols||{};
      var hdr=[];
      if(c.date) hdr.push('Date');
      if(c.client) hdr.push('Client');
      if(c.matter) hdr.push('Matter');
      if(c.contact) hdr.push('Billing Contact');
      if(c.hours) hdr.push('Hours');
      if(c.rate) hdr.push('Rate');
      if(c.amount) hdr.push('Amount');
      if(c.desc) hdr.push('Description');
      if(c.abaCode) hdr.push('ABA Code');
      if(c.by) hdr.push('Created By');
      if(c.entryId) hdr.push('Entry ID');

      var entries=rows.slice().sort(function(a,b){
        if(x.groupBy&&x.groupBy!=='none'){
          var ka=groupKey(a),kb=groupKey(b);
          if(ka!==kb) return ka.localeCompare(kb);
        }
        return localDate(a.date)-localDate(b.date);
      });

      csv='\uFEFF';
      csv+=row(hdr);

      function entRow(e){
        var cl=_lu.cl[e.clientId]; var mt=_lu.ma[e.matterId]; var ct=_lu.ct[e.contactId];
        var cells=[];
        if(c.date) cells.push(fmtDate(e.date));
        if(c.client) cells.push(cl?cl.name:'');
        if(c.matter) cells.push(mt?mt.name:'');
        if(c.contact) cells.push(ct?ct.name:'');
        if(c.hours) cells.push(fmtHours(e.hours));
        if(c.rate) cells.push(fmtMoney(e.rate));
        if(c.amount) cells.push(fmtAmt(e.hours,e.rate));
        if(c.desc) cells.push(e.description||'');
        if(c.abaCode) cells.push(e.abaCode||'');
        if(c.by) cells.push(e.createdBy||e.createdByIni||'');
        if(c.entryId) cells.push(String(e.id));
        return row(cells);
      }

      function totalRow(label,ents){
        var hrs=ents.reduce(function(s,e){return s+Number(e.hours);},0);
        var amt=ents.reduce(function(s,e){return s+calcAmount(e.hours,e.rate,x.roundHours);},0);
        var cells=[];
        // Align label at first text-ish column, totals under hours/amount
        var preAmt=0;
        if(c.date) preAmt++;
        if(c.client) preAmt++;
        if(c.matter) preAmt++;
        if(c.contact) preAmt++;
        var firstCol=0;
        while(cells.length<firstCol) cells.push('');
        cells.push(label);
        while(cells.length<preAmt) cells.push('');
        if(c.hours) cells.push(fmtHours(hrs));
        if(c.rate) cells.push('');
        if(c.amount) cells.push(fmtMoney(amt));
        if(c.desc) cells.push('');
        if(c.abaCode) cells.push('');
        if(c.by) cells.push('');
        if(c.entryId) cells.push('');
        return row(cells);
      }

      var grouping=x.groupBy||'none';
      if(grouping==='none'){
        entries.forEach(function(e){ csv+=entRow(e); });
        if(x.includeGrandTotal && entries.length>0) csv+=totalRow('TOTAL',entries);
      } else {
        var groups=[]; var groupMap={};
        entries.forEach(function(e){
          var k=groupKey(e);
          if(!groupMap[k]){ groupMap[k]=[]; groups.push(k); }
          groupMap[k].push(e);
        });
        groups.forEach(function(k){
          var grpEntries=groupMap[k];
          csv+=row([k]);
          grpEntries.forEach(function(e){ csv+=entRow(e); });
          if(x.includeTotals) csv+=totalRow('Subtotal',grpEntries);
          csv+=row([]);
        });
        if(x.includeGrandTotal && entries.length>0) csv+=totalRow('GRAND TOTAL',entries);
      }
      return {csv:csv, rowsRaw:rowsRaw, rowCount:entries.length, dateFrom:x.dateFrom, dateTo:x.dateTo};
    }

    else if(ds==='clients'){
      var ch=x.clCols||{};
      var hdr2=[];
      if(ch.name) hdr2.push('Name');
      if(ch.email) hdr2.push('Email');
      if(ch.phone) hdr2.push('Phone');
      if(ch.rate) hdr2.push('Default Rate');
      if(ch.contact) hdr2.push('Primary Contact');
      csv='\uFEFF'+row(hdr2);
      ST.clients.slice().sort(function(a,b){return a.name.localeCompare(b.name);}).forEach(function(c){
        var ct=_lu.ct[c.contactId];
        var cells=[];
        if(ch.name) cells.push(c.name||'');
        if(ch.email) cells.push(c.email||'');
        if(ch.phone) cells.push(c.phone||'');
        if(ch.rate) cells.push(c.rate?fmtMoney(c.rate):'');
        if(ch.contact) cells.push(ct?ct.name:'');
        csv+=row(cells);
      });
      return {csv:csv, rowsRaw:rowsRaw, rowCount:ST.clients.length};
    }

    else if(ds==='matters'){
      var mh=x.maCols||{};
      var hdr3=[];
      if(mh.name) hdr3.push('Matter Name');
      if(mh.client) hdr3.push('Client');
      if(mh.desc) hdr3.push('Description');
      if(mh.rate) hdr3.push('Default Rate');
      if(mh.contact) hdr3.push('Billing Contact');
      csv='\uFEFF'+row(hdr3);
      ST.matters.slice().sort(function(a,b){return a.name.localeCompare(b.name);}).forEach(function(m){
        var cl2=_lu.cl[m.clientId]; var ct2=_lu.ct[m.contactId];
        var cells=[];
        if(mh.name) cells.push(m.name||'');
        if(mh.client) cells.push(cl2?cl2.name:'');
        if(mh.desc) cells.push(m.description||'');
        if(mh.rate) cells.push(m.rate?fmtMoney(m.rate):'');
        if(mh.contact) cells.push(ct2?ct2.name:'');
        csv+=row(cells);
      });
      return {csv:csv, rowsRaw:rowsRaw, rowCount:ST.matters.length};
    }

    else if(ds==='contacts'){
      var kh=x.ctCols||{};
      var hdr4=[];
      if(kh.name) hdr4.push('Name');
      if(kh.role) hdr4.push('Role');
      if(kh.email) hdr4.push('Email');
      if(kh.phone) hdr4.push('Phone');
      if(kh.rate) hdr4.push('Rate');
      if(kh.ownPct) hdr4.push('Ownership %');
      csv='\uFEFF'+row(hdr4);
      ST.contacts.slice().sort(function(a,b){return a.name.localeCompare(b.name);}).forEach(function(ct){
        var cells=[];
        if(kh.name) cells.push(ct.name||'');
        if(kh.role) cells.push(ct.role||'');
        if(kh.email) cells.push(ct.email||'');
        if(kh.phone) cells.push(ct.phone||'');
        if(kh.rate) cells.push(ct.rate?fmtMoney(ct.rate):'');
        if(kh.ownPct) cells.push(ct.ownPct!==undefined?String(ct.ownPct)+'%':'');
        csv+=row(cells);
      });
      return {csv:csv, rowsRaw:rowsRaw, rowCount:ST.contacts.length};
    }

    return {csv:'\uFEFF', rowCount:0};
  },

  // ── Quick-export: direct download from header button ──
  // Reads ST.prefs.csvQuick, resolves datePreset → dateFrom/dateTo, fires immediately.
  csvQuickExport:function(){
    var q=ST.prefs.csvQuick;
    if(!q){ toast('No quick export preset configured','warn'); return; }
    if(ST._exportEntries===null&&ST._entriesMode==='partial'){
      _loadExportEntries().then(function(){
        A.csvQuickExport();
      });
      return;
    }

    // Resolve datePreset to actual date strings
    var dateFrom='', dateTo='';
    var t=new Date();
    var p=q.datePreset||'month';
    if(p==='today'){ dateFrom=toIsoDate(t); dateTo=toIsoDate(t); }
    else if(p==='week'){
      var mon=new Date(t); mon.setDate(t.getDate()-((t.getDay()+6)%7));
      var sun=new Date(mon); sun.setDate(mon.getDate()+6);
      dateFrom=toIsoDate(mon); dateTo=toIsoDate(sun);
    } else if(p==='month'){
      dateFrom=t.getFullYear()+'-'+pad2(t.getMonth()+1)+'-01';
      dateTo=toIsoDate(new Date(t.getFullYear(),t.getMonth()+1,0));
    } else if(p==='quarter'){
      var qn=Math.floor(t.getMonth()/3);
      dateFrom=toIsoDate(new Date(t.getFullYear(),qn*3,1));
      dateTo=toIsoDate(new Date(t.getFullYear(),qn*3+3,0));
    } else if(p==='year'){
      dateFrom=t.getFullYear()+'-01-01';
      dateTo=t.getFullYear()+'-12-31';
    }
    // p==='all' → both remain ''

    // Build a complete cfg compatible with _runCsvExport
    var cfg={
      dataset: q.dataset||'entries',
      dateFrom: dateFrom,
      dateTo: dateTo,
      allClients: true,   // quick export: no per-client filter
      allMatters: true,
      cols: Object.assign({date:true,client:true,matter:true,contact:false,hours:true,rate:true,amount:true,desc:true,by:false,entryId:false,abaCode:false}, q.cols||{}),
      clCols: Object.assign({name:true,email:true,phone:true,rate:true,contact:false}, q.clCols||{}),
      maCols: Object.assign({name:true,client:true,desc:true,rate:true,contact:false}, q.maCols||{}),
      ctCols: Object.assign({name:true,role:true,email:true,phone:true,rate:false,ownPct:false}, q.ctCols||{}),
      groupBy: q.groupBy||'none',
      includeTotals: q.includeTotals!==false,
      includeGrandTotal: q.includeGrandTotal!==false,
      dateFormat: q.dateFormat||'iso',
      currencySymbol: q.currencySymbol!==false,
      roundHours: q.roundHours===true,
      filenamePrefix: q.filenamePrefix||''
    };

    var result=A._runCsvExport(cfg);

    var _presetLabels={today:'today',week:'this-week',month:'this-month',quarter:'this-quarter',year:String(t.getFullYear())};
    var fmt=q.exportFormat||'csv';
    var fname=_buildExportFilename(cfg, p!=='all'?(_presetLabels[p]||p):null, fmt);

    if(fmt==='xlsx'){
      var bytes=_buildXlsxBytes(result.rowsRaw,
        {entries:'Time Entries',clients:'Clients',matters:'Matters',contacts:'Contacts'}[cfg.dataset||'entries']||'Export');
      A._dlBytes(bytes, fname, 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
    } else {
      A._dlData(result.csv, fname, 'text/csv');
    }
    toast(result.rowCount+' rows → '+fname, 'ok');
  },

  // ─ Full JSON backup import ─
  importJSON:function(inp){
    var file=inp.files[0]; if(!file) return;
    inp.value='';
    var reader=new FileReader();
    reader.onload=function(ev){
      A.confirm_('Restore from backup? This will REPLACE all current data. Export a backup first if you want to keep your current data.',function(){
        try{
          var b=JSON.parse(ev.target.result);
          if(!b||!b._version){ toast('Invalid backup file','err'); return; }
          if(b.groups)   replaceCollection('groups',    'groups',    b.groups);
          if(b.clients)  replaceCollection('clients',  'clients',  b.clients);
          if(b.matters)  replaceCollection('matters',  'matters',  b.matters);
          if(b.entries)  replaceCollection('entries',  'entries',  b.entries);
          if(b.contacts) replaceCollection('contacts', 'contacts', b.contacts);
          if(b.user)     ST.user=b.user;
          if(b.prefs)    ST.prefs=Object.assign({appName:'SixMinuteLog.com',darkMode:null,layout:'comfortable',revenueSplit:false,analyticsEnabled:false,contactsEnabled:false},b.prefs);
          if(b.settings) ST.settings=Object.assign({},ST.settings,b.settings);
          if(b.descPresets) ST.descPresets=b.descPresets;
          if(b.mailPresets) ST.mailPresets=b.mailPresets;
          if(b.mailPlaceholders) ST.mailPlaceholders=b.mailPlaceholders;
          if(b.linkageRules&&typeof b.linkageRules==='object') ST.linkageRules=b.linkageRules;
          ST._entriesMode='full'; ST._totalEntryCount=ST.entries.length;
          _invalidateEntryCaches();
          markLuDirty();
          save(); Store.setMeta('user',ST.user);
          applyPrefs();
          toast('Backup restored: '+ST.clients.length+' clients, '+ST.matters.length+' matters, '+ST.entries.length+' entries');
          ST.modal=null; render();
        }catch(e){ toast('Failed to read backup file','err'); console.error(e); }
      },{title:'Restore Backup',okLabel:'Restore'});
    };
    reader.onerror=function(ev){
      var code=ev.target.error?ev.target.error.name:'Unknown';
      toast('File read failed ('+code+'). The file may be unreadable or corrupt.','err');
      console.error('importJSON: FileReader error',ev.target.error);
    };
    reader.readAsText(file,'UTF-8');
  },

  // Download a freshly-generated CLAUDE.md with current line numbers
  dlManifest: function(){
    // Scan own script source for // === SECTION markers and their line numbers
    var src = document.querySelector('script').textContent;
    var srcLines = src.split('\n');
    // The script tag starts at some line in the HTML file; find it
    var htmlSrc = document.documentElement.outerHTML;
    var htmlLines = htmlSrc.split('\n');
    var scriptStartLine = 0;
    for(var i=0;i<htmlLines.length;i++){
      if(htmlLines[i].indexOf('<script>')!==-1){scriptStartLine=i+1;break;}
    }
    // Build section map: name -> html line number
    var secMap = {};
    srcLines.forEach(function(line, i){
      var m = line.match(/^\/\/ === ([A-Z][A-Z &]+)$/);
      if(m) secMap[m[1]] = scriptStartLine + i;
    });

    // Descriptions for each section
    var descs = {
      'STORAGE':           'IndexedDB — named object stores per collection. Store.getAll (read), Store.putRecord/deleteRecord (single-record ops), Store.putBatch/syncCollection (bulk), Store.getMeta/setMeta (singletons), Store.clearData (reset)',
      'STATE':             'ST object - all app state',
      'HELPERS':           'uid,today,$m,$h,H,fmtPhone,fmtCur,autoRate,filterEnt,syncForm',
      'SAVE':              'save() debounced full-sync | saveOne(coll,rec) immediate upsert | delOne(coll,id) immediate delete | _flushSave() no-debounce flush',
      'TOAST':             'toast(msg,type)',
      'ICONS':             'IC object of SVG strings',
      'FIELD BUILDER':     'field(label,id,opts), stats(arr)',
      'VIEWS':             'vTimesheet,vClients,vMatters,vContacts,vAnalytics + form builders',
      'MODALS':            'buildUP,buildQL,buildHelp,buildSettings',
      'MORPH':             'morph(el,html) — incremental DOM patcher. Diffs old DOM vs new HTML string; updates only changed nodes. Preserves focused inputs/cursor. Used by render() instead of innerHTML=. Do NOT add focus-restore hacks.',
      'MAIN RENDER':       'TABS[], views{}, render() — calls morph() for incremental update',
      'ACTIONS':           'A object - all user actions',
      'CHANGE DELEGATION': 'document.addEventListener(\'change\',...)',
      'INIT':              'startup data loading, Promise.all'
    };

    var tableRows = Object.keys(descs).map(function(sec){
      var ln = secMap[sec] || '?';
      return '| `// === '+sec+'` | '+ln+' | '+descs[sec]+' |';
    }).join('\n');

    var now = new Date().toISOString().split('T')[0];
    var totalLines = htmlLines.length;

    var md = [
'# SixMinuteLog.com - Claude Architecture Guide',
'> **Claude Code: this file is auto-loaded. No need to read it explicitly.**',
'> **Web chat: upload this file and index.html together.**',
'> **Never read the full HTML. Use `str_replace` for all edits.**',
'> Auto-generated: '+now+' | HTML file: ~'+totalLines+' lines',
'',
'---',
'',
'## SECTION MAP (current line numbers in index.html)',
'',
'| Search String | ~Line | Contents |',
'|---|---|---|',
tableRows,
'',
'---',
'',
'## STATE SHAPE',
'',
'```',
'ST.tab          // active tab: timesheet|clients|matters|contacts|analytics',
'ST.clients[]    // {id,name,email,phone,rate,contactId}',
'ST.matters[]    // {id,name,clientId,description,rate,contactId}',
'ST.entries[]    // {id,date,clientId,matterId,contactId,hours,rate,description,createdBy,createdByIni}',
'ST.contacts[]   // {id,name,role,email,phone,rate,ownPct}',
'ST.user         // {name,initials,ownPct} or null',
'ST.settings     // {te,cl,ma,co,su,split, tc_date/client/matter/team/desc/hours/rate/amount/by, expFrom,expTo,te_group}',
'ST.modal        // null | ef|cf|mf|ctf|ql|up|help|settings | YOUR_KEY',
'ST.editId       // id of record being edited (null = new)',
'ST.ef/cf/mf/ctf/ql  // form state objects, each with .errs{}',
'```',
'',
'---',
'',
'## KEY FUNCTIONS',
'',
'```',
'uid()                              crypto.randomUUID() — collision-free UUID for distributed offline instances',
'today()                            YYYY-MM-DD string',
'$m(n) $h(n) $d(s)                 $X.XX  X.XXh  Jan 1, 2025',
'H(str)                             HTML-escape — escapes &, <, >, ", \' for safe injection into HTML strings',
'html`<div>${val}</div>`            Tagged template — auto-escapes all interpolated values via H()',
'safe(v)                            Mark trusted HTML as safe — prevents double-escaping in html`` templates',
'                                   • Wrap: field() output, IC.* icons, sub-templates, pre-built HTML',
'                                   • Arrays of SafeStr are joined; arrays of strings are each H()-escaped',
'                                   • html`` returns SafeStr; .toString() or String() extracts the raw string',
'g(id)                              get DOM element value by id',
'save()                             bulk debounced sync (imports, settings, approve-all)',
'saveOne(coll, rec)                 immediate single-record upsert — use for form saves',
'delOne(coll, id)                   immediate single-record delete — use for delete actions',
'toast(msg,type)                    type: ok|warn|err',
'syncForm()                         call before render() if user typed in fields',
'autoRate(clientId,matterId,ctId)   returns best available rate',
'fmtCur(val)                        strips non-numeric, 2 decimal max',
'```',
'',
'---',
'',
'## RECIPE: ADD A NEW TAB',
'',
'1. Add SVG to IC object (// === ICONS):',
'   myIcon: \'<svg width="17" height="17" ...>...</svg>\'',
'',
'2. Push to TABS array (// === MAIN RENDER):',
'   {id:\'mytab\', lbl:\'My Tab\', ic:IC.myIcon}',
'',
'3. Add view function before // === MODALS:',
'   function vMyTab(){ return \'<div>...</div>\'; }',
'',
'4. Register in views{} inside render():',
'   var views={..., analytics:vAnalytics, mytab:vMyTab};',
'',
'---',
'',
'## RECIPE: ADD A NEW MODAL',
'',
'1. Add builder (// === MODALS):',
'   function buildMyModal(){',
'     return \'<div class="ov"><div class="modal modal-sm">\'',
'       +\'<div class="modal-hd"><h2>Title</h2>\'',
'       +\'<button class="btn-ic" onclick="A.closeM()">\'+IC.x+\'</button></div>\'',
'       +\'<div class="modal-bd">...field() calls...</div>\'',
'       +\'<div class="modal-ft"><button class="btn btn-gh" onclick="A.closeM()">Cancel</button></div>\'',
'       +\'</div></div>\';',
'   }',
'',
'2. Add to overlays in render() after "else if(ST.modal===\'settings\')":',
'   else if(ST.modal===\'mymodal\') overlays=buildMyModal();',
'',
'3. Add open action to A:',
'   openMyModal: function(){ ST.modal=\'mymodal\'; render(); },',
'',
'---',
'',
'## RECIPE: ADD PERSISTED DATA',
'',
'FOR A COLLECTION (array of objects each with .id):',
'1. Add to ST: myData: []',
'2. Add to _flushSave(): add colsMap.mydata = ST.mydata; inside the dirty-collections block.',
'3. In actions: use saveOne(\'mydata\',rec) for single upserts, delOne(\'mydata\',id) for deletes.',
'   Use replaceCollection(\'mydata\',\'mydata\',newArr) for bulk replace (import/restore).',
'4. Add to INIT Promise.all: Store.getAll(\'mydata\')',
'5. Load in .then(res): try{if(res[N]&&res[N].length)ST.myData=res[N];}catch(e){}',
'   (N = index; current: 0=user(meta), 1=clients, 2=matters, 3=entries, 4=contacts)',

'',
'FOR A SINGLETON (a single object/value):',
'1. Add to _flushSave(): add metaMap.mykey = ST.myVal; inside the metaMap definition block.',
'2. Add to INIT Promise.all: Store.getMeta(\'mykey\')',
'3. Load in .then(res): try{if(res[N])ST.myVal=res[N];}catch(e){}',
'',
'---',
'',
'## FIELD BUILDER',
'',
'```',
'field(label, id, { type, val, ph, req, err, hint, pfx, sfx, opts:[{v,l}], dis, oninput, sf })',
'stats([[\'Label\',\'Value\',\'\'],[\'Label\',\'Value\',\'highlight\'],[\'Label\',\'Value\',\'highlight2\']])',
'// \'\' = white  \'highlight\' = green  \'highlight2\' = amber',
'// Every managed field needs sf:\'namespace.property\' (dot-notation state path).',
'// sf maps data-sf to ST directly: sf:\'ef.date\' → ST.ef.date = value.',
'// Three segments for nested: sf:\'cf.newPerson.name\' → ST.cf.newPerson.name.',
'// Transient add-row inputs (cf-ar-*, mf-ar-*, ctf-rh-*) omit sf — read via g() in actions.',
'// Raw inputs not using field()? Set data-sf="namespace.property" manually.',
'```',

  importFirmProfile: function(inp){
    var file=inp.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var p=JSON.parse(ev.target.result);
        if(!p||p._type!=='billing-ledger-firm-profile'){ toast('Not a valid firm profile file','err'); inp.value=''; return; }
        ST._importedProfile=p;
        // Apply branding immediately
        if(p.appName){ ST.prefs.appName=p.appName; savePrefs(); }
        // If profile has pre-configured users, let user pick one
        if(p.users&&p.users.length>0){
          ST.modal='userSelect';
        } else {
          // Apply data and go to user setup
          A._applyProfileData(p);
          ST._splashMode=true; ST.modal='up';
        }
        inp.value=''; render();
      } catch(e){ toast('Could not read profile file','err'); inp.value=''; }
    };
    reader.onerror=function(ev){
      var code=ev.target.error?ev.target.error.name:'Unknown';
      toast('File read failed ('+code+'). The file may be unreadable or corrupt.','err');
      console.error('importFirmProfile: FileReader error',ev.target.error);
      inp.value='';
    };
    reader.readAsText(file);
  },

    if(p.matters&&p.matters.length) replaceCollection('matters',  'matters',  p.matters);
    if(p.contacts&&p.contacts.length) replaceCollection('contacts','contacts', p.contacts);
    if(p.descPresets&&p.descPresets.length) ST.descPresets=p.descPresets;
    save();
    toast('Firm profile applied: '+H(p.firmName||p.appName||'Profile'));

      +'</style></head><body>'+html+'</body></html>');
    doc.close();
    fr.contentWindow.focus();
    fr.contentWindow.print();

function buildEntRow(e,s){
  var cl=_lu.cl[e.clientId]||null;
  var mt=_lu.ma[e.matterId]||null;
  var ct=_lu.ct[e.contactId]||null;
  var amt=calcAmount(e.hours,e.rate).toFixed(2);
  var vals=[];
  if(s.tc_date)   vals.push(e.date);
  if(s.tc_client) vals.push(cl?cl.name:'');
  if(s.tc_matter) vals.push(mt?mt.name:'General');
  if(s.tc_team)   vals.push(ct?ct.name:'');
  if(s.tc_desc)   vals.push(e.description||'');
  if(s.tc_hours)  vals.push(e.hours);
  if(s.tc_rate)   vals.push(e.rate);
  if(s.tc_amount) vals.push(amt);
  if(s.tc_by)     vals.push(e.createdBy||'');
  return vals;
}
